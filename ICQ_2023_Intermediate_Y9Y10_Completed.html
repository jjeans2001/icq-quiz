<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ICQ 2023 — Intermediate Division (Year 9 &amp; 10)</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f3ee;--card:#ffffff;--card2:#eeeae2;--border:#ddd8cc;
  --text:#1a1916;--muted:#6e6a5e;
  --green:#1e7a47;--green-bg:#e3f5ec;
  --red:#c0392b;--red-bg:#fdecea;
  --blue:#1a4f8a;--blue-bg:#e6eff9;
  --amber:#9a5500;--amber-bg:#fdf1dc;
  --gold:#9a7700;--gold-bg:#fdf8e1;
  --teal:#0a6e54;--teal-bg:#e0f5ed;
  --icq-teal:#00a89d;--icq-purple:#7b4fa6;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.topbar{position:sticky;top:0;z-index:200;background:#1a1916;display:flex;align-items:center;justify-content:space-between;padding:10px 24px;gap:12px}
.logo{display:flex;align-items:center;gap:12px;min-width:0}
.logo-icq{display:flex;gap:4px;align-items:flex-end}
.logo-icq .i-letter{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;color:var(--icq-teal)}
.logo-icq .c-letter{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;color:var(--icq-purple)}
.logo-icq .q-letter{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;color:var(--icq-teal)}
.logo-text{color:#fff;font-size:13px;font-weight:500;line-height:1.3;opacity:.88}
.logo-sub{font-size:10px;opacity:.55;color:#fff}
.top-stats{display:flex;gap:20px;flex-shrink:0}
.tstat{text-align:center}
.tstat .n{font-size:17px;font-weight:700;font-family:'DM Mono',monospace}
.tstat .l{font-size:9px;opacity:.5;text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.tstat .n.g{color:#4ed68a}.tstat .n.r{color:#f07070}.tstat .n.w{color:#fff}
.wrap{max-width:840px;margin:0 auto;padding:24px 18px 80px}
.prog-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:16px}
.prog-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.prog-lbl{font-size:12px;color:var(--muted)}.prog-val{font-size:12px;font-weight:700;font-family:'DM Mono',monospace;margin-left:auto;color:var(--text)}
.prog-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--icq-teal),#5dd8d0);border-radius:3px;transition:width .5s ease}
.qnav-wrap{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px}
.qdot{width:34px;height:34px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);font-size:11px;font-family:'DM Mono',monospace;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.qdot:hover{background:var(--card2)}.qdot.cur{background:var(--text);color:#fff;border-color:var(--text)}
.qdot.ok{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.qdot.ng{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:26px;box-shadow:0 2px 8px rgba(0,0,0,.04);animation:fadein .2s ease}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.qmeta{display:flex;align-items:center;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.qnum{font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace}
.qtag{font-size:11px;padding:3px 9px;border-radius:10px;background:var(--blue-bg);color:var(--blue);font-weight:600}
.qyear{font-size:11px;padding:3px 9px;border-radius:10px;background:var(--gold-bg);color:var(--gold);font-weight:700}
.qdiff{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:600}
.qdiff.easy{background:var(--green-bg);color:var(--green)}
.qdiff.medium{background:var(--amber-bg);color:var(--amber)}
.qdiff.hard{background:var(--red-bg);color:var(--red)}
.context-block{background:#f8f6f2;border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:16px;font-size:13.5px;line-height:1.8}
.context-block .ctx-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px}
.qen{font-size:15px;line-height:1.7;color:var(--text);margin-bottom:5px}
.qth{font-size:14px;line-height:1.85;color:var(--muted);margin-bottom:18px;padding-left:12px;border-left:2px solid var(--border)}
.opts{display:flex;flex-direction:column;gap:6px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:11px 15px;border:1.5px solid var(--border);border-radius:9px;cursor:pointer;font-size:14px;color:var(--text);background:var(--card);text-align:left;width:100%;transition:all .14s;line-height:1.55;font-family:'Sarabun',sans-serif}
.opt:hover:not(:disabled){background:var(--card2);border-color:#bbb4a8}
.opt .ltr{font-weight:700;font-family:'DM Mono',monospace;font-size:13px;min-width:22px;color:var(--muted);margin-top:1px;flex-shrink:0}
.opt.correct{background:var(--green-bg);border-color:var(--green)}.opt.correct .ltr{color:var(--green)}
.opt.wrong{background:var(--red-bg);border-color:var(--red)}.opt.wrong .ltr{color:var(--red)}
.opt.show-correct{background:var(--green-bg);border-color:var(--green)}.opt.show-correct .ltr{color:var(--green)}
.opt:disabled{cursor:default}
.q-table{border-collapse:collapse;margin:10px 0;font-size:13.5px;width:100%}
.q-table th{background:var(--card2);font-weight:600;padding:7px 12px;border:1px solid var(--border);text-align:center}
.q-table td{padding:6px 12px;border:1px solid var(--border);text-align:center}
.q-table tr:nth-child(even) td{background:#fafaf8}
.expbox{margin-top:14px;border:1px solid var(--border);border-radius:9px;overflow:hidden;display:none}
.expbox.show{display:block}
.exphdr{padding:9px 16px;background:var(--card2);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.elang{padding:3px 10px;border-radius:8px;font-size:11px;cursor:pointer;font-weight:600;border:none;background:none;color:var(--muted);font-family:'Sarabun',sans-serif;transition:all .12s}
.elang.active{background:var(--text);color:#fff}
.expbody{padding:16px;font-size:13.5px;line-height:1.85;color:var(--text)}
.exp-en,.exp-th{display:none}.exp-en.on,.exp-th.on{display:block}
.ans-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:16px;background:var(--green-bg);border:1px solid var(--green);color:var(--green);font-weight:700;font-size:13px;margin-bottom:10px}
.ans-badge-wrong{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:16px;background:var(--red-bg);border:1px solid var(--red);color:var(--red);font-weight:700;font-size:13px;margin-bottom:8px}
.stepper{margin:14px 0 0;border:1px solid var(--border);border-radius:9px;overflow:hidden}
.stepper-header{background:var(--card2);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.stepper-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.stepper-dots{display:flex;gap:5px}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:background .2s}
.sdot.active{background:var(--blue)}.sdot.done{background:var(--green)}
.stepper-body{padding:16px}
.stepper-step{display:none}.stepper-step.on{display:block;animation:fadein .2s}
.step-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--blue);margin-bottom:8px}
.step-text{font-size:14px;line-height:1.8;margin-bottom:8px}
.stepper-nav{display:flex;gap:8px;justify-content:flex-end;padding:8px 16px;background:var(--card2);border-top:1px solid var(--border)}
.sbtn{padding:6px 16px;border:1px solid var(--border);border-radius:6px;background:var(--card);font-size:13px;cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:500;color:var(--text);transition:all .12s}
.sbtn:hover{background:var(--card2)}.sbtn.pri{background:var(--blue);color:#fff;border-color:var(--blue)}.sbtn.pri:hover{background:#133d72}
.sbtn:disabled{opacity:.35;cursor:default}
.img-wrap{background:var(--card2);border-radius:8px;padding:10px;margin:10px 0;text-align:center}
.img-wrap img{max-width:100%;border-radius:6px}
.navrow{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-top:14px}
.btn{padding:10px 22px;border:1.5px solid var(--border);border-radius:9px;background:var(--card);font-size:14px;font-family:'Sarabun',sans-serif;color:var(--text);cursor:pointer;transition:all .14s;font-weight:500}
.btn:hover{background:var(--card2)}.btn:disabled{opacity:.35;cursor:default}
.btn.pri{background:var(--text);color:#fff;border-color:var(--text)}.btn.pri:hover{background:#333}
.result{text-align:center;padding:50px 20px}
.result .big{font-size:68px;font-weight:700;font-family:'DM Mono',monospace;line-height:1}
.result .total{font-size:20px;color:var(--muted);font-family:'DM Mono',monospace}
.result .msg{font-size:17px;margin-top:12px;color:var(--muted)}
.rgrid{display:flex;gap:30px;justify-content:center;margin:22px 0}
.rstat .n{font-size:28px;font-weight:700;font-family:'DM Mono',monospace}
.rstat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.tbreak{text-align:left;margin-top:20px;border-top:1px solid var(--border);padding-top:16px}
.tbreak h3{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.trow{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px}
.tname{min-width:140px;color:var(--text)}
.tbar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.tbfill{height:100%;background:var(--icq-teal);border-radius:3px}
.tpct{min-width:40px;text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}
.hidden{display:none}
code{background:#f0ede6;padding:2px 6px;border-radius:4px;font-family:'DM Mono',monospace;font-size:13px}
sub{font-size:0.75em;vertical-align:sub}
sup{font-size:0.75em;vertical-align:super}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">
    <div class="logo-icq"><span class="i-letter">I</span><span class="c-letter">C</span><span class="q-letter">Q</span></div>
    <div>
      <div class="logo-text">Chemistry Quiz Practice</div>
      <div class="logo-sub">ICQ 2023 — Intermediate (Year 9 &amp; 10)</div>
    </div>
  </div>
  <div class="top-stats">
    <div class="tstat"><div class="n w" id="h-done">0</div><div class="l">Done</div></div>
    <div class="tstat"><div class="n g" id="h-corr">0</div><div class="l">Correct</div></div>
    <div class="tstat"><div class="n r" id="h-wrong">0</div><div class="l">Wrong</div></div>
  </div>
</div>

<div class="wrap">
  <div class="prog-card">
    <div class="prog-row">
      <span class="prog-lbl">Progress</span>
      <span class="prog-val" id="prog-val">0/30</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="qnav-wrap" id="qnav"></div>
  <div id="quiz-view">
    <div id="qarea"></div>
    <div class="navrow">
      <button class="btn" id="btn-prev" onclick="go(cur-1)" disabled>← Prev</button>
      <span style="font-size:13px;color:var(--muted);font-family:'DM Mono',monospace" id="nav-lbl">1 / 30</span>
      <button class="btn pri" id="btn-next" onclick="go(cur+1)">Next →</button>
    </div>
  </div>
  <div id="result-view" class="result hidden"></div>
</div>

<script>
const stepState={};
function stpr(id,steps){
  const dots=steps.map((_,i)=>`<div class="sdot" id="${id}d${i}"></div>`).join('');
  const stepHtml=steps.map((s,i)=>`<div class="stepper-step" id="${id}s${i}"><div class="step-label">${s.label}</div><div class="step-text">${s.text}</div></div>`).join('');
  return `<div class="stepper" id="${id}">
    <div class="stepper-header"><span class="stepper-title">ขั้นตอนการคิด</span><div class="stepper-dots">${dots}</div></div>
    <div class="stepper-body">${stepHtml}</div>
    <div class="stepper-nav">
      <button class="sbtn" id="${id}btnP" onclick="stepPrev('${id}')" disabled>← ก่อน</button>
      <button class="sbtn pri" id="${id}btnN" onclick="stepNext('${id}')">ถัดไป →</button>
    </div>
  </div>`;
}
function initStepper(id,n){
  if(!stepState[id])stepState[id]={cur:0,n};
  showStep(id);
}
function showStep(id){
  const {cur,n}=stepState[id];
  for(let i=0;i<n;i++){
    const s=document.getElementById(id+'s'+i);
    const d=document.getElementById(id+'d'+i);
    if(s){s.className='stepper-step'+(i===cur?' on':'');}
    if(d){d.className='sdot'+(i<cur?' done':i===cur?' active':'');}
  }
  const pb=document.getElementById(id+'btnP');
  const nb=document.getElementById(id+'btnN');
  if(pb)pb.disabled=(cur===0);
  if(nb)nb.textContent=cur===n-1?'✓ จบ':'ถัดไป →';
}
function stepNext(id){
  const s=stepState[id];
  if(s.cur<s.n-1){s.cur++;showStep(id);}
}
function stepPrev(id){
  const s=stepState[id];
  if(s.cur>0){s.cur--;showStep(id);}
}

/* Q1 */
{n:1,topic:"Classification of Matter",diff:"easy",
en:`Consider the following substances:<br><br>
<table class='q-table' style='max-width:420px'>
<tr><td>(i) air</td><td>(v) oxygen</td></tr>
<tr><td>(ii) blood</td><td>(vi) sea water</td></tr>
<tr><td>(iii) carbon dioxide</td><td>(vii) sodium chloride</td></tr>
<tr><td>(iv) magnesium</td><td>(viii) sugar</td></tr>
</table><br>
What is the correct classification of these substances?<br><br>
<table class='q-table'>
<tr><th></th><th>Mixture</th><th>Element</th><th>Compound</th></tr>
<tr><td><b>A.</b></td><td>(i) (ii) and (vi)</td><td>(iv) and (v)</td><td>(iii) (vii) and (viii)</td></tr>
<tr><td><b>B.</b></td><td>(vi)</td><td>(iv) (v) and (viii)</td><td>(i) (ii) (iii) and (vii)</td></tr>
<tr><td><b>C.</b></td><td>(i) (ii) and (viii)</td><td>(iv) and (v)</td><td>(iii) (vi) and (vii)</td></tr>
<tr><td><b>D.</b></td><td>(i) and (vi)</td><td>(iv) (v) and (viii)</td><td>(ii) (iii) (vii) and (viii)</td></tr>
</table>`,
th:`พิจารณาสารต่อไปนี้:<br><br>
(i) อากาศ &nbsp; (ii) เลือด &nbsp; (iii) คาร์บอนไดออกไซด์ &nbsp; (iv) แมกนีเซียม<br>
(v) ออกซิเจน &nbsp; (vi) น้ำทะเล &nbsp; (vii) โซเดียมคลอไรด์ &nbsp; (viii) น้ำตาล<br><br>
การจำแนกประเภทสารที่ถูกต้องคืออะไร?`,
opts:["Mixture: (i)(ii)(vi) | Element: (iv)(v) | Compound: (iii)(vii)(viii)",
      "Mixture: (vi) | Element: (iv)(v)(viii) | Compound: (i)(ii)(iii)(vii)",
      "Mixture: (i)(ii)(viii) | Element: (iv)(v) | Compound: (iii)(vi)(vii)",
      "Mixture: (i)(vi) | Element: (iv)(v)(viii) | Compound: (ii)(iii)(vii)(viii)"],
ans:0,
exp_en:`<div class="ans-badge">✓ A. Mixture=(i)(ii)(vi) | Element=(iv)(v) | Compound=(iii)(vii)(viii)</div>
<p>Classify each substance:<br><br>
<b>Mixtures</b> (2+ substances combined):<br>
• (i) Air = mixture of N₂, O₂, Ar, CO₂, etc. ✓<br>
• (ii) Blood = mixture of water, cells, proteins, salts ✓<br>
• (vi) Sea water = mixture of water + dissolved salts ✓<br><br>
<b>Elements</b> (one type of atom only):<br>
• (iv) Magnesium (Mg) = pure element ✓<br>
• (v) Oxygen (O₂) = pure element ✓<br><br>
<b>Compounds</b> (two or more elements chemically combined):<br>
• (iii) Carbon dioxide (CO₂) = compound ✓<br>
• (vii) Sodium chloride (NaCl) = compound ✓<br>
• (viii) Sugar (C₁₂H₂₂O₁₁) = compound ✓<br><br>
→ Answer A ✓</p>`,
exp_th:`<div class="ans-badge">✓ A. Mixture=(i)(ii)(vi) | Element=(iv)(v) | Compound=(iii)(vii)(viii)</div>`+stpr("s1",[
  {label:"สารผสม (Mixture)",text:"(i) อากาศ = ผสม (N₂, O₂, Ar, ...)<br>(ii) เลือด = ผสม (น้ำ, เม็ดเลือด, โปรตีน, เกลือ)<br>(vi) น้ำทะเล = ผสม (น้ำ + เกลือที่ละลาย)"},
  {label:"ธาตุ (Element)",text:"(iv) แมกนีเซียม (Mg) = ธาตุ<br>(v) ออกซิเจน (O₂) = ธาตุ<br>มีอะตอมชนิดเดียวเท่านั้น"},
  {label:"สารประกอบ (Compound)",text:"(iii) คาร์บอนไดออกไซด์ CO₂ = สารประกอบ<br>(vii) โซเดียมคลอไรด์ NaCl = สารประกอบ<br>(viii) น้ำตาล C₁₂H₂₂O₁₁ = สารประกอบ<br><b>คำตอบ: A ✓</b>"},
])},

{n:2,topic:"Chemical Formulae",diff:"easy",
en:`Jarosite is a white mineral. Its formula is KFe<sub>3</sub>(SO<sub>4</sub>)<sub>2</sub>(OH)<sub>6</sub><br><br>

สูตรนี้แทน:`,

• Fe = 3<br>
• S = 2 (from (SO₄)₂)<br>
• O = 4×2 + 6 = 8 + 6 = 14 (from (SO₄)₂ and (OH)₆)<br>
• H = 6 (from (OH)₆)<br>
Total = 1 + 3 + 2 + 14 + 6 = <b>26 atoms</b></p>`,
exp_th:`<div class="ans-badge">✓ D. 5 ธาตุ และ 26 อะตอม</div>`+stpr("s2",[
  {label:"นับชนิดธาตุ",text:"KFe₃(SO₄)₂(OH)₆<br>ธาตุ: K, Fe, S, O, H → <b>5 ธาตุ</b>"},
  {label:"นับจำนวนอะตอม",text:"K = 1<br>Fe = 3<br>S = 2 (จาก (SO₄)₂)<br>O = 8 + 6 = 14 (จาก SO₄ และ OH)<br>H = 6"},
  {label:"รวม",text:"1 + 3 + 2 + 14 + 6 = <b>26 อะตอม</b><br><b>คำตอบ: D ✓</b>"},
])},

How many different dyes were in the inks that Dylan tested?<br><br>

{n:4,topic:"Radioactivity — Isotopes",diff:"medium",
context:`<div class='context-block'><div class='ctx-title'>📋 ข้อมูลสำหรับข้อ 4–5</div>
<b>The next two questions refer to the following information.</b><br><br>
The atomic number, mass number and symbol for an element can be shown as:<br>
`+imgTag(IMG_Q4Q5_1)+`
The atomic number is the number of protons in the atom. Each element has its own atomic number.<br>
The mass number is the number of protons + the number of neutrons in the atom.<br><br>
Part of the radioactive emission sequence for the radioactive <sup>238</sup><sub>92</sub>U isotope is shown.<br>
`+imgTag(IMG_Q4Q5_2)+`
</div>`,
en:`Which statement is correct about the <sup>234</sup><sub>90</sub>Th and <sup>234</sup><sub>92</sub>U isotopes?<br><br>
A. The thorium (Th) isotope has more neutrons but fewer protons than the uranium (U) isotope.<br>
B. The thorium (Th) isotope has more neutrons and more protons than the uranium (U) isotope.<br>
C. The thorium (Th) isotope has fewer neutrons but more protons than the uranium (U) isotope.<br>
D. The thorium (Th) isotope has fewer neutrons and fewer protons than the uranium (U) isotope.`,
th:`ข้อใดถูกต้องเกี่ยวกับไอโซโทป <sup>234</sup><sub>90</sub>Th และ <sup>234</sup><sub>92</sub>U?<br><br>
A. Th มีนิวตรอนมากกว่าแต่โปรตอนน้อยกว่า U<br>
B. Th มีนิวตรอนมากกว่าและโปรตอนมากกว่า U<br>
C. Th มีนิวตรอนน้อยกว่าแต่โปรตอนมากกว่า U<br>
D. Th มีนิวตรอนน้อยกว่าและโปรตอนน้อยกว่า U`,
opts:["Th has more neutrons but fewer protons than U",
      "Th has more neutrons AND more protons than U",
      "Th has fewer neutrons but more protons than U",
      "Th has fewer neutrons AND fewer protons than U"],
ans:0,
exp_en:`<div class="ans-badge">✓ A. Th has more neutrons but fewer protons than U</div>
<p>For <sup>234</sup><sub>90</sub>Th:<br>• Protons = 90, Neutrons = 234 − 90 = 144<br><br>
For <sup>234</sup><sub>92</sub>U:<br>• Protons = 92, Neutrons = 234 − 92 = 142<br><br>
Comparison:<br>
• Protons: Th (90) < U (92) → <b>Th has fewer protons</b><br>
• Neutrons: Th (144) > U (142) → <b>Th has more neutrons</b><br><br>
→ Answer A ✓</p>`,
exp_th:`<div class="ans-badge">✓ A — Th มีนิวตรอนมากกว่าแต่โปรตอนน้อยกว่า U</div>`+stpr("s4",[

  {label:"เปรียบเทียบ",text:"โปรตอน: Th (90) < U (92) → Th มีน้อยกว่า<br>นิวตรอน: Th (144) > U (142) → Th มีมากกว่า<br><b>คำตอบ: A ✓</b>"},
])},

/* Q5 */
{n:5,topic:"Radioactive Decay — Beta",diff:"medium",
en:`In early 2023 it was discovered that a tiny radioactive source, measuring 6 mm by 8 mm, had fallen off a truck in Western Australia. The radioactive material was <sup>137</sup><sub>55</sub>Cs which decays by β⁻ emission.<br><br>`+imgTag(IMG_Q5)+`<br>
What is the product of the radioactive decay of <sup>137</sup><sub>55</sub>Cs?<br><br>
A. <sup>133</sup><sub>53</sub>Ba &nbsp;&nbsp;&nbsp; B. <sup>133</sup><sub>56</sub>Ba &nbsp;&nbsp;&nbsp; C. <sup>137</sup><sub>53</sub>Ba &nbsp;&nbsp;&nbsp; D. <sup>137</sup><sub>56</sub>Ba`,
th:`ต้นปี 2023 พบว่าแหล่งกัมมันตรังสีขนาดเล็ก 6 mm × 8 mm หล่นออกจากรถบรรทุกในออสเตรเลียตะวันตก วัสดุกัมมันตรังสีคือ <sup>137</sup><sub>55</sub>Cs ซึ่งสลายตัวโดยการปล่อย β⁻<br><br>
ผลิตภัณฑ์ของการสลายตัวกัมมันตรังสีของ <sup>137</sup><sub>55</sub>Cs คืออะไร?`,
opts:["¹³³₅₃Ba","¹³³₅₆Ba","¹³⁷₅₃Ba","¹³⁷₅₆Ba"],
ans:3,
exp_en:`<div class="ans-badge">✓ D. ¹³⁷₅₆Ba</div>
<p>In β⁻ decay: a neutron converts to a proton + electron (β⁻ particle) + antineutrino.<br><br>
<b>Rules for β⁻ decay:</b><br>
• Mass number (A) stays the SAME: 137 → 137<br>
• Atomic number (Z) increases by 1: 55 → 56<br><br>
Element with Z=56 is <b>Barium (Ba)</b>.<br>
Product = <sup>137</sup><sub>56</sub>Ba ✓</p>`,
exp_th:`<div class="ans-badge">✓ D. <sup>137</sup><sub>56</sub>Ba</div>`+stpr("s5",[
  {label:"กฎการสลาย β⁻",text:"β⁻ emission: นิวตรอน → โปรตอน + อิเล็กตรอน<br>เลขมวล A <b>ไม่เปลี่ยน</b><br>เลขอะตอม Z <b>เพิ่มขึ้น 1</b>"},
  {label:"คำนวณ",text:"A: 137 → 137 (ไม่เปลี่ยน)<br>Z: 55 → 56 (เพิ่ม 1)<br>Z=56 คือธาตุ Barium (Ba)"},
  {label:"คำตอบ",text:"ผลิตภัณฑ์ = <sup>137</sup><sub>56</sub>Ba<br><b>คำตอบ: D ✓</b>"},
])},

{n:6,topic:"Hydrocarbons — Homologous Series",diff:"medium",
en:`Alkanes, alkenes and alkynes are groups of compounds containing only carbon (C) atoms and hydrogen (H) atoms. The name endings '-ane', '-ene' and '-yne' indicate different structures that exist within the molecules. These substances are called haloalkanes.<br><br>
The table shows the names and formulae of several hydrocarbons.<br><br>
<table class='q-table'>
<tr><th>Name</th><th>Hexane</th><th>Heptane</th><th>Hexene</th><th>Heptene</th><th>Hexyne</th><th>Heptyne</th></tr>
<tr><td>Formula</td><td>C₆H₁₄</td><td>C₇H₁₆</td><td>C₆H₁₂</td><td>C₇H₁₄</td><td>C₆H₁₀</td><td>C₇H₁₂</td></tr>
</table><br>
The prefix 'Undec-' means eleven (11). What is the formula for the compound undecyne?<br><br>
A. C₁₁H₁₁ &nbsp;&nbsp; B. C₁₁H₂₀ &nbsp;&nbsp; C. C₁₁H₂₂ &nbsp;&nbsp; D. C₁₁H₂₄`,
th:`คำนำหน้า 'Undec-' หมายถึง 11 สูตรโมเลกุลของ undecyne คืออะไร?`,
opts:["C₁₁H₁₁","C₁₁H₂₀","C₁₁H₂₂","C₁₁H₂₄"],
ans:1,
exp_en:`<div class="ans-badge">✓ B. C₁₁H₂₀</div>
<p>Find the pattern for alkynes from the table:<br>
• Hexyne (n=6): C₆H₁₀ = C₆H(2×6−2) = C₆H₁₀ ✓<br>
• Heptyne (n=7): C₇H₁₂ = C₇H(2×7−2) = C₇H₁₂ ✓<br><br>
<b>General formula for alkynes: CₙH(2n−2)</b><br><br>
Undecyne: n=11 → C₁₁H(2×11−2) = C₁₁H₂₀ ✓</p>`,
exp_th:`<div class="ans-badge">✓ B. C₁₁H₂₀</div>`+stpr("s6",[
  {label:"หาสูตรทั่วไปของ Alkyne",text:"Hexyne: C₆H₁₀ → 10 = 2×6 − 2<br>Heptyne: C₇H₁₂ → 12 = 2×7 − 2<br>สูตรทั่วไป alkyne: CₙH₍₂ₙ₋₂₎"},

])},

/* Q7 */
{n:7,topic:"Chemical Reactions — Pattern Recognition",diff:"medium",
en:`If a solution of potassium hydroxide (KOH) is added to an aqueous solution of nickel chloride (NiCl₂), a green precipitate forms. If ethanol (CH₃CH₂OH) is added to an aqueous solution of nickel chloride (NiCl₂), a green solution forms.<br><br>
Which of the following substances would be expected to form a precipitate with an aqueous solution of nickel chloride?<br><br>
A. water (H₂O)<br>
B. chloroethane (CH₃CH₂Cl)<br>
C. a solution of potassium chloride (KCl)<br>
D. a solution of sodium hydroxide (NaOH)`,
th:`ถ้าเติม KOH ลงใน NiCl₂(aq) จะได้ตะกอนสีเขียว ถ้าเติม CH₃CH₂OH จะได้สารละลายสีเขียว<br><br>
สารใดต่อไปนี้คาดว่าจะทำให้เกิดตะกอนกับ NiCl₂(aq)?`,
opts:["water (H₂O)","chloroethane (CH₃CH₂Cl)","a solution of potassium chloride (KCl)","a solution of sodium hydroxide (NaOH)"],
ans:3,
exp_en:`<div class="ans-badge">✓ D. a solution of sodium hydroxide (NaOH)</div>
<p>KOH forms a green precipitate with NiCl₂.<br>
The key component causing the precipitate is the OH⁻ ion, which forms Ni(OH)₂ (green precipitate).<br><br>
NaOH also provides OH⁻ ions → will also form the same green precipitate Ni(OH)₂.<br><br>
• Water, chloroethane, KCl – none of these provide OH⁻ ions → no precipitate.</p>`,
exp_th:`<div class="ans-badge">✓ D. สารละลาย NaOH</div>`+stpr("s7",[
  {label:"วิเคราะห์สิ่งที่ทำให้เกิดตะกอน",text:"KOH → ตะกอนสีเขียว<br>สิ่งสำคัญใน KOH คือ OH⁻<br>OH⁻ + Ni²⁺ → Ni(OH)₂ (ตะกอนสีเขียว)"},
  {label:"ตัวเลือกใดมี OH⁻?",text:"A. H₂O: ให้ OH⁻ น้อยมาก ไม่พอ<br>B. CH₃CH₂Cl: ไม่มี OH⁻<br>C. KCl: ไม่มี OH⁻<br>D. NaOH: มี OH⁻ ✓"},
  {label:"สรุป",text:"NaOH มี OH⁻ → ทำปฏิกิริยากับ Ni²⁺ → Ni(OH)₂ ตะกอนสีเขียว<br><b>คำตอบ: D ✓</b>"},
])},

/* Q8 */
{n:8,topic:"Haloalkanes — Boiling Points",diff:"hard",
en:`Fluorine (F), chlorine (Cl), bromine (Br) and iodine (I) are called halogens. The diagrams show two different structures each containing three carbon atoms, seven hydrogen atoms and one halogen atom. These substances are called haloalkanes.<br><br>`+imgTag(IMG_Q8)+`<br>
The table gives some information about different haloalkanes.<br><br>
<table class='q-table'>
<tr><th>Name</th><th>Halogen present</th><th>Mass of molecule (amu)</th><th>Structure 1 Boiling point (°C)</th><th>Structure 2 Boiling point (°C)</th></tr>
<tr><td>fluoropropane</td><td>fluorine</td><td>62</td><td>−2.5</td><td>−10</td></tr>
<tr><td>chloropropane</td><td>chlorine</td><td>78.5</td><td>47.2</td><td>35.7</td></tr>
<tr><td>bromopropane</td><td>bromine</td><td>123</td><td>?</td><td>?</td></tr>
<tr><td>iodopropane</td><td>iodine</td><td>170</td><td>102</td><td>89.5</td></tr>
</table><br>
Consider these statements:<br>
(i) Changing the position of the halogen in the molecule has a greater effect on the boiling point than changing the halogen.<br>
(ii) Changing the halogen has a greater effect on the boiling point than changing its position in the molecule.<br>
(iii) The boiling points for the two bromopropane structures are, in order, approximately 70 °C and 60 °C.<br>
(iv) The boiling points for the two bromopropane structures are, in order, approximately 70 °C and 80 °C.<br><br>
Which two statements are correct?<br>
A. (i) and (iii) &nbsp;&nbsp; B. (i) and (iv) &nbsp;&nbsp; C. (ii) and (iii) &nbsp;&nbsp; D. (ii) and (iv)`,
th:`พิจารณาข้อความต่อไปนี้เกี่ยวกับ haloalkane และจุดเดือด<br><br>
ข้อใดถูกต้องสองข้อ?`,
opts:["(i) and (iii)","(i) and (iv)","(ii) and (iii)","(ii) and (iv)"],
ans:2,
exp_en:`<div class="ans-badge">✓ C. (ii) and (iii)</div>
<p><b>Check statement (i) vs (ii):</b><br>
Changing halogen (F→Cl): bp changes from −2.5 → 47.2 = ~50°C change (Structure 1)<br>
Changing position (Str1→Str2): bp changes 47.2 → 35.7 = ~12°C change (for chloropropane)<br>
→ Changing the halogen has GREATER effect → statement <b>(ii) is correct</b>, (i) is wrong.<br><br>
<b>Check (iii) vs (iv) — predict bromopropane bp:</b><br>
Trend from F→Cl→I (mass 62→78.5→170, bp −2.5→47.2→102):<br>
Mass 123 (Br) is between Cl(78.5) and I(170), approximately halfway.<br>
Linear interpolation: 47.2 + (102−47.2)×(123−78.5)/(170−78.5) ≈ 71°C (Structure 1)<br>
Structure 2 would be about 60°C.<br>
→ statement <b>(iii): ~70°C and 60°C is correct</b>.<br>
Statement (iv) says 70°C and 80°C — wrong because Structure 2 < Structure 1.</p>`,
exp_th:`<div class="ans-badge">✓ C. (ii) และ (iii)</div>`+stpr("s8",[
  {label:"ตรวจสอบ (i) vs (ii)",text:"เปลี่ยน halogen (F→Cl): bp เปลี่ยน ~50°C<br>เปลี่ยนตำแหน่ง (Structure 1→2): bp เปลี่ยน ~12°C<br>→ การเปลี่ยน halogen มีผลมากกว่า → <b>(ii) ถูก</b>"},
  {label:"ทำนาย bp ของ bromopropane",text:"แนวโน้ม: F(−2.5°C) → Cl(47.2°C) → I(102°C)<br>Br อยู่ระหว่าง Cl และ I → bp ≈ 71°C (Structure 1)<br>Structure 2 ≈ 60°C"},
  {label:"ตรวจสอบ (iii) vs (iv)",text:"(iii): ~70°C และ 60°C ✓<br>(iv): ~70°C และ 80°C ✗ (Structure 2 < Structure 1 เสมอ)<br><b>คำตอบ: C = (ii) และ (iii) ✓</b>"},
])},

/* Q9 */
{n:9,topic:"Stoichiometry — Limiting Reagent",diff:"medium",
en:`The balanced equation for the reaction of carbon monoxide with oxygen gas is:<br><br>
<code>2CO(g) + O₂(g) → 2CO₂(g)</code><br><br>
If 1000 CO(g) molecules are mixed with 5000 O₂(g) molecules and allowed to react, what is the total number of gas molecules in the final mixture?<br><br>
A. 1000 &nbsp;&nbsp; B. 3000 &nbsp;&nbsp; C. 5000 &nbsp;&nbsp; D. 5500`,
th:`สมการที่ดุลแล้ว: 2CO(g) + O₂(g) → 2CO₂(g)<br><br>
ถ้าผสม CO 1000 โมเลกุลกับ O₂ 5000 โมเลกุล แล้วปล่อยให้ทำปฏิกิริยา จะมีโมเลกุลแก๊สทั้งหมดกี่โมเลกุลในส่วนผสมสุดท้าย?`,
opts:["1000","3000","5000","5500"],
ans:3,
exp_en:`<div class="ans-badge">✓ D. 5500</div>
<p>Ratio: 2CO : 1O₂ → 2CO₂<br><br>
Starting: 1000 CO and 5000 O₂<br>
O₂ needed to react all CO: 1000/2 = 500 O₂<br><br>
CO is the limiting reagent (only 1000 CO but need 2:1 ratio so O₂ in excess).<br><br>
Reaction uses: 1000 CO + 500 O₂ → 1000 CO₂<br>
Remaining O₂: 5000 − 500 = <b>4500 O₂</b><br>
CO₂ produced: <b>1000 CO₂</b><br><br>
Total molecules = 4500 + 1000 = <b>5500</b> ✓</p>`,
exp_th:`<div class="ans-badge">✓ D. 5500 โมเลกุล</div>`+stpr("s9",[
  {label:"หา limiting reagent",text:"2CO : 1O₂ → 2CO₂<br>มี CO = 1000, O₂ = 5000<br>O₂ ที่ต้องการ = 1000/2 = 500<br>O₂ มี 5000 >> 500 → O₂ เกิน, CO เป็น limiting reagent"},
  {label:"คำนวณสิ่งที่เกิด",text:"CO ใช้ไป = 1000<br>O₂ ใช้ไป = 500<br>CO₂ ผลิตได้ = 1000<br>O₂ เหลือ = 5000 − 500 = 4500"},
  {label:"รวมโมเลกุลทั้งหมด",text:"O₂ เหลือ + CO₂ = 4500 + 1000 = <b>5500 โมเลกุล</b><br><b>คำตอบ: D ✓</b>"},
])},

en:`Benzene, C₆H₆, is used for making explosives, plastics, dyes and fuels.<br>

opts:["C₁₁H₆O₃","C₁₁H₉O₃","C₁₂H₉O₃","C₁₂H₆O₃"],
ans:0,
exp_en:`<div class="ans-badge">✓ A. C₁₁H₆O₃</div>

→ Formula: <b>C₁₁H₆O₃</b><br><br>

{n:11,topic:"Combining Equations",diff:"hard",
en:`A blast furnace can be used to obtain iron (Fe) from iron oxide (FeO). The equations for two reactions taking place in a blast furnace are:<br><br>
<code>C(s) + CO₂(g) → 2CO(g)</code><br>
<code>CO(g) + FeO(s) → Fe(l) + CO₂(g)</code><br><br>
Which one balanced equation can be derived from these two reactions?<br><br>
A. 2C(s) + 2FeO(s) → Fe(l) + CO₂(g)<br>
B. C(s) + 2FeO(s) → 2Fe(l) + CO₂(g)<br>
C. C(s) + 2FeO(s) + CO₂(g) → 2Fe(l) + 2CO(g)<br>
D. 2C(s) + FeO(s) + 2CO₂(g) → Fe(l) + 2CO(g) + CO₂(g)`,
th:`จากสมการสองสมการในเตาถลุงเหล็ก สามารถรวมได้เป็นสมการดุลสมการใดต่อไปนี้?`,
opts:["2C(s) + 2FeO(s) → Fe(l) + CO₂(g)","C(s) + 2FeO(s) → 2Fe(l) + CO₂(g)","C(s) + 2FeO(s) + CO₂(g) → 2Fe(l) + 2CO(g)","2C(s) + FeO(s) + 2CO₂(g) → Fe(l) + 2CO(g) + CO₂(g)"],
ans:1,
exp_en:`<div class="ans-badge">✓ B. C(s) + 2FeO(s) → 2Fe(l) + CO₂(g)</div>
<p>Equation 1: C + CO₂ → 2CO<br>
Equation 2: CO + FeO → Fe + CO₂<br><br>
To eliminate CO (intermediate), multiply Eq 2 by 2:<br>
2CO + 2FeO → 2Fe + 2CO₂<br><br>
Add to Eq 1:<br>
C + CO₂ + 2CO + 2FeO → 2CO + 2Fe + 2CO₂<br><br>
Cancel 2CO from both sides:<br>
C + CO₂ + 2FeO → 2Fe + 2CO₂<br><br>
Cancel one CO₂:<br>
<b>C + 2FeO → 2Fe + CO₂ ✓</b></p>`,
exp_th:`<div class="ans-badge">✓ B. C(s) + 2FeO(s) → 2Fe(l) + CO₂(g)</div>`+stpr("s11",[
  {label:"สมการ 1 และ 2",text:"(1): C + CO₂ → 2CO<br>(2): CO + FeO → Fe + CO₂"},
  {label:"คูณสมการ 2 ด้วย 2",text:"2CO + 2FeO → 2Fe + 2CO₂"},
  {label:"รวมสมการ แล้วตัดออก",text:"(1)+(2×2): C + CO₂ + 2CO + 2FeO → 2CO + 2Fe + 2CO₂<br>ตัด 2CO ออก: C + CO₂ + 2FeO → 2Fe + 2CO₂<br>ตัด CO₂ ออก: <b>C + 2FeO → 2Fe + CO₂ ✓</b>"},
])},

en:`Maltodextrin is a highly processed carbohydrate that is used as a food additive. It is a polysaccharide with the formula C₆ₙH₍₁₀ₙ₊₂₎O₍₅ₙ₊₁₎ where n is between 2 and 20.<br><br>

/* Q15 */
{n:15,topic:"Balancing Equations — Stoichiometry",diff:"medium",
en:`The unbalanced equation for the burning of methanol in oxygen is:<br><br>
<code>CH₃OH(l) + O₂(g) → CO₂(g) + H₂O(l)</code><br><br>
If 100 molecules of CO₂(g) are produced, how many molecules of O₂(g) reacted?<br><br>
A. 100 &nbsp;&nbsp; B. 125 &nbsp;&nbsp; C. 150 &nbsp;&nbsp; D. 200`,
th:`สมการที่ยังไม่ดุล: CH₃OH(l) + O₂(g) → CO₂(g) + H₂O(l)<br><br>
ถ้าผลิต CO₂ ได้ 100 โมเลกุล ต้องใช้ O₂ กี่โมเลกุล?`,
opts:["100","125","150","200"],
ans:2,
exp_en:`<div class="ans-badge">✓ C. 150</div>
<p>First balance the equation:<br>
CH₃OH + O₂ → CO₂ + H₂O<br><br>
Balance C: 1 CH₃OH → 1 CO₂ ✓<br>
Balance H: 4H in CH₃OH → 2 H₂O (4H) ✓<br>
Balance O: Left: 1 (from CH₃OH) + 2O₂; Right: 2 + 2 = 4<br>
So: 1 + 2x = 4 → 2x = 3 → x = 1.5<br><br>
<b>2CH₃OH + 3O₂ → 2CO₂ + 4H₂O</b><br><br>
Ratio: 3 O₂ per 2 CO₂ = 1.5 O₂ per CO₂<br>
For 100 CO₂: O₂ = 100 × 1.5 = <b>150</b> ✓</p>`,
exp_th:`<div class="ans-badge">✓ C. 150 โมเลกุล</div>`+stpr("s15",[
  {label:"ดุลสมการ",text:"CH₃OH + O₂ → CO₂ + H₂O<br>C: ✓, H: 4H → 2H₂O ✓<br>O: 1 + 2x = 4 → x = 3/2<br>→ 2CH₃OH + 3O₂ → 2CO₂ + 4H₂O"},
  {label:"อัตราส่วน",text:"O₂ : CO₂ = 3 : 2<br>O₂ ต่อ CO₂ = 3/2 = 1.5"},
  {label:"คำนวณ",text:"CO₂ = 100 โมเลกุล<br>O₂ = 100 × 1.5 = <b>150 โมเลกุล</b><br><b>คำตอบ: C ✓</b>"},
])},

{n:20,topic:"Acid-Base Reactions — Neutralisation",diff:"medium",
en:`Hydrochloric acid reacts with sodium hydroxide solution according to the equation:<br><br>
<code>HCl(aq) + NaOH(aq) → H₂O(l) + NaCl(aq)</code><br><br>
Heat is given off during the reaction.<br><br>
Ashwyn added different volumes of the same hydrochloric acid to different volumes of the same sodium hydroxide solution to make a total volume of 100 mL each time. He recorded the maximum temperature reached by each mixture.<br><br>`+imgTag(IMG_Q20)+`<br>
Ashwyn's results suggest that<br><br>
A. 30 mL of HCl(aq) contained more heat energy than 70 mL of NaOH(aq).<br>
B. before mixing, the HCl(aq) was at a higher temperature than the NaOH(aq).<br>
C. the HCl(aq) was more concentrated than the NaOH(aq).<br>
D. 30 mL of HCl(aq) is half as concentrated as 70 mL of NaOH(aq).`,
th:`ผลการทดลอง Neutralisation ของ HCl + NaOH แสดงดังกราฟ<br><br>
ผลการทดลองของ Ashwyn บอกว่าอะไร?`,
opts:["30 mL HCl มีพลังงานความร้อนมากกว่า 70 mL NaOH",
      "ก่อนผสม HCl มีอุณหภูมิสูงกว่า NaOH",
      "HCl มีความเข้มข้นมากกว่า NaOH",
      "HCl 30 mL มีความเข้มข้นครึ่งหนึ่งของ NaOH 70 mL"],
ans:2,
exp_en:`<div class="ans-badge">✓ C. HCl was more concentrated than NaOH</div>
<p>The maximum temperature (maximum neutralisation) occurs when HCl and NaOH react in exact stoichiometric ratio (1:1 moles).<br><br>
From the graph, maximum temperature is at approximately 40 mL HCl and 60 mL NaOH.<br>
This means moles of HCl in 40 mL = moles of NaOH in 60 mL<br>
→ c(HCl) × 40 = c(NaOH) × 60<br>
→ c(HCl)/c(NaOH) = 60/40 = 1.5<br><br>
HCl is 1.5× more concentrated than NaOH → <b>HCl is more concentrated</b> ✓</p>`,
exp_th:`<div class="ans-badge">✓ C. HCl มีความเข้มข้นมากกว่า NaOH</div>`+stpr("s20",[
  {label:"อ่านกราฟ",text:"อุณหภูมิสูงสุดเกิดที่จุด neutral สมบูรณ์<br>จากกราฟ: HCl ≈ 40 mL, NaOH ≈ 60 mL"},
  {label:"ตั้งสมการโมล",text:"mol HCl = mol NaOH<br>c(HCl)×40 = c(NaOH)×60<br>c(HCl)/c(NaOH) = 60/40 = 1.5"},
  {label:"สรุป",text:"HCl มีความเข้มข้นมากกว่า NaOH 1.5 เท่า<br><b>คำตอบ: C ✓</b>"},
])},

/* Q21 */
{n:21,topic:"Relative Atomic Mass",diff:"hard",
en:`The graphs show the composition of a compound comprising two elements; Q and R.<br><br>`+imgTag(IMG_Q21)+`<br>
What is the approximate relative mass of an atom of Q compared to that of an atom of R?<br><br>
A. 0.4 &nbsp;&nbsp; B. 0.8 &nbsp;&nbsp; C. 1.3 &nbsp;&nbsp; D. 3.2`,
th:`กราฟแสดงองค์ประกอบของสารประกอบที่มีธาตุ Q และ R<br><br>
อัตราส่วนมวลสัมพัทธ์ของอะตอม Q ต่ออะตอม R ประมาณเท่าใด?`,
opts:["0.4","0.8","1.3","3.2"],
ans:3,
exp_en:`<div class="ans-badge">✓ D. 3.2</div>
<p>From the graphs:<br>
• Left graph (% composition by mass): Q ≈ <b>57%</b>, R ≈ <b>43%</b> (Q bar is taller)<br>
• Right graph (number of atoms): Q ≈ <b>2</b>, R ≈ <b>5</b><br><br>
Relative mass per atom of Q compared to R:<br>
= (% mass of Q / number of Q atoms) ÷ (% mass of R / number of R atoms)<br>
= (57/2) ÷ (43/5)<br>
= 28.5 ÷ 8.6<br>
= <b>3.3 ≈ 3.2</b> ✓</p>`,
exp_th:`<div class="ans-badge">✓ D. ≈ 3.2</div>`+stpr("s21",[
  {label:"อ่านกราฟซ้าย (% มวล)",text:"Q bar สูงกว่า R bar<br>% Q ≈ 57%, % R ≈ 43%"},
  {label:"อ่านกราฟขวา (จำนวนอะตอม)",text:"จำนวนอะตอม Q ≈ 2, R ≈ 5"},
  {label:"คำนวณมวลสัมพัทธ์",text:"มวล/อะตอม Q ÷ มวล/อะตอม R<br>= (57/2) ÷ (43/5)<br>= 28.5 ÷ 8.6<br>= <b>3.3 ≈ 3.2</b><br><b>คำตอบ: D ✓</b>"},
])},

/* Q22 */
{n:22,topic:"Gas Reactions — Volume",diff:"hard",
en:`When gases X and Y are mixed, exactly 1 litre of gas X reacts with 2 litres of gas Y to form 1 litre of gas Z.<br><br>
Gas N doesn't react with any other gas. It simply adds to the total volume.<br>
i.e. 1 L of gas N mixes with 1 L of gas P to make a 2 L mixture containing equal amounts of gases N and P.<br><br>
In an experiment, 2 L of gas X was mixed with 2 L of gas Y and 2 L of gas N.<br><br>
What would be the final volume?<br><br>
A. 3 L &nbsp;&nbsp; B. 4 L &nbsp;&nbsp; C. 5 L &nbsp;&nbsp; D. 6 L`,
th:`แก๊ส X ทำปฏิกิริยากับ Y: X(1L) + Y(2L) → Z(1L)<br>
แก๊ส N ไม่ทำปฏิกิริยา<br><br>
ผสม X(2L) + Y(2L) + N(2L) ปริมาตรสุดท้ายคือเท่าใด?`,
opts:["3 L","4 L","5 L","6 L"],
ans:1,
exp_en:`<div class="ans-badge">✓ B. 4 L</div>
<p>Reaction: 1X + 2Y → 1Z<br><br>
Starting: 2L X, 2L Y, 2L N<br><br>
<b>Find limiting reagent:</b><br>
To use all 2L X would need 4L Y — but only 2L Y available → <b>Y is limiting</b><br><br>
<b>Reaction proceeds:</b><br>
• 1L X + 2L Y → 1L Z<br><br>
<b>After reaction:</b><br>
• X remaining: 2 − 1 = 1L<br>
• Y remaining: 0L<br>
• Z produced: 1L<br>
• N unchanged: 2L<br><br>
Total = 1 + 0 + 1 + 2 = <b>4 L</b> ✓</p>`,
exp_th:`<div class="ans-badge">✓ B. 4 L</div>`+stpr("s22",[
  {label:"ปฏิกิริยาและสัดส่วน",text:"1X + 2Y → 1Z<br>ต้องการ X:Y = 1:2 โดยปริมาตร<br>N ไม่ทำปฏิกิริยา"},
  {label:"หา limiting reagent",text:"X=2L ต้องการ Y=4L แต่มีแค่ 2L → Y เป็น limiting<br>1L X + 2L Y → 1L Z"},
  {label:"รวมสุดท้าย",text:"X เหลือ = 2−1 = 1L<br>Z ผลิต = 1L<br>N คงเดิม = 2L<br>รวม = 1+0+1+2 = <b>4L</b><br><b>คำตอบ: B ✓</b>"},
])},

/* Q23 */
{n:23,topic:"Combined Gas Law",diff:"hard",
en:`The combined gas equation relates pressure, volume and temperature when other factors are held constant.<br><br>
The equation is: <b>P₁V₁/T₁ = P₂V₂/T₂</b><br><br>
Where: P₁ and P₂ are the initial and final pressure in kilopascals (kPa); V₁ and V₂ are the initial and final volume in litres (L); T₁ and T₂ are the initial and final temperature in kelvin (K).<br><br>
Some gas bubbles formed at the bottom of a salty lake 50 m deep and rose to the surface in a steady stream. The pressure at the bottom of the lake was 600 kPa and the temperature was 288 K. The pressure at the surface was 100 kPa and the temperature was 298 K. The average volume of the gas bubbles at the surface was 2.5 mL.<br><br>
What was the average gas bubble volume, in mL, at the bottom of the lake?<br><br>
A. 0.40 &nbsp;&nbsp; B. 0.80 &nbsp;&nbsp; C. 1.7 &nbsp;&nbsp; D. 2.5`,
th:`ใช้สมการแก๊สรวม P₁V₁/T₁ = P₂V₂/T₂<br><br>
ฟองแก๊สที่ก้นทะเลสาบ: P₁=600 kPa, T₁=288 K<br>
ที่ผิวน้ำ: P₂=100 kPa, T₂=298 K, V₂=2.5 mL<br><br>
ปริมาตรฟองแก๊สที่ก้นทะเลสาบเท่าใด?`,
opts:["0.40 mL","0.80 mL","1.7 mL","2.5 mL"],
ans:0,
exp_en:`<div class="ans-badge">✓ A. 0.40 mL</div>
<p>P₁V₁/T₁ = P₂V₂/T₂<br><br>
V₁ = P₂V₂T₁ / (P₁T₂)<br>
V₁ = (100 × 2.5 × 288) / (600 × 298)<br>
V₁ = 72000 / 178800<br>
V₁ = <b>0.403 ≈ 0.40 mL</b> ✓</p>`,
exp_th:`<div class="ans-badge">✓ A. 0.40 mL</div>`+stpr("s23",[
  {label:"ตั้งสมการ",text:"P₁V₁/T₁ = P₂V₂/T₂<br>V₁ = P₂V₂T₁ / (P₁T₂)"},
  {label:"แทนค่า",text:"V₁ = (100 × 2.5 × 288) / (600 × 298)<br>= 72000 / 178800"},
  {label:"คำนวณ",text:"V₁ = 0.403 ≈ <b>0.40 mL</b><br><b>คำตอบ: A ✓</b>"},
])},

/* Q24 */
{n:24,topic:"Structural Isomers — Benzene Derivatives",diff:"hard",
en:`Compound A is a benzene molecule, C₆H₆, in which the hydrogen atoms on carbons 1, 2, and 4 have been replaced by atoms of different elements labelled as V (not vanadium in this case).<br><br>`+imgTag(IMG_Q24)+`<br>
How many possible structures are there of Compound A when one V represents fluorine, one is chlorine, and one is bromine?<br><br>
A. 3 &nbsp;&nbsp; B. 6 &nbsp;&nbsp; C. 9 &nbsp;&nbsp; D. 12`,
th:`Compound A คือโมเลกุล benzene ที่มี H ที่คาร์บอน 1, 2, 4 ถูกแทนด้วยธาตุ V<br><br>
ถ้า V แต่ละตัวคือ F, Cl, Br ตัวละหนึ่งตัว มีโครงสร้างเป็นไปได้กี่แบบ?`,
opts:["3","6","9","12"],
ans:1,
exp_en:`<div class="ans-badge">✓ B. 6</div>
<p>Compound A has V at positions 1, 2, and 4 on the benzene ring.<br>
We need to assign F, Cl, Br to these 3 positions.<br><br>
Number of ways = 3! = 3 × 2 × 1 = <b>6</b> arrangements<br><br>
(Position 1=F, 2=Cl, 4=Br); (1=F, 2=Br, 4=Cl); (1=Cl, 2=F, 4=Br); etc.<br>
All 6 give different structures since the positions (1,2,4) are fixed but distinguishable.</p>`,
exp_th:`<div class="ans-badge">✓ B. 6 โครงสร้าง</div>`+stpr("s24",[
  {label:"ตำแหน่ง V",text:"V อยู่ที่ตำแหน่ง 1, 2, 4 บน benzene ring<br>ต้องจัด F, Cl, Br ให้กับ 3 ตำแหน่งนี้"},
  {label:"นับการเรียงสับเปลี่ยน",text:"จัด 3 ธาตุลง 3 ตำแหน่ง = 3! = 6 วิธี"},
  {label:"คำตอบ",text:"<b>B. 6 ✓</b>"},
])},

/* Q25 */
{n:25,topic:"Temperature Scales",diff:"medium",
en:`A number of temperature scales have been developed since Isaac Newton's first linseed oil thermometer in 1701. The more common scales are the Celsius (°C), Fahrenheit (°F) and Kelvin (K) scales.<br><br>
The graphs show the relationship between these scales.<br><br>`+imgTag(IMG_Q25)+`<br>
The Fahrenheit scale is commonly used in the United States. Many chemistry calculations rely on using the Kelvin scale.<br><br>
A temperature of 200 °F would be approximately what temperature on the Kelvin scale?<br><br>
A. 120 K &nbsp;&nbsp; B. 200 K &nbsp;&nbsp; C. 365 K &nbsp;&nbsp; D. 380 K`,
th:`ดูกราฟความสัมพันธ์ระหว่าง Fahrenheit, Celsius และ Kelvin<br><br>
อุณหภูมิ 200 °F มีค่าเท่าใดบนสเกล Kelvin?`,
opts:["120 K","200 K","365 K","380 K"],
ans:2,
exp_en:`<div class="ans-badge">✓ C. 365 K</div>
<p>Convert 200°F to Celsius:<br>
°C = (°F − 32) × 5/9 = (200 − 32) × 5/9 = 168 × 5/9 = <b>93.3°C</b><br><br>
Convert to Kelvin:<br>
K = 93.3 + 273.15 = <b>366.5 K ≈ 365 K</b> ✓</p>`,
exp_th:`<div class="ans-badge">✓ C. ≈ 365 K</div>`+stpr("s25",[
  {label:"แปลง °F → °C",text:"°C = (°F − 32) × 5/9<br>= (200 − 32) × 5/9 = 168 × 5/9 = <b>93.3°C</b>"},
  {label:"แปลง °C → K",text:"K = °C + 273.15 = 93.3 + 273.15 = <b>366.5 K</b>"},
  {label:"คำตอบ",text:"366.5 K ≈ <b>365 K</b><br><b>คำตอบ: C ✓</b>"},
])},

{n:26,topic:"Feldspar Crystallisation",diff:"hard",
context:`<div class='context-block'><div class='ctx-title'>📋 ข้อมูลสำหรับข้อ 26–27</div>
<b>The next two questions refer to the following information.</b><br><br>
Plagioclase feldspars are a series of aluminium silicate minerals. Albite is a sodium-rich feldspar that is at one end of the series. Its formula is NaAlSi₃O₈. Anorthite is a calcium-rich feldspar with the formula CaAl₂Si₂O₈. It is the other end member of the plagioclase series.<br><br>
As molten rock cools, feldspar crystals form over a range of temperatures. The ratio of albite and anorthite crystals changes as the temperature changes.<br><br>
The relationship is shown in the graph.<br><br>
To determine the composition of the first crystal that forms when given the composition of the molten rock:<br>
Step 1: Find where the composition of the molten rock meets the liquidus. This is the temperature at which the first crystal forms.<br>
Step 2: From this point, move horizontally across the diagram to the solidus. This point indicates the crystal composition.<br>
`+imgTag(IMG_Q26Q27)+`</div>`,
en:`A mass of molten rock is at 1600 °C. It is found to be 40 weight % calcium. At what temperature will the first crystal form, and what will be its composition?<br><br>
A. 1420 °C; 78% anorthite, 22% albite<br>
B. 1420 °C; 40% anorthite, 60% albite<br>
C. 1220 °C; 3% anorthite, 97% albite<br>
D. 1220 °C; 97% anorthite, 3% albite`,
th:`หินหลอมเหลวอยู่ที่ 1600°C และมีแคลเซียม 40% โดยมวล<br><br>
ที่อุณหภูมิใดผลึกแรกจะก่อตัว และองค์ประกอบเป็นอย่างไร?`,
opts:["1420°C; 78% anorthite, 22% albite","1420°C; 40% anorthite, 60% albite","1220°C; 3% anorthite, 97% albite","1220°C; 97% anorthite, 3% albite"],
ans:0,
exp_en:`<div class="ans-badge">✓ A. 1420 °C; 78% anorthite, 22% albite</div>
<p><b>Step 1:</b> Find where 40% calcium (weight) meets the liquidus curve.<br>
Reading from the graph, the liquidus at 40% calcium is at approximately <b>1420°C</b>.<br><br>
<b>Step 2:</b> Move horizontally from the liquidus point to the solidus.<br>
At 1420°C, moving horizontally hits the solidus at approximately <b>78% calcium</b> = 78% anorthite, 22% albite.<br><br>
Answer A ✓</p>`,
exp_th:`<div class="ans-badge">✓ A. 1420°C; 78% anorthite, 22% albite</div>`+stpr("s26",[
  {label:"ขั้นที่ 1 หา liquidus",text:"Ca 40% พบ liquidus ที่ประมาณ 1420°C"},
  {label:"ขั้นที่ 2 ลากแนวนอน",text:"จาก 1420°C บน liquidus → ลากแนวนอนไปพบ solidus<br>→ อ่านได้ Ca ≈ 78% = anorthite 78%, albite 22%"},
  {label:"คำตอบ",text:"<b>A. 1420°C; 78% anorthite, 22% albite ✓</b>"},
])},

/* Q27 */
{n:27,topic:"Feldspar Crystallisation",diff:"hard",
en:`Which statement is correct?<br><br>
A. As the temperature of the molten rock decreases, the percentage of sodium in the crystals formed increases.<br>
B. Crystals that form early are rich in sodium while crystals that form later are rich in calcium.<br>
C. Both pure albite and pure anorthite are solid at temperatures above 1600 °C.<br>
D. A solid rock that has a 30% anorthite composition will melt at a higher temperature than a solid rock that has a 30% albite composition.`,
th:`ข้อใดถูกต้อง?`,
opts:["เมื่ออุณหภูมิลดลง % โซเดียมในผลึกเพิ่มขึ้น",
      "ผลึกที่ก่อตัวก่อนร่ำรวย Na ผลึกที่ก่อตัวทีหลังร่ำรวย Ca",
      "ทั้ง pure albite และ pure anorthite เป็นของแข็งที่อุณหภูมิ > 1600°C",
      "หินที่มี anorthite 30% จะหลอมที่อุณหภูมิสูงกว่าหินที่มี albite 30%"],
ans:0,
exp_en:`<div class="ans-badge">✓ A. As temperature decreases, % sodium in crystals increases</div>
<p>From the phase diagram:<br>
• At high temperatures (early crystallisation): solidus shows high calcium (anorthite-rich) crystals<br>
• As temperature decreases: new crystals become more sodium-rich (albite-rich)<br><br>
So as temperature DECREASES, the newly forming crystals have more sodium (albite).<br>
→ Statement A is correct ✓<br><br>
Statement B is WRONG: early crystals are calcium-rich (anorthite), late crystals are sodium-rich (albite).</p>`,
exp_th:`<div class="ans-badge">✓ A. เมื่ออุณหภูมิลดลง % Na ในผลึกเพิ่มขึ้น</div>`+stpr("s27",[
  {label:"อ่าน Phase Diagram",text:"อุณหภูมิสูง (ก่อตัวก่อน): solidus ชี้ที่ Ca สูง → ผลึก anorthite (Ca-rich)<br>อุณหภูมิต่ำลง: solidus เลื่อนมาทาง Na → ผลึก albite (Na-rich)"},
  {label:"ตรวจสอบข้อ A",text:"อุณหภูมิลดลง → ผลึกใหม่ที่ก่อตัวมี Na มากขึ้น → % Na ใน crystal เพิ่ม → <b>A ถูก</b>"},
  {label:"ตรวจ B (ผิด)",text:"B บอกว่าผลึกก่อนมี Na รวย — ผิด! ผลึกก่อนมี Ca รวย (anorthite)<br><b>คำตอบ: A ✓</b>"},
])},

{n:28,topic:"Refractive Index",diff:"medium",
en:`The refractive index of a substance is the ratio of the speed of light in a vacuum to the speed of light through the substance. It can be useful for identifying a substance.<br><br>
Gabi was using a refractometer to determine the identity of an organic liquid. She measured the refractive index of the substance as 1.37 ± 0.005.<br><br>
Gabi used a reference table and found the following data:<br><br>

<tr><th>Substance</th><th>Refractive Index</th></tr>
<tr><td>Pentane</td><td>1.3575</td></tr>
<tr><td>Acetone</td><td>1.3586</td></tr>
<tr><td>Ethyl Alcohol</td><td>1.3614</td></tr>
<tr><td>Methyl t-Butyl Ether</td><td>1.3689</td></tr>
<tr><td>Ethyl Acetate</td><td>1.3724</td></tr>
<tr><td>Hexane</td><td>1.3749</td></tr>
<tr><td>Isopropyl Alcohol</td><td>1.3772</td></tr>
<tr><td>Methyl Ethyl Ketone</td><td>1.3788</td></tr>
<tr><td>n-Propyl Alcohol</td><td>1.3856</td></tr>
<tr><td>Heptane</td><td>1.3876</td></tr>
</table><br>
Based on the measured refractive index, how many of these substances could Gabi's unknown substance be?<br><br>
A. 1 &nbsp;&nbsp; B. 3 &nbsp;&nbsp; C. 5 &nbsp;&nbsp; D. 7`,

จากตารางข้อมูล สารชนิดใดบ้างที่เป็นไปได้? (กี่ชนิด)`,

ans:1,
exp_en:`<div class="ans-badge">✓ B. 3</div>
<p>Range: 1.37 ± 0.005 = <b>1.365 to 1.375</b><br><br>
Check which substances fall in range:<br>
• Methyl t-Butyl Ether: 1.3689 ✓ (in range)<br>
• Ethyl Acetate: 1.3724 ✓ (in range)<br>
• Hexane: 1.3749 ✓ (in range, 1.3749 ≤ 1.375)<br>
• Isopropyl Alcohol: 1.3772 ✗ (1.3772 > 1.375)<br>
• Methyl Ethyl Ketone: 1.3788 ✗ (too high)<br><br>
That's <b>3 substances</b> ✓</p>`,
exp_th:`<div class="ans-badge">✓ B. 3 สาร</div>`+stpr("s28",[

  {label:"คำตอบ",text:"3 สารที่อยู่ในช่วง 1.365–1.375<br><b>B. 3 ✓</b>"},
])},

/* Q29 */
{n:29,topic:"Electric Charge — Electrons",diff:"hard",
en:`A flow of electrons is called an electric current. Electric currents are measured in amperes (A).<br>
If a current of 1 A flows in a circuit for 1 second then 1 coulomb (C) of electric charge has been moved.<br>
Each electron in an electric current carries a charge of 1.60 × 10⁻¹⁹ coulombs.<br><br>
If a current of 2 A flows in a circuit for 15 minutes, how many electrons have been moved?<br><br>
A. 1.125 × 10²¹ &nbsp;&nbsp; B. 1.125 × 10²² &nbsp;&nbsp; C. 1.875 × 10¹⁹ &nbsp;&nbsp; D. 1.875 × 10²⁰`,
th:`กระแสไฟฟ้า 2 A ไหลในวงจรนาน 15 นาที<br>
มีอิเล็กตรอนเคลื่อนที่ผ่านกี่ตัว?<br>
(แต่ละอิเล็กตรอนมีประจุ 1.60 × 10⁻¹⁹ C)`,
opts:["1.125 × 10²¹","1.125 × 10²²","1.875 × 10¹⁹","1.875 × 10²⁰"],
ans:1,
exp_en:`<div class="ans-badge">✓ B. 1.125 × 10²²</div>
<p>Charge = Current × Time<br>
Time = 15 min = 15 × 60 = 900 s<br>
Q = 2 A × 900 s = 1800 C<br><br>
Number of electrons = Q / charge per electron<br>
= 1800 / (1.60 × 10⁻¹⁹)<br>
= 1.125 × 10²² electrons ✓</p>`,
exp_th:`<div class="ans-badge">✓ B. 1.125 × 10²² อิเล็กตรอน</div>`+stpr("s29",[
  {label:"คำนวณประจุทั้งหมด",text:"Q = I × t = 2 × (15×60) = 2 × 900 = 1800 C"},
  {label:"หาจำนวนอิเล็กตรอน",text:"n = Q / e = 1800 / (1.60×10⁻¹⁹)<br>= 1.125 × 10²²"},
  {label:"คำตอบ",text:"<b>B. 1.125 × 10²² ✓</b>"},
])},

/* Q30 */
{n:30,topic:"Concentration Calculations",diff:"hard",
en:`Dylan had 100.0 g of aqueous copper sulfate solution (CuSO₄). He knew that 99% of the mass of the solution was water. He decided to evaporate off some of the water until the water component equalled 98% of the total mass.<br><br>
What mass of water did Dylan evaporate off from the solution?<br><br>
A. 0.90 g &nbsp;&nbsp; B. 1.9 g &nbsp;&nbsp; C. 9.1 g &nbsp;&nbsp; D. 50.0 g`,
th:`สารละลาย CuSO₄ 100.0 g มีน้ำ 99% ต้องระเหยน้ำออกจนเหลือน้ำ 98% ของมวลรวม<br><br>
ต้องระเหยน้ำออกไปกี่กรัม?`,
opts:["0.90 g","1.9 g","9.1 g","50.0 g"],
ans:3,
exp_en:`<div class="ans-badge">✓ D. 50.0 g</div>
<p>Initial: 100 g solution, 99% water = 99 g water, 1 g CuSO₄<br><br>
Final: water = 98% of total, CuSO₄ = 2% of total<br>
Since CuSO₄ mass unchanged = 1 g = 2% of final mass<br>
Final mass = 1/0.02 = 50 g<br><br>
Water evaporated = 100 − 50 = <b>50 g</b> ✓</p>`,
exp_th:`<div class="ans-badge">✓ D. 50.0 g</div>`+stpr("s30",[
  {label:"ตั้งต้น",text:"สารละลาย 100g: น้ำ 99g, CuSO₄ 1g"},
  {label:"สภาวะสุดท้าย",text:"CuSO₄ ไม่เปลี่ยน = 1g = 2% ของมวลรวม<br>มวลรวมสุดท้าย = 1/0.02 = 50g"},
  {label:"ระเหยออก",text:"น้ำระเหยออก = 100 − 50 = <b>50 g</b><br><b>คำตอบ: D ✓</b>"},
])},
];

/* ====== ENGINE ====== */
let cur=0;
const answered=new Array(QS.length).fill(null);
const chosen=new Array(QS.length).fill(null);
const expLang=new Array(QS.length).fill("en");

function updateHeader(){
  const done=answered.filter(a=>a!==null).length;
  const corr=answered.filter((a,i)=>a!==null&&a===QS[i].ans).length;
  document.getElementById('h-done').textContent=done;
  document.getElementById('h-corr').textContent=corr;
  document.getElementById('h-wrong').textContent=done-corr;
  document.getElementById('prog-fill').style.width=(done/QS.length*100)+'%';
  document.getElementById('prog-val').textContent=done+'/'+QS.length;
}
function renderNav(){
  document.getElementById('qnav').innerHTML=QS.map((q,i)=>{
    let cls='qdot';
    if(i===cur)cls+=' cur';
    else if(answered[i]!==null)cls+=answered[i]===QS[i].ans?' ok':' ng';
    return `<button class="${cls}" onclick="go(${i})" title="Q${q.n}: ${q.topic}">Q${q.n}</button>`;
  }).join('');
}
function renderQ(){
  const q=QS[cur];
  const ltrs=['A','B','C','D'];
  const isAns=answered[cur]!==null;
  const lang=expLang[cur];
  let ctx=q.context?q.context:'';
  let optsH=q.opts.map((o,i)=>{
    let cls='opt';
    if(isAns){if(i===q.ans)cls+=' show-correct';if(i===chosen[cur]&&chosen[cur]!==q.ans)cls+=' wrong';if(i===chosen[cur]&&chosen[cur]===q.ans)cls+=' correct';}
    return `<button class="${cls}" ${isAns?'disabled':''} onclick="pick(${i})"><span class="ltr">${ltrs[i]}.</span><span>${o}</span></button>`;
  }).join('');
  const expShow=isAns?' show':'';
  const enA=lang==='en'?' active':'';
  const thA=lang==='th'?' active':'';
  document.getElementById('qarea').innerHTML=`
${ctx}
<div class="qcard">
  <div class="qmeta">
    <span class="qnum">Q${q.n} / 30</span>
    <span class="qyear">ICQ 2023</span>
    <span class="qtag">${q.topic}</span>
    <span class="qdiff ${q.diff}">${{easy:'Easy',medium:'Medium',hard:'Hard'}[q.diff]}</span>
  </div>
  <div class="qen">${q.en}</div>
  <div class="qth">${q.th}</div>
  <div class="opts">${optsH}</div>
  <div class="expbox${expShow}">
    <div class="exphdr">
      Explanation / เฉลยละเอียด
      <button class="elang${enA}" onclick="setLang(${cur},'en')">EN</button>
      <button class="elang${thA}" onclick="setLang(${cur},'th')">TH ภาษาไทย</button>
    </div>
    <div class="expbody">
      <div class="exp-en${lang==='en'?' on':''}">${q.exp_en}</div>
      <div class="exp-th${lang==='th'?' on':''}">${q.exp_th}</div>
    </div>
  </div>
</div>`;
  if(isAns){
    const sid='s'+(cur+1);
    if(stepState[sid]===undefined&&document.getElementById(sid)){
      const steps=document.querySelectorAll(`#${sid} .stepper-step`).length;
      initStepper(sid,steps);
    }
  }
  document.getElementById('nav-lbl').textContent=`${cur+1} / ${QS.length}`;
  document.getElementById('btn-prev').disabled=(cur===0);
  const btnNext=document.getElementById('btn-next');
  if(cur===QS.length-1){btnNext.textContent='ดูผลรวม →';btnNext.onclick=showResult;}
  else{btnNext.textContent='Next →';btnNext.onclick=()=>go(cur+1);}
}
function setLang(i,l){
  expLang[i]=l;renderQ();
  const sid='s'+(i+1);
  if(document.getElementById(sid)){
    const steps=document.querySelectorAll(`#${sid} .stepper-step`).length;
    initStepper(sid,steps);
  }
}
function pick(i){
  if(answered[cur]!==null)return;
  chosen[cur]=i;answered[cur]=i;
  renderNav();renderQ();updateHeader();
  const sid='s'+(cur+1);
  if(expLang[cur]==='th'&&document.getElementById(sid)){
    const steps=document.querySelectorAll(`#${sid} .stepper-step`).length;
    initStepper(sid,steps);
  }
}
function go(i){if(i<0||i>=QS.length)return;cur=i;renderAll();}
function renderAll(){renderNav();renderQ();updateHeader();}
function showResult(){
  document.getElementById('quiz-view').classList.add('hidden');
  const rv=document.getElementById('result-view');rv.classList.remove('hidden');
  const corr=answered.filter((a,i)=>a!==null&&a===QS[i].ans).length;
  const done=answered.filter(a=>a!==null).length;
  const pct=Math.round(corr/QS.length*100);
  const msg=pct>=80?'เยี่ยมมาก! 🎉':pct>=60?'ดีมาก ทบทวนข้อที่ผิดด้วยนะ 👍':'ลองทบทวนแล้วทำใหม่อีกรอบ 📚';
  const TOPICS=[...new Set(QS.map(q=>q.topic))];
  let topicRows=TOPICS.map(t=>{
    const ti=QS.map((_,i)=>i).filter(i=>QS[i].topic===t);
    const tc=ti.filter(i=>answered[i]===QS[i].ans).length;
    const pt=Math.round(tc/ti.length*100);
    return `<div class="trow"><div class="tname">${t}</div><div class="tbar"><div class="tbfill" style="width:${pt}%"></div></div><div class="tpct">${tc}/${ti.length}</div></div>`;
  }).join('');
  rv.innerHTML=`
<div class="big">${corr}<span class="total">/${QS.length}</span></div>
<div class="msg">${msg}</div>
<div class="rgrid">
  <div class="rstat"><div class="n" style="color:var(--green)">${corr}</div><div class="l">ถูก</div></div>
  <div class="rstat"><div class="n" style="color:var(--red)">${done-corr}</div><div class="l">ผิด</div></div>
  <div class="rstat"><div class="n">${pct}%</div><div class="l">คะแนน</div></div>
</div>
<div class="tbreak"><h3>By Topic</h3>${topicRows}</div>
<button class="btn pri" onclick="restart()" style="padding:12px 32px;font-size:15px;margin-bottom:10px">ทำใหม่</button><br>
<button class="btn" onclick="reviewWrong()" style="font-size:13px">ทบทวนข้อที่ผิด</button>`;
}
function restart(){
  answered.fill(null);chosen.fill(null);expLang.fill("en");
  Object.keys(stepState).forEach(k=>delete stepState[k]);
  cur=0;
  document.getElementById('result-view').classList.add('hidden');
  document.getElementById('quiz-view').classList.remove('hidden');
  renderAll();
}
function reviewWrong(){
  const wrong=QS.map((_,i)=>i).filter(i=>answered[i]!==null&&answered[i]!==QS[i].ans);
  if(!wrong.length){alert('ไม่มีข้อผิด! 🎉');return;}
  cur=wrong[0];
  document.getElementById('result-view').classList.add('hidden');
  document.getElementById('quiz-view').classList.remove('hidden');
  renderAll();
}
renderAll();
</script>
</body>
</html>
