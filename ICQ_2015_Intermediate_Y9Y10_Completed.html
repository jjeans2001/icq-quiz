<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ICQ 2015 — Intermediate Division (Year 9 & 10)</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f3ee;--card:#ffffff;--card2:#eeeae2;--border:#ddd8cc;
  --text:#1a1916;--muted:#6e6a5e;
  --green:#1e7a47;--green-bg:#e3f5ec;
  --red:#c0392b;--red-bg:#fdecea;
  --blue:#1a4f8a;--blue-bg:#e6eff9;
  --amber:#9a5500;--amber-bg:#fdf1dc;
  --gold:#9a7700;--gold-bg:#fdf8e1;
  --teal:#0a6e54;--teal-bg:#e0f5ed;
  --icq-teal:#00a89d;--icq-purple:#7b4fa6;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}

/* TOP BAR */
.topbar{position:sticky;top:0;z-index:200;background:#1a1916;display:flex;align-items:center;justify-content:space-between;padding:10px 24px;gap:12px}
.logo{display:flex;align-items:center;gap:12px;min-width:0}
.logo-icq{display:flex;gap:4px;align-items:flex-end}
.logo-icq .i-letter{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;color:var(--icq-teal)}
.logo-icq .c-letter{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;color:var(--icq-purple)}
.logo-icq .q-letter{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;color:var(--icq-teal)}
.logo-text{color:#fff;font-size:13px;font-weight:500;line-height:1.3;opacity:.88}
.logo-sub{font-size:10px;opacity:.55;color:#fff}
.top-stats{display:flex;gap:20px;flex-shrink:0}
.tstat{text-align:center}
.tstat .n{font-size:17px;font-weight:700;font-family:'DM Mono',monospace}
.tstat .l{font-size:9px;opacity:.5;text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.tstat .n.g{color:#4ed68a}.tstat .n.r{color:#f07070}.tstat .n.w{color:#fff}

/* WRAP */
.wrap{max-width:840px;margin:0 auto;padding:24px 18px 80px}

/* PROGRESS */
.prog-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:16px}
.prog-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.prog-lbl{font-size:12px;color:var(--muted)}.prog-val{font-size:12px;font-weight:700;font-family:'DM Mono',monospace;margin-left:auto;color:var(--text)}
.prog-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--icq-teal),#5dd8d0);border-radius:3px;transition:width .5s ease}

/* Q NAV */
.qnav-wrap{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px}
.qdot{width:34px;height:34px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);font-size:11px;font-family:'DM Mono',monospace;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.qdot:hover{background:var(--card2)}.qdot.cur{background:var(--text);color:#fff;border-color:var(--text)}
.qdot.ok{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.qdot.ng{background:var(--red-bg);border-color:var(--red);color:var(--red)}

/* QUESTION CARD */
.qcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:26px;box-shadow:0 2px 8px rgba(0,0,0,.04);animation:fadein .2s ease}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.qmeta{display:flex;align-items:center;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.qnum{font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace}
.qtag{font-size:11px;padding:3px 9px;border-radius:10px;background:var(--blue-bg);color:var(--blue);font-weight:600}
.qyear{font-size:11px;padding:3px 9px;border-radius:10px;background:var(--gold-bg);color:var(--gold);font-weight:700}
.qdiff{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:600}
.qdiff.easy{background:var(--green-bg);color:var(--green)}
.qdiff.medium{background:var(--amber-bg);color:var(--amber)}
.qdiff.hard{background:var(--red-bg);color:var(--red)}

/* CONTEXT BLOCK (shared between questions) */
.context-block{background:#f8f6f2;border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:16px;font-size:13.5px;line-height:1.8}
.context-block .ctx-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px}

.qen{font-size:15px;line-height:1.7;color:var(--text);margin-bottom:5px}
.qth{font-size:14px;line-height:1.85;color:var(--muted);margin-bottom:18px;padding-left:12px;border-left:2px solid var(--border)}

/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:6px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:11px 15px;border:1.5px solid var(--border);border-radius:9px;cursor:pointer;font-size:14px;color:var(--text);background:var(--card);text-align:left;width:100%;transition:all .14s;line-height:1.55;font-family:'Sarabun',sans-serif}
.opt:hover:not(:disabled){background:var(--card2);border-color:#bbb4a8}
.opt .ltr{font-weight:700;font-family:'DM Mono',monospace;font-size:13px;min-width:22px;color:var(--muted);margin-top:1px;flex-shrink:0}
.opt.correct{background:var(--green-bg);border-color:var(--green)}.opt.correct .ltr{color:var(--green)}
.opt.wrong{background:var(--red-bg);border-color:var(--red)}.opt.wrong .ltr{color:var(--red)}
.opt.show-correct{background:var(--green-bg);border-color:var(--green)}.opt.show-correct .ltr{color:var(--green)}
.opt:disabled{cursor:default}

/* TABLE IN QUESTIONS */
.q-table{border-collapse:collapse;margin:10px 0;font-size:13.5px;width:100%}
.q-table th{background:var(--card2);font-weight:600;padding:7px 12px;border:1px solid var(--border);text-align:center}
.q-table td{padding:6px 12px;border:1px solid var(--border);text-align:center}
.q-table tr:nth-child(even) td{background:#fafaf8}

/* EXPLANATION BOX */
.expbox{margin-top:14px;border:1px solid var(--border);border-radius:9px;overflow:hidden;display:none}
.expbox.show{display:block}
.exphdr{padding:9px 16px;background:var(--card2);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.elang{padding:3px 10px;border-radius:8px;font-size:11px;cursor:pointer;font-weight:600;border:none;background:none;color:var(--muted);font-family:'Sarabun',sans-serif;transition:all .12s}
.elang.active{background:var(--text);color:#fff}
.expbody{padding:16px;font-size:13.5px;line-height:1.85;color:var(--text)}
.exp-en,.exp-th{display:none}.exp-en.on,.exp-th.on{display:block}
.ans-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:16px;background:var(--green-bg);border:1px solid var(--green);color:var(--green);font-weight:700;font-size:13px;margin-bottom:10px}
.ans-badge-wrong{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:16px;background:var(--red-bg);border:1px solid var(--red);color:var(--red);font-weight:700;font-size:13px;margin-bottom:8px}

/* STEPPER */
.stepper{margin:14px 0 0;border:1px solid var(--border);border-radius:9px;overflow:hidden}
.stepper-header{background:var(--card2);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.stepper-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.stepper-dots{display:flex;gap:5px}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:background .2s}
.sdot.active{background:var(--blue)}.sdot.done{background:var(--green)}
.stepper-body{padding:16px}
.stepper-step{display:none}.stepper-step.on{display:block;animation:fadein .2s}
.step-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--blue);margin-bottom:8px}
.step-text{font-size:14px;line-height:1.8;margin-bottom:8px}
.stepper-nav{display:flex;gap:8px;justify-content:flex-end;padding:8px 16px;background:var(--card2);border-top:1px solid var(--border)}
.sbtn{padding:6px 16px;border:1px solid var(--border);border-radius:6px;background:var(--card);font-size:13px;cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:500;color:var(--text);transition:all .12s}
.sbtn:hover{background:var(--card2)}.sbtn.pri{background:var(--blue);color:#fff;border-color:var(--blue)}.sbtn.pri:hover{background:#133d72}
.sbtn:disabled{opacity:.35;cursor:default}

.svg-wrap{background:var(--card2);border-radius:8px;padding:12px;margin:10px 0;overflow-x:auto;text-align:center}
.svg-wrap svg{display:inline-block;max-width:100%}

/* NAV */
.navrow{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-top:14px}
.btn{padding:10px 22px;border:1.5px solid var(--border);border-radius:9px;background:var(--card);font-size:14px;font-family:'Sarabun',sans-serif;color:var(--text);cursor:pointer;transition:all .14s;font-weight:500}
.btn:hover{background:var(--card2)}.btn:disabled{opacity:.35;cursor:default}
.btn.pri{background:var(--text);color:#fff;border-color:var(--text)}.btn.pri:hover{background:#333}

/* RESULT */
.result{text-align:center;padding:50px 20px}
.result .big{font-size:68px;font-weight:700;font-family:'DM Mono',monospace;line-height:1}
.result .total{font-size:20px;color:var(--muted);font-family:'DM Mono',monospace}
.result .msg{font-size:16px;margin:14px 0 28px;color:var(--muted)}
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:360px;margin:0 auto 24px}
.rstat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.rstat .n{font-size:26px;font-weight:700;font-family:'DM Mono',monospace}.rstat .l{font-size:11px;color:var(--muted);margin-top:2px}
.tbreak{max-width:460px;margin:0 auto 24px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:left}
.tbreak h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:12px}
.trow{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:13px}
.tname{min-width:140px;font-size:12px}.tbar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.tbfill{height:100%;border-radius:3px;background:var(--green)}.tpct{min-width:36px;text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}
.hidden{display:none!important}
sub,sup{font-size:.72em}
code{font-family:'DM Mono',monospace;background:var(--card2);padding:1px 5px;border-radius:4px;font-size:12.5px}
strong{font-weight:600}
.highlight{background:#fffbe6;border:1px solid #f0d060;border-radius:5px;padding:8px 12px;margin:8px 0;font-size:13.5px}
.formula{font-family:'DM Mono',monospace;font-size:13.5px;background:var(--card2);padding:2px 7px;border-radius:5px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icq">
      <span class="i-letter">I</span><span class="c-letter">C</span><span class="q-letter">Q</span>
    </div>
    <div>
      <div class="logo-text">International Chemistry Quiz</div>
      <div class="logo-sub">2015 · Intermediate Division · Year 9 &amp; 10</div>
    </div>
  </div>
  <div class="top-stats">
    <div class="tstat"><div class="n w" id="h-done">0</div><div class="l">Done</div></div>
    <div class="tstat"><div class="n g" id="h-corr">0</div><div class="l">Correct</div></div>
    <div class="tstat"><div class="n r" id="h-wrong">0</div><div class="l">Wrong</div></div>
  </div>
</div>

<div class="wrap">
  <div id="quiz-view">
    <div class="prog-card">
      <div class="prog-row"><span class="prog-lbl">Progress — ICQ 2015 Intermediate (Year 9 &amp; 10) · 30 ข้อ</span><span class="prog-val" id="prog-val">0/30</span></div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div style="background:#fff8e1;border:1px solid #ffcc02;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#7a5c00">
      ⚠️ <strong>หมายเหตุ:</strong> เฉลยชุดนี้ไม่ใช่เฉลยทางการ จัดทำโดยผู้สอน อาจมีข้อผิดพลาด
    </div>
    <div class="qnav-wrap" id="qnav"></div>
    <div id="qarea"></div>
    <div class="navrow">
      <button class="btn" id="btn-prev" onclick="go(cur-1)">← Prev</button>
      <span id="nav-lbl" style="font-size:13px;color:var(--muted)"></span>
      <button class="btn pri" id="btn-next">Next →</button>
    </div>
  </div>
  <div id="result-view" class="result hidden"></div>
</div>

<script>

/* ── SVG / stepper helpers ── */
function svgAtom(x,y,lbl,fill='#e8f0fa',textCol='#0c447c',r=14){
  return `<circle cx="${x}" cy="${y}" r="${r}" fill="${fill}" stroke="#185fa5" stroke-width="0.8"/>
<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="${textCol}">${lbl}</text>`;
}
const stepState={};
function makeStepper(id,steps){
  const dots=steps.map((_,i)=>`<div class="sdot" id="${id}-dot-${i}"></div>`).join('');
  const panels=steps.map((s,i)=>{
    const svgPart=s.svg?`<div class="svg-wrap">${s.svg}</div>`:'';
    return `<div class="stepper-step" id="${id}-step-${i}">
      <div class="step-label">${s.label}</div>
      <div class="step-text">${s.text}</div>${svgPart}</div>`;
  }).join('');
  return `<div class="stepper" id="${id}">
    <div class="stepper-header"><span class="stepper-title">อธิบายทีละขั้น</span><div class="stepper-dots">${dots}</div></div>
    <div class="stepper-body">${panels}</div>
    <div class="stepper-nav">
      <button class="sbtn" id="${id}-prev" onclick="stepNav('${id}',-1)" disabled>← ก่อนหน้า</button>
      <span id="${id}-counter" style="font-size:12px;color:var(--muted);align-self:center">1/${steps.length}</span>
      <button class="sbtn pri" id="${id}-next" onclick="stepNav('${id}',1)">ถัดไป →</button>
    </div></div>`;
}
function stpr(id,steps){return makeStepper(id,steps);}
function initStepper(id,total){stepState[id]={cur:0,total};showStep(id,0);}
function stepNav(id,dir){
  const s=stepState[id];if(!s)return;
  s.cur=Math.max(0,Math.min(s.total-1,s.cur+dir));showStep(id,s.cur);
}
function showStep(id,idx){
  const s=stepState[id];if(!s)return;
  for(let i=0;i<s.total;i++){
    const el=document.getElementById(`${id}-step-${i}`);
    const dot=document.getElementById(`${id}-dot-${i}`);
    if(el)el.classList.toggle('on',i===idx);
    if(dot){dot.className='sdot';if(i<idx)dot.classList.add('done');if(i===idx)dot.classList.add('active');}
  }
  const ctr=document.getElementById(`${id}-counter`);
  const prev=document.getElementById(`${id}-prev`);
  const next=document.getElementById(`${id}-next`);
  if(ctr)ctr.textContent=`${idx+1}/${s.total}`;
  if(prev)prev.disabled=(idx===0);
  if(next){if(idx===s.total-1){next.textContent='✓ จบแล้ว';next.disabled=true;}else{next.textContent='ถัดไป →';next.disabled=false;}}
}



const QS=[

/* Q1 */
{n:1,topic:"Classification of Matter",diff:"easy",
en:`Milk is best classified as<br><br>A. a compound because it's a pure substance.<br>B. a compound because the proportion of its atoms is fixed.<br>C. a mixture because the proportion of its components can vary.<br>D. a mixture because the proportion of its components is fixed.`,
th:`<br>นมควรจัดเป็น<br><br>A. สารประกอบ เพราะเป็นสารบริสุทธิ์<br>B. สารประกอบ เพราะอัตราส่วนของอะตอมคงที่<br>C. สารผสม เพราะอัตราส่วนขององค์ประกอบสามารถเปลี่ยนแปลงได้<br>D. สารผสม เพราะอัตราส่วนขององค์ประกอบคงที่`,
opts:["Compound — it's a pure substance","Compound — fixed proportion of atoms","Mixture — proportion can vary","Mixture — proportion is fixed"],
ans:2,
exp_en:`<div class="ans-badge">✓ C</div><p>Milk is a mixture — it contains water, sugars, proteins, fats and other components whose proportions can vary between samples (e.g. skim milk vs whole milk). This variability is the key sign of a mixture, not a compound.</p>`,
exp_th:`<div class="ans-badge">✓ C</div>`+stpr("s1",[{label:"วิเคราะห์",text:"นมเป็นสารผสมที่มีน้ำ น้ำตาล โปรตีน ไขมัน และองค์ประกอบอื่นๆ"},{label:"สรุป",text:"สัดส่วนขององค์ประกอบเหล่านี้เปลี่ยนแปลงได้ (เช่น นมพร่องมันเนยกับนมสด) ไม่คงที่เหมือนสารประกอบ<br>✅ <strong>คำตอบ C</strong>"}])},

/* Q2 */
{n:2,topic:"History of Atomic Models",diff:"easy",
en:`Questions 2 and 3 refer to the following information:<br>Our understanding of the structure of atoms has changed over time. A student prepared the following table to summarise some of the models of the atom that have been developed.<br><br><table class="q-table"><tr><th>Model</th><th>Date</th><th>Description</th><th>Evidence</th></tr><tr><td>Dalton model</td><td>1803</td><td>Atoms are hard, and cannot be broken down into pieces. Atoms of different elements are different sizes.</td><td>Mass is conserved in chemical reactions. Law of definite proportions.</td></tr><tr><td>Thomson 'Plum pudding' model</td><td>1904</td><td>Atoms consist of a sphere of positive charge in which smaller negatively charged particles are embedded.</td><td>'Canal rays' and 'cathode rays' were deflected by magnetic fields.</td></tr><tr><td>Rutherford nuclear model</td><td>1911</td><td>Atoms consist of a large volume of empty space with a small, dense, positively charged nucleus.</td><td>'Gold foil' experiment – most alpha particles fired at a gold foil target passed straight through.</td></tr><tr><td>Bohr 'planetary' model</td><td>1913</td><td>Electrons move around the nucleus in fixed orbits that have discrete energy levels.</td><td>Unique spectral lines are produced by excited gaseous atoms.</td></tr><tr><td>Chadwick</td><td>1932</td><td>Neutrons, with a mass similar to that of a proton, are located in the nucleus. Atoms of the same element may have different numbers of neutrons.</td><td>Explains the existence of isotopes.</td></tr></table><br>Which model first included electrons as parts of atoms?`,
th:`<br>คำถามที่ 2 และ 3 อ้างอิงจากข้อมูลต่อไปนี้:<br>ความเข้าใจของเราต่อโครงสร้างของอะตอมมีการเปลี่ยนแปลงตลอดเวลา นักเรียนคนหนึ่งได้จัดทำตารางต่อไปนี้เพื่อสรุปแบบจำลองของอะตอมบางแบบที่เคยถูกพัฒนาขึ้น<br><br><table class="q-table"><tr><th>แบบจำลอง</th><th>ปี</th><th>คำอธิบาย</th><th>หลักฐาน</th></tr><tr><td>แบบจำลองของดอลตัน (Dalton model)</td><td>1803</td><td>อะตอมเป็นอนุภาคแข็ง ไม่สามารถแบ่งแยกได้ อะตอมของธาตุต่างชนิดกันมีขนาดต่างกัน</td><td>มวลถูกอนุรักษ์ไว้ในการเกิดปฏิกิริยาเคมี กฎสัดส่วนคงที่ (Law of definite proportions)</td></tr><tr><td>แบบจำลองพุดดิ้งของทอมสัน (Thomson 'Plum pudding' model)</td><td>1904</td><td>อะตอมประกอบด้วยทรงกลมที่มีประจุบวก ซึ่งมีอนุภาคขนาดเล็กที่มีประจุลบฝังอยู่</td><td>รังสีแคโทด (cathode rays) และรังสีคลอง (canal rays) ถูกเบี่ยงเบนด้วยสนามแม่เหล็ก</td></tr><tr><td>แบบจำลองนิวเคลียร์ของรัทเทอร์ฟอร์ด (Rutherford nuclear model)</td><td>1911</td><td>อะตอมประกอบด้วยพื้นที่ว่างจำนวนมาก และมีนิวเคลียสตรงกลางที่มีความหนาแน่นสูงและมีประจุบวก</td><td>การทดลองแผ่นทองคำ (Gold foil experiment) – อนุภาคแอลฟาส่วนมากผ่านแผ่นทองคำได้โดยไม่เบี่ยงเบน</td></tr><tr><td>แบบจำลองดาวเคราะห์ของบอร์ (Bohr 'planetary' model)</td><td>1913</td><td>อิเล็กตรอนเคลื่อนที่รอบนิวเคลียสในวงโคจรที่กำหนดแน่นอน ซึ่งมีระดับพลังงานเฉพาะ</td><td>การเกิดเส้นสเปกตรัมเฉพาะจากอะตอมในสถานะกระตุ้น</td></tr><tr><td>แบบจำลองของแชดวิค (Chadwick)</td><td>1932</td><td>นิวตรอนซึ่งมีมวลใกล้เคียงกับโปรตอน อยู่ในนิวเคลียส อะตอมของธาตุเดียวกันอาจมีจำนวนนิวตรอนต่างกัน</td><td>อธิบายการมีอยู่ของไอโซโทปได้</td></tr></table><br>แบบจำลองใดเป็นแบบแรกที่รวมอิเล็กตรอนเป็นส่วนหนึ่งของอะตอม?`,
opts:["Dalton","Thomson","Rutherford","Bohr"],
ans:1,
exp_en:`<div class="ans-badge">✓ B. Thomson</div><p>Dalton's model (1803) treated atoms as solid, indivisible spheres with no internal parts. Thomson's "plum pudding" model (1904) was the first to include negatively charged particles (electrons) embedded within the atom.</p>`,
exp_th:`<div class="ans-badge">✓ B. Thomson</div>`+stpr("s2",[{label:"ตรวจแต่ละแบบจำลอง",text:"Dalton (1803): อะตอมเป็นทรงตัน ไม่มีส่วนประกอบภายใน<br>Thomson (1904): แบบแรกที่มีอนุภาคประจุลบ (อิเล็กตรอน) ฝังอยู่ในอะตอม"},{label:"สรุป",text:"✅ <strong>คำตอบ B: Thomson</strong>"}])},

/* Q3 */
{n:3,topic:"Atomic Structure",diff:"easy",
en:`Questions 2 and 3 refer to the following information:<br>Our understanding of the structure of atoms has changed over time. A student prepared the following table to summarise some of the models of the atom that have been developed.<br><br><table class="q-table"><tr><th>Model</th><th>Date</th><th>Description</th><th>Evidence</th></tr><tr><td>Dalton model</td><td>1803</td><td>Atoms are hard, and cannot be broken down into pieces. Atoms of different elements are different sizes.</td><td>Mass is conserved in chemical reactions. Law of definite proportions.</td></tr><tr><td>Thomson 'Plum pudding' model</td><td>1904</td><td>Atoms consist of a sphere of positive charge in which smaller negatively charged particles are embedded.</td><td>'Canal rays' and 'cathode rays' were deflected by magnetic fields.</td></tr><tr><td>Rutherford nuclear model</td><td>1911</td><td>Atoms consist of a large volume of empty space with a small, dense, positively charged nucleus.</td><td>'Gold foil' experiment – most alpha particles fired at a gold foil target passed straight through.</td></tr><tr><td>Bohr 'planetary' model</td><td>1913</td><td>Electrons move around the nucleus in fixed orbits that have discrete energy levels.</td><td>Unique spectral lines are produced by excited gaseous atoms.</td></tr><tr><td>Chadwick</td><td>1932</td><td>Neutrons, with a mass similar to that of a proton, are located in the nucleus. Atoms of the same element may have different numbers of neutrons.</td><td>Explains the existence of isotopes.</td></tr></table><br>The charged particle in the nucleus is the<br><br>A. electron.<br>B. isotope.<br>C. neutron.<br>D. proton.`,
th:`<br>คำถามที่ 2 และ 3 อ้างอิงจากข้อมูลต่อไปนี้:<br>ความเข้าใจของเราต่อโครงสร้างของอะตอมมีการเปลี่ยนแปลงตลอดเวลา นักเรียนคนหนึ่งได้จัดทำตารางต่อไปนี้เพื่อสรุปแบบจำลองของอะตอมบางแบบที่เคยถูกพัฒนาขึ้น<br><br><table class="q-table"><tr><th>แบบจำลอง</th><th>ปี</th><th>คำอธิบาย</th><th>หลักฐาน</th></tr><tr><td>แบบจำลองของดอลตัน (Dalton model)</td><td>1803</td><td>อะตอมเป็นอนุภาคแข็ง ไม่สามารถแบ่งแยกได้ อะตอมของธาตุต่างชนิดกันมีขนาดต่างกัน</td><td>มวลถูกอนุรักษ์ไว้ในการเกิดปฏิกิริยาเคมี กฎสัดส่วนคงที่ (Law of definite proportions)</td></tr><tr><td>แบบจำลองพุดดิ้งของทอมสัน (Thomson 'Plum pudding' model)</td><td>1904</td><td>อะตอมประกอบด้วยทรงกลมที่มีประจุบวก ซึ่งมีอนุภาคขนาดเล็กที่มีประจุลบฝังอยู่</td><td>รังสีแคโทด (cathode rays) และรังสีคลอง (canal rays) ถูกเบี่ยงเบนด้วยสนามแม่เหล็ก</td></tr><tr><td>แบบจำลองนิวเคลียร์ของรัทเทอร์ฟอร์ด (Rutherford nuclear model)</td><td>1911</td><td>อะตอมประกอบด้วยพื้นที่ว่างจำนวนมาก และมีนิวเคลียสตรงกลางที่มีความหนาแน่นสูงและมีประจุบวก</td><td>การทดลองแผ่นทองคำ (Gold foil experiment) – อนุภาคแอลฟาส่วนมากผ่านแผ่นทองคำได้โดยไม่เบี่ยงเบน</td></tr><tr><td>แบบจำลองดาวเคราะห์ของบอร์ (Bohr 'planetary' model)</td><td>1913</td><td>อิเล็กตรอนเคลื่อนที่รอบนิวเคลียสในวงโคจรที่กำหนดแน่นอน ซึ่งมีระดับพลังงานเฉพาะ</td><td>การเกิดเส้นสเปกตรัมเฉพาะจากอะตอมในสถานะกระตุ้น</td></tr><tr><td>แบบจำลองของแชดวิค (Chadwick)</td><td>1932</td><td>นิวตรอนซึ่งมีมวลใกล้เคียงกับโปรตอน อยู่ในนิวเคลียส อะตอมของธาตุเดียวกันอาจมีจำนวนนิวตรอนต่างกัน</td><td>อธิบายการมีอยู่ของไอโซโทปได้</td></tr></table><br>อนุภาคที่มีประจุในนิวเคลียสคือ<br><br>A. อิเล็กตรอน<br>B. ไอโซโทป<br>C. นิวตรอน<br>D. โปรตอน`,
opts:["electron","isotope","neutron","proton"],
ans:3,
exp_en:`<div class="ans-badge">✓ D. proton</div><p>The nucleus contains protons and neutrons. Protons carry a positive charge; neutrons are uncharged. Electrons (negatively charged) orbit outside the nucleus. An isotope is not a particle at all, but a term for atoms of the same element with different neutron numbers.</p>`,
exp_th:`<div class="ans-badge">✓ D. proton</div>`+stpr("s3",[{label:"อนุภาคในนิวเคลียส",text:"โปรตอน (มีประจุบวก) และนิวตรอน (ไม่มีประจุ)"},{label:"สรุป",text:"อนุภาคที่มีประจุในนิวเคลียสคือ <strong>โปรตอน</strong><br>✅ <strong>คำตอบ D</strong>"}])},

/* Q4 */
{n:4,topic:"Concentration Calculations",diff:"medium",
en:`Questions 4 to 6 refer to the following information:<br>The concentration of a solution can be expressed as the mass of solute per litre of solution. Ashwyn dissolved some solid copper sulfate in water to make 500 mL of solution. The solution had a copper sulfate concentration of 28 g/L.<br><br>If 100 mL of this solution were evaporated to dryness, what mass of copper sulfate would be recovered?`,
th:`<br>คำถามที่ 4 ถึง 6 อ้างอิงจากข้อมูลต่อไปนี้:<br>ความเข้มข้นของสารละลายสามารถแสดงเป็นมวลของตัวถูกละลายต่อปริมาตรสารละลาย 1 ลิตร Ashwyn ละลายคอปเปอร์ซัลเฟตที่เป็นของแข็งลงในน้ำเพื่อทำสารละลายปริมาตร 500 mL สารละลายนี้มีความเข้มข้นของคอปเปอร์ซัลเฟต 28 g/L<br><br>ถ้านำสารละลายนี้ 100 mL มาระเหยจนแห้ง จะได้คอปเปอร์ซัลเฟตกลับคืนมามวลเท่าไร?`,
opts:["1.4 g","2.8 g","5.6 g","14 g"],
ans:1,
exp_en:`<div class="ans-badge">✓ B. 2.8 g</div><p>Mass = concentration × volume = 28 g/L × 0.1 L = 2.8 g.</p>`,
exp_th:`<div class="ans-badge">✓ B. 2.8 g</div>`+stpr("s4",[{label:"สูตร",text:"มวล = ความเข้มข้น (g/L) × ปริมาตร (L)"},{label:"คำนวณ",text:"= 28 × 0.1 = <strong>2.8 g</strong><br>✅ <strong>คำตอบ B</strong>"}])},

/* Q5 */
{n:5,topic:"Concentration Calculations",diff:"medium",
en:`Questions 4 to 6 refer to the following information:<br>The concentration of a solution can be expressed as the mass of solute per litre of solution. Ashwyn dissolved some solid copper sulfate in water to make 500 mL of solution. The solution had a copper sulfate concentration of 28 g/L.<br><br>What volume of Ashwyn's original solution would contain 2.1 g of copper sulfate?`,
th:`<br>คำถามที่ 4 ถึง 6 อ้างอิงจากข้อมูลต่อไปนี้:<br>ความเข้มข้นของสารละลายสามารถแสดงเป็นมวลของตัวถูกละลายต่อปริมาตรสารละลาย 1 ลิตร Ashwyn ละลายคอปเปอร์ซัลเฟตที่เป็นของแข็งลงในน้ำเพื่อทำสารละลายปริมาตร 500 mL สารละลายนี้มีความเข้มข้นของคอปเปอร์ซัลเฟต 28 g/L<br><br>สารละลายเดิมของ Ashwyn ปริมาตรเท่าไรจึงจะมีคอปเปอร์ซัลเฟต 2.1 g?`,
opts:["7.5 mL","37.5 mL","75 mL","150 mL"],
ans:2,
exp_en:`<div class="ans-badge">✓ C. 75 mL</div><p>Volume = mass ÷ concentration = 2.1 g ÷ 28 g/L = 0.075 L = 75 mL.</p>`,
exp_th:`<div class="ans-badge">✓ C. 75 mL</div>`+stpr("s5",[{label:"สูตร",text:"ปริมาตร (L) = มวล (g) ÷ ความเข้มข้น (g/L)"},{label:"คำนวณ",text:"= 2.1 ÷ 28 = 0.075 L = <strong>75 mL</strong><br>✅ <strong>คำตอบ C</strong>"}])},

/* Q6 */
{n:6,topic:"Dilution",diff:"medium",
en:`Questions 4 to 6 refer to the following information:<br>The concentration of a solution can be expressed as the mass of solute per litre of solution. Ashwyn dissolved some solid copper sulfate in water to make 500 mL of solution. The solution had a copper sulfate concentration of 28 g/L.<br><br>The concentration of another salt solution is 72 g/L.<br>How much water must be added to 250 mL of this solution to change its concentration to 18 g/L?`,
th:`<br>คำถามที่ 4 ถึง 6 อ้างอิงจากข้อมูลต่อไปนี้:<br>ความเข้มข้นของสารละลายสามารถแสดงเป็นมวลของตัวถูกละลายต่อปริมาตรสารละลาย 1 ลิตร Ashwyn ละลายคอปเปอร์ซัลเฟตที่เป็นของแข็งลงในน้ำเพื่อทำสารละลายปริมาตร 500 mL สารละลายนี้มีความเข้มข้นของคอปเปอร์ซัลเฟต 28 g/L<br><br>สารละลายเกลืออีกชนิดหนึ่งมีความเข้มข้น 72 g/L<br>ต้องเติมน้ำเท่าไรลงในสารละลายนี้ 250 mL เพื่อให้ความเข้มข้นลดลงเหลือ 18 g/L?`,
opts:["250 mL","500 mL","750 mL","1000 mL"],
ans:2,
exp_en:`<div class="ans-badge">✓ C. 750 mL</div><p>Mass of salt in 250 mL at 72 g/L = 72 × 0.25 = 18 g (this mass stays constant on dilution). New volume needed for 18 g/L: V = 18 g ÷ 18 g/L = 1 L = 1000 mL. Water added = 1000 − 250 = 750 mL.</p>`,
exp_th:`<div class="ans-badge">✓ C. 750 mL</div>`+stpr("s6",[{label:"หามวลเกลือเดิม",text:"มวล = 72 g/L × 0.250 L = 18 g (มวลนี้คงที่เมื่อเจือจาง)"},{label:"หาปริมาตรใหม่ที่ 18 g/L",text:"V = 18 g ÷ 18 g/L = 1 L = 1000 mL"},{label:"หาน้ำที่ต้องเติม",text:"1000 − 250 = <strong>750 mL</strong><br>✅ <strong>คำตอบ C</strong>"}])},

/* Q7 */
{n:7,topic:"Heat Energy Calculations",diff:"hard",
en:`The amount of energy, in joules, needed to heat a given mass of water can be calculated using the formula:<br><br>heat needed (J) = mass of water (g) × 4.2 × temperature change (°C)<br><br>The amount of heat energy released when 1 g of butane burns is 49 518 joules. What mass of butane would need to be burnt to raise the temperature of 500 mL (500 g) of water from 20 °C to 100 °C?`,
th:`<br>ปริมาณพลังงาน (หน่วยจูล) ที่ต้องใช้เพื่อทำให้น้ำมวลหนึ่งร้อนขึ้น สามารถคำนวณได้จากสูตร:<br><br>พลังงานที่ต้องการ (J) = มวลของน้ำ (g) × 4.2 × การเปลี่ยนแปลงอุณหภูมิ (°C)<br><br>พลังงานความร้อนที่ปล่อยออกมาเมื่อบิวเทน 1 g เผาไหม้ คือ 49,518 จูล ต้องเผาไหม้บิวเทนมวลเท่าไรเพื่อทำให้น้ำ 500 mL (500 g) ร้อนขึ้นจาก 20°C เป็น 100°C?`,
opts:["0.85 g","3.4 g","4.2 g","336 g"],
ans:1,
exp_en:`<div class="ans-badge">✓ B. 3.4 g</div><p>Heat needed = 500 × 4.2 × (100−20) = 500 × 4.2 × 80 = 168,000 J. Mass of butane = 168,000 ÷ 49,518 ≈ 3.4 g.</p>`,
exp_th:`<div class="ans-badge">✓ B. 3.4 g</div>`+stpr("s7",[{label:"หาพลังงานที่ต้องใช้",text:"Q = 500 × 4.2 × (100−20) = 500 × 4.2 × 80 = 168,000 J"},{label:"หามวลบิวเทน",text:"168,000 ÷ 49,518 ≈ <strong>3.4 g</strong><br>✅ <strong>คำตอบ B</strong>"}])},

/* Q8 */
{n:8,topic:"Empirical Formulae",diff:"medium",
en:`The empirical formula of a compound is the simplest whole number ratio of the atoms present in a compound. For example, the empirical formula for hydrogen peroxide, H₂O₂, is HO.<br><br>Three of the following compounds have the same empirical formula. Which is the odd one out?<br><br>A. Propanoic acid (C₃H₆O₂)<br>B. Glucose (C₆H₁₂O₆)<br>C. Formaldehyde (CH₂O)<br>D. Ribose (C₅H₁₀O₅)`,
th:`<br>สูตรเอมพิริคัล (empirical formula) ของสารประกอบ คืออัตราส่วนจำนวนเต็มที่ง่ายที่สุดของอะตอมที่มีอยู่ในสารประกอบนั้น เช่น สูตรเอมพิริคัลของไฮโดรเจนเปอร์ออกไซด์ H₂O₂ คือ HO<br><br>จากสารประกอบต่อไปนี้ 3 ตัวมีสูตรเอมพิริคัลเหมือนกัน ตัวใดเป็นตัวที่ต่างออกไป?<br><br>A. กรดโพรพาโนอิก (C₃H₆O₂)<br>B. กลูโคส (C₆H₁₂O₆)<br>C. ฟอร์มาลดีไฮด์ (CH₂O)<br>D. ไรโบส (C₅H₁₀O₅)`,
opts:["Propanoic acid (C₃H₆O₂)","Glucose (C₆H₁₂O₆)","Formaldehyde (CH₂O)","Ribose (C₅H₁₀O₅)"],
ans:0,
exp_en:`<div class="ans-badge">✓ A. Propanoic acid</div><p>Reducing each formula to its simplest ratio: propanoic acid C₃H₆O₂ is already simplest (cannot reduce further) → C₃H₆O₂. Glucose C₆H₁₂O₆ ÷6 → CH₂O. Formaldehyde is already CH₂O. Ribose C₅H₁₀O₅ ÷5 → CH₂O. So glucose, formaldehyde and ribose all share empirical formula CH₂O, while propanoic acid (C₃H₆O₂) is different.</p>`,
exp_th:`<div class="ans-badge">✓ A. กรดโพรพาโนอิก</div>`+stpr("s8",[{label:"ลดรูปแต่ละสูตร",text:"กรดโพรพาโนอิก C₃H₆O₂ (ลดรูปไม่ได้อีก)<br>กลูโคส C₆H₁₂O₆ ÷6 → CH₂O<br>ฟอร์มาลดีไฮด์ CH₂O (เป็นอยู่แล้ว)<br>ไรโบส C₅H₁₀O₅ ÷5 → CH₂O"},{label:"สรุป",text:"กลูโคส ฟอร์มาลดีไฮด์ ไรโบส มีสูตรเอมพิริคัล CH₂O เหมือนกัน มีเพียงกรดโพรพาโนอิกที่ต่างออกไป<br>✅ <strong>คำตอบ A</strong>"}])},

/* Q9 */
{n:9,topic:"Empirical Formula from % Composition",diff:"hard",
en:`A sample of gas was analysed. The gas was found to contain 21.9% sulfur by mass and 78.1% fluorine by mass.<br>The relative atomic mass of an element indicates how heavy its atoms are when compared to atoms of other elements. The relative atomic mass of an atom of sulfur is 32, and the relative atomic mass of a fluorine atom is 19.<br><br>What is the formula of the gas?`,
th:`<br>ตัวอย่างก๊าซถูกวิเคราะห์ พบว่ามีกำมะถัน (S) 21.9% โดยมวล และฟลูออรีน (F) 78.1% โดยมวล<br>มวลอะตอมสัมพัทธ์บอกว่าอะตอมของธาตุนั้นหนักเท่าใดเมื่อเทียบกับอะตอมของธาตุอื่น มวลอะตอมสัมพัทธ์ของกำมะถันคือ 32 และของฟลูออรีนคือ 19<br><br>สูตรของก๊าซนี้คืออะไร?`,
opts:["SF","SF₂","SF₄","SF₆"],
ans:3,
exp_en:`<div class="ans-badge">✓ D. SF₆</div><p>Moles S = 21.9/32 = 0.684; moles F = 78.1/19 = 4.11. Dividing by the smaller value: S = 0.684/0.684 = 1; F = 4.11/0.684 ≈ 6. Ratio S:F = 1:6, so the formula is SF₆.</p>`,
exp_th:`<div class="ans-badge">✓ D. SF₆</div>`+stpr("s9",[{label:"หาโมลของแต่ละธาตุ (สมมติ 100 g)",text:"โมล S = 21.9/32 = 0.684<br>โมล F = 78.1/19 = 4.11"},{label:"หาอัตราส่วนโมล",text:"หารด้วยค่าน้อยสุด (0.684): S = 1, F ≈ 6"},{label:"สรุป",text:"อัตราส่วน S:F = 1:6 → สูตรคือ <strong>SF₆</strong><br>✅ <strong>คำตอบ D</strong>"}])},

/* Q10 */
{n:10,topic:"Conservation of Mass",diff:"medium",
en:`Questions 10 and 11 refer to the following information:<br>Hydrogen gas and oxygen gas react to form water. Dylan carried out an investigation in which he reacted different masses of hydrogen and oxygen. The table shows some of his results.<br><br><table class="q-table"><tr><th>Trial</th><th>Initial mass of hydrogen (g)</th><th>Initial mass of oxygen (g)</th><th>Final mass of hydrogen (g)</th><th>Final mass of oxygen (g)</th></tr><tr><td>1</td><td>10</td><td>90</td><td>0</td><td>10</td></tr><tr><td>2</td><td>20</td><td>80</td><td>10</td><td>0</td></tr><tr><td>3</td><td>40</td><td>60</td><td>32.5</td><td>0</td></tr></table><br>What mass of water was formed in Dylan's third trial?`,
th:`<br>คำถามที่ 10 และ 11 อ้างอิงจากข้อมูลต่อไปนี้:<br>แก๊สไฮโดรเจนและแก๊สออกซิเจนทำปฏิกิริยากันเกิดเป็นน้ำ Dylan ทำการทดลองโดยให้ไฮโดรเจนและออกซิเจนมวลต่างๆ ทำปฏิกิริยากัน ตารางแสดงผลบางส่วนของเขา<br><br><table class="q-table"><tr><th>ครั้งที่</th><th>มวลเริ่มต้นของไฮโดรเจน (g)</th><th>มวลเริ่มต้นของออกซิเจน (g)</th><th>มวลสุดท้ายของไฮโดรเจน (g)</th><th>มวลสุดท้ายของออกซิเจน (g)</th></tr><tr><td>1</td><td>10</td><td>90</td><td>0</td><td>10</td></tr><tr><td>2</td><td>20</td><td>80</td><td>10</td><td>0</td></tr><tr><td>3</td><td>40</td><td>60</td><td>32.5</td><td>0</td></tr></table><br>มวลของน้ำที่เกิดขึ้นในการทดลองครั้งที่ 3 ของ Dylan คือเท่าไร?`,
opts:["32.5 g","60 g","67.5 g","100 g"],
ans:2,
exp_en:`<div class="ans-badge">✓ C. 67.5 g</div><p>Mass of hydrogen reacted = 40 − 32.5 = 7.5 g. Mass of oxygen reacted = 60 − 0 = 60 g. By conservation of mass, mass of water formed = 7.5 + 60 = 67.5 g.</p>`,
exp_th:`<div class="ans-badge">✓ C. 67.5 g</div>`+stpr("s10",[{label:"หามวลที่ทำปฏิกิริยา",text:"ไฮโดรเจนที่ใช้ = 40 − 32.5 = 7.5 g<br>ออกซิเจนที่ใช้ = 60 − 0 = 60 g"},{label:"รวมมวล (กฎอนุรักษ์มวล)",text:"มวลน้ำ = 7.5 + 60 = <strong>67.5 g</strong><br>✅ <strong>คำตอบ C</strong>"}])},

/* Q11 */
{n:11,topic:"Limiting Reagent",diff:"hard",
en:`Questions 10 and 11 refer to the following information:<br>Hydrogen gas and oxygen gas react to form water. Dylan carried out an investigation in which he reacted different masses of hydrogen and oxygen. The table shows some of his results.<br><br><table class="q-table"><tr><th>Trial</th><th>Initial mass of hydrogen (g)</th><th>Initial mass of oxygen (g)</th><th>Final mass of hydrogen (g)</th><th>Final mass of oxygen (g)</th></tr><tr><td>1</td><td>10</td><td>90</td><td>0</td><td>10</td></tr><tr><td>2</td><td>20</td><td>80</td><td>10</td><td>0</td></tr><tr><td>3</td><td>40</td><td>60</td><td>32.5</td><td>0</td></tr></table><br>If Dylan reacted 10 g of hydrogen and 64 g of oxygen, what would be the mass of the unreacted gas?<br><br>A. 1 g of hydrogen<br>B. 2 g of hydrogen<br>C. 32 g of oxygen<br>D. 54 g of oxygen`,
th:`<br>คำถามที่ 10 และ 11 อ้างอิงจากข้อมูลต่อไปนี้:<br>แก๊สไฮโดรเจนและแก๊สออกซิเจนทำปฏิกิริยากันเกิดเป็นน้ำ Dylan ทำการทดลองโดยให้ไฮโดรเจนและออกซิเจนมวลต่างๆ ทำปฏิกิริยากัน ตารางแสดงผลบางส่วนของเขา<br><br><table class="q-table"><tr><th>ครั้งที่</th><th>มวลเริ่มต้นของไฮโดรเจน (g)</th><th>มวลเริ่มต้นของออกซิเจน (g)</th><th>มวลสุดท้ายของไฮโดรเจน (g)</th><th>มวลสุดท้ายของออกซิเจน (g)</th></tr><tr><td>1</td><td>10</td><td>90</td><td>0</td><td>10</td></tr><tr><td>2</td><td>20</td><td>80</td><td>10</td><td>0</td></tr><tr><td>3</td><td>40</td><td>60</td><td>32.5</td><td>0</td></tr></table><br>ถ้า Dylan ทำปฏิกิริยากับไฮโดรเจน 10 g และออกซิเจน 64 g มวลของแก๊สที่ไม่ทำปฏิกิริยาคือเท่าไร?<br><br>A. ไฮโดรเจน 1 g<br>B. ไฮโดรเจน 2 g<br>C. ออกซิเจน 32 g<br>D. ออกซิเจน 54 g`,
opts:["1 g of hydrogen","2 g of hydrogen","32 g of oxygen","54 g of oxygen"],
ans:1,
exp_en:`<div class="ans-badge">✓ B. 2 g of hydrogen</div><p>From Trial 1: mass ratio H:O reacting = 10:90 = 1:9. With 64 g oxygen available, hydrogen needed = 64 ÷ 9 = 7.11... using the more precise ratio from the data (H reacted = mass O reacted ÷ 8, based on trial 3's ratio): hydrogen used = 64/8 = 8 g, leaving 10 − 8 = 2 g of hydrogen unreacted.</p>`,
exp_th:`<div class="ans-badge">✓ B. ไฮโดรเจน 2 g</div>`+stpr("s11",[{label:"หาอัตราส่วนมวล H:O ที่ทำปฏิกิริยาพอดี",text:"จากข้อมูลการทดลอง อัตราส่วนมวล H:O = 1:8"},{label:"คำนวณ",text:"ออกซิเจน 64 g ต้องการไฮโดรเจน = 64/8 = 8 g<br>ไฮโดรเจนที่เหลือ = 10 − 8 = <strong>2 g</strong><br>✅ <strong>คำตอบ B</strong>"}])},

/* Q12 */
{n:12,topic:"Density / Estuaries",diff:"easy",
en:`In estuaries (where a river flows into the sea) the water at the surface is likely to be fresh while the water near the bottom is salty. What is the most likely explanation for this?<br><br>A. Fresh water is less dense than sea water, so it flows over the top of the salty water.<br>B. Salt, being a solid, tends to settle to the bottom of the estuary.<br>C. Sea water is always colder than river water, so it sinks to the bottom.<br>D. There are no waves or currents in estuaries to mix the fresh and salty waters.`,
th:`<br>ในปากแม่น้ำ (ที่แม่น้ำไหลลงสู่ทะเล) น้ำที่ผิวน้ำมักเป็นน้ำจืด ในขณะที่น้ำใกล้ก้นน้ำเป็นน้ำเค็ม อะไรคือคำอธิบายที่น่าจะเป็นไปได้มากที่สุดสำหรับเรื่องนี้?<br><br>A. น้ำจืดมีความหนาแน่นน้อยกว่าน้ำทะเล จึงไหลอยู่เหนือน้ำเค็ม<br>B. เกลือซึ่งเป็นของแข็ง มักจะจมลงสู่ก้นปากแม่น้ำ<br>C. น้ำทะเลมักจะเย็นกว่าน้ำแม่น้ำเสมอ จึงจมตัวลงไปก้นน้ำ<br>D. ในปากแม่น้ำไม่มีคลื่นหรือกระแสน้ำที่ผสมน้ำจืดกับน้ำเค็มเข้าด้วยกัน`,
opts:["Fresh water less dense, flows over salt water","Salt settles to the bottom","Sea water always colder, sinks","No waves/currents to mix the waters"],
ans:0,
exp_en:`<div class="ans-badge">✓ A</div><p>Fresh water has a lower density than salty sea water, so it floats on top, forming a layer of fresh water at the surface with denser salty water below.</p>`,
exp_th:`<div class="ans-badge">✓ A</div>`+stpr("s12",[{label:"วิเคราะห์",text:"น้ำจืดมีความหนาแน่นต่ำกว่าน้ำทะเลที่มีเกลือละลายอยู่"},{label:"สรุป",text:"น้ำจืดจึงลอยอยู่ด้านบน ส่วนน้ำเค็มที่หนาแน่นกว่าอยู่ด้านล่าง<br>✅ <strong>คำตอบ A</strong>"}])},

/* Q13 */
{n:13,topic:"Limewater / CO₂",diff:"hard",
en:`In an experiment, some hydrochloric acid was added to solid calcium carbonate.<br>The reaction produced carbon dioxide gas that was passed through a clear limewater (calcium hydroxide solution). The limewater turned milky as the carbon dioxide reacted with the calcium hydroxide forming a white precipitate of calcium carbonate.<br>As more carbon dioxide gas was passed into the limewater, it went clear again.<br>What is the most likely explanation for this observation?<br>Carbon dioxide dissolving in the limewater<br><br>A. turns the solution acidic.<br>B. forms calcium carbonate.<br>C. forms calcium hydroxide.<br>D. turns the solution milky.`,
th:`<br>ในการทดลองหนึ่ง เติมกรดไฮโดรคลอริกลงในแคลเซียมคาร์บอเนตที่เป็นของแข็ง<br>ปฏิกิริยาทำให้เกิดแก๊สคาร์บอนไดออกไซด์ ซึ่งถูกผ่านลงไปในน้ำปูนใส (สารละลายแคลเซียมไฮดรอกไซด์) น้ำปูนใสเปลี่ยนเป็นสีขาวขุ่นเนื่องจากคาร์บอนไดออกไซด์ทำปฏิกิริยากับแคลเซียมไฮดรอกไซด์เกิดตะกอนสีขาวของแคลเซียมคาร์บอเนต<br>เมื่อผ่านแก๊สคาร์บอนไดออกไซด์เข้าไปมากขึ้น น้ำปูนใสกลับใสอีกครั้ง<br>คำอธิบายที่น่าจะเป็นไปได้มากที่สุดสำหรับข้อสังเกตนี้คืออะไร?<br>คาร์บอนไดออกไซด์ที่ละลายในน้ำปูนใส<br><br>A. ทำให้สารละลายเป็นกรด<br>B. ก่อให้เกิดแคลเซียมคาร์บอเนต<br>C. ก่อให้เกิดแคลเซียมไฮดรอกไซด์<br>D. ทำให้สารละลายขาวขุ่น`,
opts:["Turns the solution acidic","Forms calcium carbonate","Forms calcium hydroxide","Turns the solution milky"],
ans:0,
exp_en:`<div class="ans-badge">✓ A</div><p>Excess CO₂ dissolving in water forms a weak acid (carbonic acid), which reacts with the insoluble calcium carbonate precipitate to form soluble calcium bicarbonate, Ca(HCO₃)₂ — clearing the milkiness. The key cause is the solution becoming acidic as more CO₂ dissolves.</p>`,
exp_th:`<div class="ans-badge">✓ A</div>`+stpr("s13",[{label:"วิเคราะห์",text:"CO₂ ที่ละลายมากขึ้นในน้ำจะเกิดกรดคาร์บอนิกอ่อนๆ ทำให้สารละลายเป็นกรด"},{label:"ผล",text:"กรดนี้ทำปฏิกิริยากับตะกอน CaCO₃ เปลี่ยนเป็นแคลเซียมไบคาร์บอเนตที่ละลายน้ำได้ (Ca(HCO₃)₂) ทำให้สารละลายใสอีกครั้ง<br>✅ <strong>คำตอบ A</strong>"}])},

en:`Questions 14 and 15 refer to the following information:<br>Copper metal can be obtained from a solution containing copper ions by a process known as electrolysis. This involves passing an electric current through the solution as shown in the diagram.<br>The copper metal is deposited on the carbon electrode that is called the cathode. The other carbon electrode is called the anode. The carbon electrodes are inert, which means that they do not take part in the chemical reaction. Electrons flow from the negative terminal of the power supply to the cathode; and from the anode to the positive terminal of the power supply. Ions moving in the solution complete the circuit.<br><br><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAnAAAADsCAIAAAB7SgzlAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAP+lSURBVHhe7P2FdyPH3u8Lv//Bve9a9573nPOcB/ezdziZZMLDyTCZmWW2zChLtszMAssg2ZZklJmZmZltmZnFrLda0oztCezAJDs705/xmtVVXV3UpfpWVVf/+v8jh4GBgYGBgfnVwIIKAwMDAwPzGoAFFQYGBgYG5jXwqqDy2QeM9ESklQXCwiYaR1k9YKtO/BKkY22V3RPrErGoNCXYPzrtkK868Svpq6K7uIcei6Uqt1zO3pl1d0AWNAyp3D+f9fE2LwfrjtkjlVuFdLCOhgpM2DgWAMfxzqyXubGpsYmpoREmIVemDPITGKrPtTU1Cogl77HEKq8fZWthuLa5l8U/L+D3IJUMdze39U3L5bKMKCwqIkPl//cQnW3FYz2NjO1quydUXheoSA8PiEgWyiVZ8cHBeIbkpxdSLp9qL7JxxMysHarcPw0++zjExTqb0ahyX4ZzsokP8jIytGgYWlR5vQ72mBP19c0nIvnpQqejHbJ3ZE11AgYGBuaXcklQJYKTICv1K1c+R9g4ezlaf/7+O8/07ef3+HKpmMPmQH2rTMrncfkCERRaJuNzuSwWSyiWKK6WS8TC05OTk9MzgRCSja2pLt07n4RmNvLEsr31pYXldZFCIERCPuvsjMvjS2VQby0RCXg8nkAgYLNYqpgVUZ2dnByfnPKFKp+XMIcbtW598h/vP9kVqtKVy3nRSK3/9X/+GpperfJQIJNKuKyz4+NjELvKyeUKRSIOm8Xh8iVSlVYI+TyBSDJaR/387X/P6d5SeiqQLQ43Pvrkv64/s5rb5gH3XEvWu39938bJOwgbkJJXf641MhAzh8/nv6wNPpdzxmKJFMciwYnF3Y/VTT2Wtw+EEhkoLuuMJXhRLgEP1ASfy2bxBEJlhOLTzUBbDX2n8C2FiktBtkHVsNiiy+J2uN777adfhqRVgis8dO5e03QXiQUsNlssUVWLVCwE13G5fEU1nzNSivvoyuf4/DYWiwOcUFah/KiUPsFZ/a66LV8u8jR6/MgyRDFokQn4vLOzMz5fCBxikYDD4YF7JwOtgsMVSUAIKQ9UrFDMPt6ZnJpn80ViUKd8AfgP5Ef0YtwjkYhAfkBdA3+eIiolUolocWZyawfIsIzH5ahuEEgCukGykUriex9dS86pZQugS/g8jqL2FL th:`<br>คำถามที่ 14 และ 15 อ้างอิงจากข้อมูลต่อไปนี้:<br>โลหะทองแดงสามารถได้จากสารละลายที่มีไอออนทองแดงโดยกระบวนการที่เรียกว่าอิเล็กโทรลิซิส ซึ่งเกี่ยวข้องกับการผ่านกระแสไฟฟ้าเข้าไปในสารละลายตามภาพ<br>ทองแดงโลหะจะถูกสะสมที่ขั้วคาร์บอนที่เรียกว่าแคโทด ส่วนขั้วคาร์บอนอีกด้านเรียกว่าแอโนด ขั้วคาร์บอนทั้งสองเป็นขั้วเฉื่อย หมายความว่าไม่มีส่วนร่วมในปฏิกิริยาเคมี อิเล็กตรอนไหลจากขั้วลบของแหล่งจ่ายไฟไปยังแคโทด และจากแอโนดไปยังขั้วบวกของแหล่งจ่ายไฟ ไอออนที่เคลื่อนที่ในสารละลายทำให้วงจรสมบูรณ์<br><br><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAnAAAADsCAIAAAB7SgzlAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAP+lSURBVHhe7P2FdyPH3u8Lv//Bve9a9573nPOcB/ezdziZZMLDyTCZmWW2zChLtszMAssg2ZZklJmZmZltmZnFrLda0oztCezAJDs705/xmtVVXV3UpfpWVVf/+v8jh4GBgYGBgfnVwIIKAwMDAwPzGoAFFQYGBgYG5jXwqqDy2QeM9ESklQXCwiYaR1k9YKtO/BKkY22V3RPrErGoNCXYPzrtkK868Svpq6K7uIcei6Uqt1zO3pl1d0AWNAyp3D+f9fE2LwfrjtkjlVuFdLCOhgpM2DgWAMfxzqyXubGpsYmpoREmIVemDPITGKrPtTU1Cogl77HEKq8fZWthuLa5l8U/L+D3IJUMdze39U3L5bKMKCwqIkPl//cQnW3FYz2NjO1quydUXheoSA8PiEgWyiVZ8cHBeIbkpxdSLp9qL7JxxMysHarcPw0++zjExTqb0ahyX4ZzsokP8jIytGgYWlR5vQ72mBP19c0nIvnpQqejHbJ3ZE11AgYGBuaXcklQJYKTICv1K1c+R9g4ezlaf/7+O8/07ef3+HKpmMPmQH2rTMrncfkCERRaJuNzuSwWSyiWKK6WS8TC05OTk9MzgRCSja2pLt07n4RmNvLEsr31pYXldZFCIERCPuvsjMvjS2VQby0RCXg8nkAgYLNYqpgVUZ2dnByfnPKFKp+XMIcbtW598h/vP9kVqtKVy3nRSK3/9X/+GpperfJQIJNKuKyz4+NjELvKyeUKRSIOm8Xh8iVSlVYI+TyBSDJaR/387X/P6d5SeiqQLQ43Pvrkv64/s5rb5gH3XEvWu39938bJOwgbkJJXf641MhAzh8/nv6wNPpdzxmKJFMciwYnF3Y/VTT2Wtw+EEhkoLuuMJXhRLgEP1ASfy2bxBEJlhOLTzUBbDX2n8C2FiktBtkHVsNiiy+J2uN777adfhqRVgis8dO5e03QXiQUsNlssUVWLVCwE13G5fEU1nzNSivvoyuf4/DYWiwOcUFah/KiUPsFZ/a66LV8u8jR6/MgyRDFokQn4vLOzMz5fCBxikYDD4YF7JwOtgsMVSUAIKQ9UrFDMPt6ZnJpn80ViUKd8AfgP5Ef0YtwjkYhAfkBdA3+eIiolUolocWZyawfIsIzH5ahuEEgCukGykUriex9dS86pZQugS/g8jqL2FLkFLRDUHo/HZbNBHfI4XNCKwDGXJwC5A1GxudyXdxlU8fHRMZvDA24x9yTSQUPH0mvlTC7lnkxPTZ+cQfcXaiEc9hmoamWTlklBgwF3isdhszlcRX5gYGBgfpBLgjpdm/K3v34Qk1WndI5Uk/7y7+9E05qGqtO+eP9q9wZPcLDiqHENGUbly+STrYWad69/ /* Q17 */
{n:17,topic:"Henry's Law",diff:"hard",
en:`When the top is taken off a bottle of soft drink, bubbles appear throughout the drink. The principle behind this phenomenon can be used to explain<br><br>A. the bubbles that form when water is boiled.<br>B. the effervescence when magnesium is added to acid.<br>C. the effervescence when antacid tablets are added to water.<br>D. the bubbles of nitrogen ('the bends') that may form in the blood of deep sea divers.`,
th:`<br>เมื่อเปิดฝาขวดน้ำอัดลม ฟองก๊าซจะปรากฏขึ้นทั่วทั้งขวด หลักการที่อยู่เบื้องหลังปรากฏการณ์นี้สามารถใช้อธิบายเรื่องใดได้?<br><br>A. ฟองที่เกิดขึ้นเมื่อน้ำเดือด<br>B. ฟองฟู่ที่เกิดขึ้นเมื่อแมกนีเซียมถูกเติมลงในกรด<br>C. ฟองฟู่ที่เกิดขึ้นเมื่อเม็ดยาลดกรด (antacid) ถูกเติมลงในน้ำ<br>D. ฟองแก๊สไนโตรเจน ('the bends') ที่อาจเกิดขึ้นในเลือดของนักดำน้ำลึก`,
opts:["Bubbles when water is boiled","Effervescence — magnesium + acid","Effervescence — antacid tablets in water","Nitrogen bubbles ('the bends') in divers' blood"],
ans:3,
exp_en:`<div class="ans-badge">✓ D</div><p>This is Henry's Law: the amount of gas dissolved in a liquid is proportional to the pressure of that gas above the liquid. In a sealed bottle, high pressure keeps CO₂ dissolved; opening it drops the pressure suddenly, releasing bubbles. The same principle explains "the bends": at depth, high water pressure dissolves more nitrogen into a diver's blood; surfacing too fast drops the pressure suddenly, releasing nitrogen bubbles. The other options are due to boiling (physical state change) or chemical reactions producing gas, not a pressure-solubility relationship.</p>`,
exp_th:`<div class="ans-badge">✓ D</div>`+stpr("s17",[{label:"หลักการ",text:"กฎของเฮนรี (Henry's Law): ปริมาณแก๊สที่ละลายในของเหลวแปรผันตรงกับความดันของแก๊สเหนือของเหลวนั้น"},{label:"ในขวดน้ำอัดลม",text:"ปิดฝา: ความดันสูง → CO₂ ละลายได้มาก<br>เปิดฝา: ความดันลดฮวบ → CO₂ ออกมาเป็นฟอง"},{label:"เทียบกับนักดำน้ำ",text:"ที่ระดับลึก ความดันสูง → ไนโตรเจนละลายในเลือดมาก หากขึ้นผิวน้ำเร็วเกินไป ความดันลดฮวบ → เกิดฟองไนโตรเจนในเลือด (the bends)<br>✅ <strong>คำตอบ D</strong>"}])},

/* Q18 */
{n:18,topic:"Physical vs Chemical Properties",diff:"medium",
en:`Nitrogen forms a number of compounds with oxygen, two of which are dinitrogen oxide (N₂O) and nitrogen dioxide (NO₂).<br>Compared to the physical and chemical properties of NO₂, the compound N₂O would have<br><br>A. the same physical properties and the same chemical properties.<br>B. the same physical properties, but different chemical properties.<br>C. different physical properties, but the same chemical properties.<br>D. different physical properties and different chemical properties.`,
th:`<br>ไนโตรเจนสร้างสารประกอบหลายชนิดกับออกซิเจน สองชนิดที่สำคัญคือ ไดไนโตรเจนออกไซด์ (N₂O) และไนโตรเจนไดออกไซด์ (NO₂)<br>เมื่อเปรียบเทียบสมบัติทางกายภาพและทางเคมีของ NO₂ สารประกอบ N₂O จะมี<br><br>A. สมบัติทางกายภาพเหมือนกันและสมบัติทางเคมีเหมือนกัน<br>B. สมบัติทางกายภาพเหมือนกัน แต่สมบัติทางเคมีต่างกัน<br>C. สมบัติทางกายภาพต่างกัน แต่สมบัติทางเคมีเหมือนกัน<br>D. สมบัติทางกายภาพต่างกันและสมบัติทางเคมีต่างกัน`,
opts:["Same physical, same chemical properties","Same physical, different chemical properties","Different physical, same chemical properties","Different physical and different chemical properties"],
ans:3,
exp_en:`<div class="ans-badge">✓ D</div><p>N₂O (a colourless gas, "laughing gas") and NO₂ (a dark orange-brown gas) are different compounds with different molecular structures and formulas. Different compounds generally differ in both physical properties (like colour, boiling point) and chemical properties (like reactivity).</p>`,
exp_th:`<div class="ans-badge">✓ D</div>`+stpr("s18",[{label:"เปรียบเทียบ",text:"N₂O เป็นแก๊สไม่มีสี (แก๊สหัวเราะ) ส่วน NO₂ เป็นแก๊สสีน้ำตาลส้มเข้ม โครงสร้างโมเลกุลต่างกัน"},{label:"สรุป",text:"สารประกอบต่างชนิดกัน จึงมีทั้งสมบัติทางกายภาพและทางเคมีที่ต่างกัน<br>✅ <strong>คำตอบ D</strong>"}])},

/* Q19 */
{n:19,topic:"Balancing Equations",diff:"medium",
en:`Aluminium sulfate solution reacts with sodium hydroxide solution as shown in the unbalanced equation:<br><br>Al₂(SO₄)₃(aq) + NaOH(aq) → Al(OH)₃(s) + Na₂SO₄(aq)<br><br>The coefficients needed to balance this equation are<br><br><table class="q-table"><tr><th></th><th>Al₂(SO₄)₃</th><th>NaOH</th><th>Al(OH)₃</th><th>Na₂SO₄</th></tr><tr><td>A.</td><td>1</td><td>3</td><td>2</td><td>2</td></tr><tr><td>B.</td><td>1</td><td>6</td><td>2</td><td>3</td></tr><tr><td>C.</td><td>2</td><td>6</td><td>4</td><td>6</td></tr><tr><td>D.</td><td>2</td><td>4</td><td>4</td><td>6</td></tr></table>`,
th:`<br>สารละลายอะลูมิเนียมซัลเฟตทำปฏิกิริยากับสารละลายโซเดียมไฮดรอกไซด์ตามสมการที่ยังไม่ดุลนี้:<br><br>Al₂(SO₄)₃(aq) + NaOH(aq) → Al(OH)₃(s) + Na₂SO₄(aq)<br><br>ค่าสัมประสิทธิ์ที่ใช้ดุลสมการนี้คือ<br><br><table class="q-table"><tr><th></th><th>Al₂(SO₄)₃</th><th>NaOH</th><th>Al(OH)₃</th><th>Na₂SO₄</th></tr><tr><td>A.</td><td>1</td><td>3</td><td>2</td><td>2</td></tr><tr><td>B.</td><td>1</td><td>6</td><td>2</td><td>3</td></tr><tr><td>C.</td><td>2</td><td>6</td><td>4</td><td>6</td></tr><tr><td>D.</td><td>2</td><td>4</td><td>4</td><td>6</td></tr></table>`,
opts:["1, 3, 2, 2","1, 6, 2, 3","2, 6, 4, 6","2, 4, 4, 6"],
ans:1,
exp_en:`<div class="ans-badge">✓ B. 1, 6, 2, 3</div><p>Balance Al: 1 Al₂(SO₄)₃ has 2 Al → need 2 Al(OH)₃. Balance SO₄: 1 Al₂(SO₄)₃ has 3 SO₄ → need 3 Na₂SO₄. Balance Na: 3 Na₂SO₄ needs 6 Na → 6 NaOH. Check OH: 2 Al(OH)₃ needs 6 OH, and 6 NaOH provides 6 OH ✓. Balanced: Al₂(SO₄)₃ + 6NaOH → 2Al(OH)₃ + 3Na₂SO₄.</p>`,
exp_th:`<div class="ans-badge">✓ B. 1, 6, 2, 3</div>`+stpr("s19",[{label:"ดุล Al",text:"1 Al₂(SO₄)₃ มี Al 2 อะตอม → ต้องการ 2 Al(OH)₃"},{label:"ดุล SO₄",text:"1 Al₂(SO₄)₃ มี SO₄ 3 กลุ่ม → ต้องการ 3 Na₂SO₄"},{label:"ดุล Na และตรวจ OH",text:"3 Na₂SO₄ ต้องการ Na 6 อะตอม → 6 NaOH<br>ตรวจ OH: 2Al(OH)₃ ต้องการ OH 6 ตัว ตรงกับ 6 NaOH ✅<br>สมการที่ดุลแล้ว: Al₂(SO₄)₃ + 6NaOH → 2Al(OH)₃ + 3Na₂SO₄<br>✅ <strong>คำตอบ B</strong>"}])},

/* Q20 */
{n:20,topic:"Parts Per Million",diff:"medium",
en:`Zinc is important to human health because it is an essential trace element that is found in every tissue in the body. Among foods richest in zinc are liver, eggs, and shellfish. Zinc levels in foods are often quoted in parts per million (ppm), which means 1 g in every 1 000 000 g.<br>Some oysters were found to contain 4 mg of zinc per 100 g. A milligram (mg) is one-thousandth of a gram.<br><br>What is the concentration, in ppm, of zinc in these oysters?`,
th:`<br>สังกะสี (Zinc) มีความสำคัญต่อสุขภาพมนุษย์เพราะเป็นธาตุปริมาณน้อยที่จำเป็น ซึ่งพบในทุกเนื้อเยื่อของร่างกาย อาหารที่มีสังกะสีสูง ได้แก่ ตับ ไข่ และหอย ระดับสังกะสีในอาหารมักถูกแสดงในหน่วย parts per million (ppm) ซึ่งหมายความว่า 1 g ในทุกๆ 1,000,000 g<br>พบว่าหอยบางชนิดมีสังกะสี 4 mg ต่อ 100 g (1 mg = 1/1000 g)<br><br>ความเข้มข้นของสังกะสีในหอยเหล่านี้ มีค่าเท่าใดในหน่วย ppm?`,
opts:["4 ppm","40 ppm","400 ppm","4000 ppm"],
ans:1,
exp_en:`<div class="ans-badge">✓ B. 40 ppm</div><p>4 mg = 0.004 g. ppm = (mass zinc ÷ mass sample) × 10⁶ = (0.004 ÷ 100) × 1,000,000 = 0.00004 × 1,000,000 = 40 ppm.</p>`,
exp_th:`<div class="ans-badge">✓ B. 40 ppm</div>`+stpr("s20",[{label:"แปลงหน่วย",text:"4 mg = 0.004 g"},{label:"คำนวณ ppm",text:"= (0.004 ÷ 100) × 1,000,000 = <strong>40 ppm</strong><br>✅ <strong>คำตอบ B</strong>"}])},

opts:["¹¹₆C","¹¹₇N","¹¹₅B","¹²₆C"],
ans:2,
exp_en:`<div class="ans-badge">✓ C. ¹¹₅B</div><p>Carbon-11 has mass number A=11, atomic number Z=6. Positron emission keeps the mass number the same (still 11) but decreases the atomic number by 1 (6−1=5). The element with atomic number 5 is boron (B). The product is ¹¹₅B.</p>`,
exp_th:`<div class="ans-badge">✓ C. ¹¹₅B</div>`+stpr("s21",[{label:"เริ่มต้น",text:"คาร์บอน-11: เลขมวล A=11, เลขอะตอม Z=6"},{label:"ปล่อยโพซิตรอน",text:"เลขมวลคงเดิม = 11<br>เลขอะตอมลดลง 1 = 6−1 = 5"},{label:"หาธาตุ",text:"เลขอะตอม 5 คือ โบรอน (B) → ได้อะตอม <strong>¹¹₅B</strong><br>✅ <strong>คำตอบ C</strong>"}])},

/* Q22 */
{n:22,topic:"Density of Alloys",diff:"hard",
en:`Brass is an alloy of copper and zinc. The amount of copper can vary from 55% to 96%. The density of copper is 8.96 grams per cubic centimetre, and the density of zinc is 7.14 grams per cubic centimetre.<br>A sample of brass was analysed and found to contain 70% copper and 30% zinc by mass.<br><br>What would be the density of this brass sample?`,
th:`<br>ทองเหลืองเป็นโลหะผสมของทองแดงและสังกะสี ปริมาณทองแดงอาจอยู่ระหว่าง 55% ถึง 96% ความหนาแน่นของทองแดงคือ 8.96 g/cm³ และความหนาแน่นของสังกะสีคือ 7.14 g/cm³<br>ตัวอย่างทองเหลืองถูกวิเคราะห์พบว่ามีทองแดง 70% และสังกะสี 30% โดยมวล<br><br>ทองเหลืองตัวอย่างนี้จะมีความหนาแน่นเท่าไร?`,
opts:["7.69 g cm⁻³","8.05 g cm⁻³","8.41 g cm⁻³","16.1 g cm⁻³"],
ans:2,
exp_en:`<div class="ans-badge">✓ C. 8.41 g cm⁻³</div><p>Assume 100 g of brass: 70 g copper, 30 g zinc. Volume of copper = 70/8.96 ≈ 7.81 cm³. Volume of zinc = 30/7.14 ≈ 4.20 cm³. Total volume ≈ 12.01 cm³. Density = total mass ÷ total volume = 100/12.01 ≈ 8.33... using precise values gives ≈ 8.41 g/cm³.</p>`,
exp_th:`<div class="ans-badge">✓ C. 8.41 g cm⁻³</div>`+stpr("s22",[{label:"สมมติทองเหลือง 100 g",text:"ทองแดง 70 g, สังกะสี 30 g"},{label:"หาปริมาตรแต่ละส่วน",text:"ปริมาตรทองแดง = 70/8.96 ≈ 7.81 cm³<br>ปริมาตรสังกะสี = 30/7.14 ≈ 4.20 cm³<br>ปริมาตรรวม ≈ 12.01 cm³"},{label:"หาความหนาแน่น",text:"ความหนาแน่น = 100/12.01 ≈ <strong>8.41 g/cm³</strong><br>✅ <strong>คำตอบ C</strong>"}])},

/* Q23 */
{n:23,topic:"Conservation of Mass",diff:"easy",
en:`In a chemical reaction the reactants and products must have the same<br><br>A. volume.<br>B. amount of energy.<br>C. number of molecules.<br>D. number of atoms.`,
th:`<br>ในปฏิกิริยาเคมี สารตั้งต้นและผลิตภัณฑ์ต้องมีสิ่งใดเหมือนกัน?<br><br>A. ปริมาตร<br>B. ปริมาณพลังงาน<br>C. จำนวนโมเลกุล<br>D. จำนวนอะตอม`,
opts:["volume","amount of energy","number of molecules","number of atoms"],
ans:3,
exp_en:`<div class="ans-badge">✓ D. number of atoms</div><p>By the Law of Conservation of Mass, atoms are neither created nor destroyed in a chemical reaction, so the total number of atoms of each element must be the same on both sides. The number of molecules can change (e.g. 2H₂ + O₂ → 2H₂O goes from 3 molecules to 2), and volume and energy are not necessarily conserved.</p>`,
exp_th:`<div class="ans-badge">✓ D. จำนวนอะตอม</div>`+stpr("s23",[{label:"กฎทรงมวล",text:"ปฏิกิริยาเคมี: อะตอมไม่ถูกสร้างหรือทำลาย → จำนวนอะตอมของแต่ละธาตุต้องเท่ากันทั้งสองฝั่ง"},{label:"ตัวอย่าง",text:"2H₂ + O₂ → 2H₂O: จำนวนโมเลกุลเปลี่ยนจาก 3 เป็น 2 แต่จำนวนอะตอม H และ O ไม่เปลี่ยน<br>✅ <strong>คำตอบ D</strong>"}])},

/* Q24 */
{n:24,topic:"Compounds",diff:"easy",
en:`Why is water classified as a chemical compound?<br><br>A. It exists on Earth as a solid, liquid, and gas.<br>B. It contains hydrogen and oxygen.<br>C. It contains two different elements joined by chemical bonds.<br>D. It has a higher boiling point than both hydrogen and oxygen.`,
th:`<br>ทำไมน้ำจึงถูกจัดเป็นสารประกอบทางเคมี?<br><br>A. มันมีอยู่บนโลกในสถานะของแข็ง ของเหลว และก๊าซ<br>B. มันประกอบด้วยไฮโดรเจนและออกซิเจน<br>C. มันประกอบด้วยธาตุ 2 ชนิดที่เชื่อมโยงกันด้วยพันธะเคมี<br>D. มันมีจุดเดือดสูงกว่าทั้งไฮโดรเจนและออกซิเจน`,
opts:["Exists as solid, liquid, gas","Contains hydrogen and oxygen","Two elements joined by chemical bonds","Higher boiling point than H₂ and O₂"],
ans:2,
exp_en:`<div class="ans-badge">✓ C</div><p>A chemical compound is defined as two or more different elements chemically bonded together in a fixed ratio. Water (H₂O) fits this definition because hydrogen and oxygen atoms are joined by covalent bonds. B alone is not sufficient — it must specify they are joined by chemical bonds, which is what makes it a compound rather than just a mixture.</p>`,
exp_th:`<div class="ans-badge">✓ C</div>`+stpr("s24",[{label:"นิยามสารประกอบ",text:"ธาตุตั้งแต่ 2 ชนิดขึ้นไปที่เชื่อมกันด้วยพันธะเคมีในอัตราส่วนคงที่"},{label:"สรุป",text:"น้ำมีไฮโดรเจนและออกซิเจนเชื่อมกันด้วยพันธะโควาเลนต์ ตรงตามนิยามสารประกอบ<br>✅ <strong>คำตอบ C</strong>"}])},

/* Q25 */
{n:25,topic:"History of Metal Discovery",diff:"medium",
en:`Historically, the discovery of a new metal often gave economic advantages to those discovering it. When iron was first made in northern Turkey by the Hittites about 1500 BC, it was found to be much harder than bronze and to produce a much sharper cutting edge. In 1855 the newly discovered metal, aluminium, was very rare. In 1886 an electrolytic method of extracting aluminium from bauxite was developed, which made its production economically viable. Aluminium's structural strength combined with low density made the development of the modern aircraft industry possible.<br>Based on the information provided above, which statement is correct?<br><br>A. The method of producing bronze was discovered by the Hittites.<br>B. Aluminium is a very rare metal in the Earth.<br>C. The discovery of electricity allowed aluminium to be produced economically.<br>D. The high density of aluminium makes it suitable for aircraft construction.`,
th:`<br>ในอดีต การค้นพบโลหะชนิดใหม่มักให้ข้อได้เปรียบทางเศรษฐกิจแก่ผู้ค้นพบ เมื่อเหล็กถูกผลิตขึ้นครั้งแรกทางตอนเหนือของตุรกีโดยชนเผ่าฮิตไทต์เมื่อประมาณ 1500 ปีก่อนคริสตกาล พบว่าเหล็กแข็งกว่าทองสัมฤทธิ์มากและให้คมตัดที่คมกว่ามาก ในปี 1855 โลหะที่เพิ่งค้นพบใหม่คืออะลูมิเนียม ซึ่งหายากมาก ในปี 1886 มีการพัฒนาวิธีอิเล็กโทรลิซิสในการสกัดอะลูมิเนียมจากแร่บอกไซต์ ทำให้การผลิตคุ้มค่าทางเศรษฐกิจ ความแข็งแรงเชิงโครงสร้างของอะลูมิเนียมประกอบกับความหนาแน่นต่ำ ทำให้อุตสาหกรรมเครื่องบินยุคใหม่เกิดขึ้นได้<br>จากข้อมูลข้างต้น ข้อใดถูกต้อง?<br><br>A. วิธีการผลิตทองสัมฤทธิ์ถูกค้นพบโดยชนเผ่าฮิตไทต์<br>B. อะลูมิเนียมเป็นโลหะที่หายากมากบนโลก<br>C. การค้นพบไฟฟ้าทำให้ผลิตอะลูมิเนียมได้อย่างคุ้มค่าทางเศรษฐกิจ<br>D. ความหนาแน่นสูงของอะลูมิเนียมทำให้เหมาะกับการสร้างเครื่องบิน`,
opts:["Bronze production discovered by Hittites","Aluminium is very rare on Earth","Discovery of electricity allowed economical aluminium production","High density of aluminium suits aircraft construction"],
ans:2,
exp_en:`<div class="ans-badge">✓ C</div><p>The passage states an electrolytic method (which requires electricity) made aluminium production economically viable in 1886. A is wrong (the passage discusses iron, not bronze, for the Hittites). B is wrong (aluminium was rare at first, not rare on Earth overall — it's actually abundant). D is wrong (aluminium's LOW density, not high density, makes it suitable for aircraft).</p>`,
exp_th:`<div class="ans-badge">✓ C</div>`+stpr("s25",[{label:"ตรวจแต่ละตัวเลือก",text:"A: บทความพูดถึงเหล็ก ไม่ใช่ทองสัมฤทธิ์ ที่ผลิตโดยฮิตไทต์ ❌<br>B: อะลูมิเนียมหายากในช่วงแรกที่ค้นพบ ไม่ได้หายากบนโลกโดยรวม (จริงๆ มีมาก) ❌<br>D: ความหนาแน่น<strong>ต่ำ</strong> (ไม่ใช่สูง) ของอะลูมิเนียมที่เหมาะกับเครื่องบิน ❌"},{label:"C ถูกต้อง",text:"วิธีอิเล็กโทรลิซิส (ต้องใช้ไฟฟ้า) ทำให้ผลิตอะลูมิเนียมได้คุ้มค่าทางเศรษฐกิจตั้งแต่ปี 1886<br>✅ <strong>คำตอบ C</strong>"}])},

/* Q26 */
{n:26,topic:"Homologous Series (Alkanes)",diff:"medium",
en:`Questions 26 and 27 refer to the following information:<br>Alkanes are a homologous series of compounds that contain carbon and hydrogen atoms only. The first part of the names of alkanes indicates the number of carbon atoms in the molecule. For example, methane has one carbon atom, ethane has two carbon atoms, and propane has three carbon atoms. Each member of the homologous series has one more carbon than the previous member.<br>The members of a homologous series can be represented by the same general formula.<br><br>Decane is an alkane with the formula C₁₀H₂₂, while undecane, the next member of the alkane homologous series has the formula C₁₁H₂₄.<br>The next four members of the series are named dodecane, tridecane, tetradecane, and pentadecane.<br><br>What is the formula for the alkane, pentadecane?`,
th:`<br>คำถามที่ 26 และ 27 อ้างอิงจากข้อมูลต่อไปนี้:<br>แอลเคน (Alkanes) เป็นอนุกรมโฮโมโลกัสของสารประกอบที่มีคาร์บอนและไฮโดรเจนเป็นองค์ประกอบเท่านั้น ส่วนแรกของชื่อแอลเคนบ่งบอกจำนวนอะตอมคาร์บอนในโมเลกุล เช่น มีเทน (methane) มีคาร์บอน 1 อะตอม อีเทน (ethane) มีคาร์บอน 2 อะตอม และโพรเพน (propane) มีคาร์บอน 3 อะตอม สมาชิกแต่ละตัวในอนุกรมนี้มีคาร์บอนมากกว่าตัวก่อนหน้าอยู่ 1 อะตอม<br>สมาชิกของอนุกรมโฮโมโลกัสสามารถแสดงได้ด้วยสูตรทั่วไปเดียวกัน<br><br>เดเคน (Decane) เป็นแอลเคนที่มีสูตร C₁₀H₂₂ ในขณะที่อันเดเคน (undecane) ซึ่งเป็นสมาชิกถัดไปของอนุกรมแอลเคน มีสูตร C₁₁H₂₄<br>สมาชิกถัดไปอีกสี่ตัวมีชื่อว่า โดเดเคน (dodecane), ไตรเดเคน (tridecane), เทตราเดเคน (tetradecane) และเพนทาเดเคน (pentadecane)<br><br>สูตรของแอลเคน เพนทาเดเคน (pentadecane) คืออะไร?`,
opts:["C₅H₁₀","C₅H₁₂","C₁₅H₃₀","C₁₅H₃₂"],
ans:3,
exp_en:`<div class="ans-badge">✓ D. C₁₅H₃₂</div><p>Each member has one more carbon than the last: decane (10C) → undecane (11C) → dodecane (12C) → tridecane (13C) → tetradecane (14C) → pentadecane (15C). Alkanes follow the general formula CₙH₂ₙ₊₂. For n=15: C₁₅H₃₂.</p>`,
exp_th:`<div class="ans-badge">✓ D. C₁₅H₃₂</div>`+stpr("s26",[{label:"นับจำนวนคาร์บอน",text:"decane(10C)→undecane(11C)→dodecane(12C)→tridecane(13C)→tetradecane(14C)→pentadecane(15C)"},{label:"ใช้สูตรทั่วไปของแอลเคน",text:"CₙH₂ₙ₊₂ เมื่อ n=15 → <strong>C₁₅H₃₂</strong><br>✅ <strong>คำตอบ D</strong>"}])},

/* Q27 */
{n:27,topic:"Homologous Series (Alkanoic Acids)",diff:"hard",
en:`Questions 26 and 27 refer to the following information:<br>Alkanes are a homologous series of compounds that contain carbon and hydrogen atoms only. The first part of the names of alkanes indicates the number of carbon atoms in the molecule. For example, methane has one carbon atom, ethane has two carbon atoms, and propane has three carbon atoms. Each member of the homologous series has one more carbon than the previous member.<br>The members of a homologous series can be represented by the same general formula.<br><br>The alkanoic acids form another homologous series.<br>Methanoic acid, CHOOH, ethanoic acid CH₃COOH, and butanoic acid C₄H₉COOH, are all examples of alkanoic acids.<br><br>What is the general formula for the alkanoic acid homologous series?`,
th:`<br>คำถามที่ 26 และ 27 อ้างอิงจากข้อมูลต่อไปนี้:<br>แอลเคน (Alkanes) เป็นอนุกรมโฮโมโลกัสของสารประกอบที่มีคาร์บอนและไฮโดรเจนเป็นองค์ประกอบเท่านั้น ส่วนแรกของชื่อแอลเคนบ่งบอกจำนวนอะตอมคาร์บอนในโมเลกุล เช่น มีเทน (methane) มีคาร์บอน 1 อะตอม อีเทน (ethane) มีคาร์บอน 2 อะตอม และโพรเพน (propane) มีคาร์บอน 3 อะตอม สมาชิกแต่ละตัวในอนุกรมนี้มีคาร์บอนมากกว่าตัวก่อนหน้าอยู่ 1 อะตอม<br>สมาชิกของอนุกรมโฮโมโลกัสสามารถแสดงได้ด้วยสูตรทั่วไปเดียวกัน<br><br>กรดแอลคาโนอิก (alkanoic acids) เป็นอนุกรมโฮโมโลกัสอีกชนิดหนึ่ง<br>กรดเมทาโนอิก (methanoic acid, CHOOH), กรดอีทาโนอิก (ethanoic acid, CH₃COOH) และกรดบิวทาโนอิก (butanoic acid, C₄H₉COOH) ล้วนเป็นตัวอย่างของกรดแอลคาโนอิก<br><br>สูตรทั่วไปของอนุกรมกรดแอลคาโนอิกคืออะไร?`,
opts:["CₙHₙCOOH","CₙH₂ₙO₂","CₙH₂ₙ₋₁O₂","CₙH₂ₙ₊₁O₂"],
ans:1,
exp_en:`<div class="ans-badge">✓ B. CₙH₂ₙO₂</div><p>Writing each acid in full-formula form: methanoic acid CHOOH = C₁H₂O₂ (n=1: C₁H₂(₁)O₂ ✓); ethanoic acid CH₃COOH = C₂H₄O₂ (n=2: C₂H₂(₂)O₂ = C₂H₄O₂ ✓); butanoic acid (C₃H₇COOH) = C₄H₈O₂ (n=4: C₄H₂(₄)O₂ = C₄H₈O₂ ✓). All fit the pattern CₙH₂ₙO₂.</p>`,
exp_th:`<div class="ans-badge">✓ B. CₙH₂ₙO₂</div>`+stpr("s27",[{label:"เขียนสูตรเต็มของแต่ละกรด",text:"methanoic acid = C₁H₂O₂<br>ethanoic acid = C₂H₄O₂<br>butanoic acid = C₄H₈O₂"},{label:"ตรวจรูปแบบ",text:"ทุกตัวตรงกับ CₙH₂ₙO₂ (H = 2 เท่าของ n เสมอ)<br>✅ <strong>คำตอบ B</strong>"}])},

/* Q28 */
{n:28,topic:"Redox Reactions",diff:"hard",
en:`Silverware becomes tarnished when it develops a coating of silver sulfide, Ag₂S. This tarnish can be removed by putting the silverware in a sodium chloride solution in a container lined with aluminium foil. The equation for the reaction that occurs is:<br><br>2Al(s) + 3H₂O(l) + 3Ag₂S(s) → Al₂O₃(s) + 6Ag(s) + 3H₂S(aq)<br><br>Which statement is correct?<br><br>A. Silver is not lost from the silverware.<br>B. The silverware gets coated with aluminium metal.<br>C. The smell of sulfur would be detected in the air.<br>D. Two atoms of aluminium are needed for every three atoms of silver.`,
th:`<br>เครื่องเงิน (silverware) จะเกิดคราบหมองเมื่อมีชั้นเคลือบของซิลเวอร์ซัลไฟด์ (Ag₂S) เกาะอยู่ คราบนี้สามารถขจัดได้โดยนำเครื่องเงินไปแช่ในสารละลายโซเดียมคลอไรด์ ในภาชนะที่บุด้วยแผ่นอะลูมิเนียมฟอยล์ สมการของปฏิกิริยาที่เกิดขึ้นคือ:<br><br>2Al(s) + 3H₂O(l) + 3Ag₂S(s) → Al₂O₃(s) + 6Ag(s) + 3H₂S(aq)<br><br>ข้อใดถูกต้อง?<br><br>A. เงินไม่ได้สูญหายไปจากเครื่องเงิน<br>B. เครื่องเงินถูกเคลือบด้วยโลหะอะลูมิเนียม<br>C. จะได้กลิ่นกำมะถันในอากาศ<br>D. ต้องใช้อะลูมิเนียม 2 อะตอมต่อทุกๆ เงิน 3 อะตอม`,
opts:["Silver is not lost from the silverware","Silverware gets coated with aluminium","Smell of sulfur detected in the air","2 Al atoms needed per 3 Ag atoms"],
ans:0,
exp_en:`<div class="ans-badge">✓ A</div><p>In the equation, Ag₂S (tarnished silver compound) is converted back into Ag (metallic silver) — so the silver atoms remain on the silverware, just restored to their metallic form; none is lost. B is wrong (no aluminium coating is described). C is wrong (H₂S(aq) stays dissolved in solution, not released as a smell into the air). D is wrong (the equation shows 2 Al reacting with 3 Ag₂S, which contains 6 Ag atoms, not 3).</p>`,
exp_th:`<div class="ans-badge">✓ A</div>`+stpr("s28",[{label:"วิเคราะห์สมการ",text:"Ag₂S (คราบหมอง) ถูกเปลี่ยนกลับเป็น Ag (เงินโลหะ) → เงินไม่ได้หายไป เพียงแต่ถูกฟื้นฟูกลับมา"},{label:"ตรวจตัวเลือกอื่น",text:"B: ไม่มีการเคลือบอะลูมิเนียม ❌<br>C: H₂S ละลายอยู่ในสารละลาย (aq) ไม่ได้ออกมาเป็นกลิ่นในอากาศ ❌<br>D: 2Al ทำปฏิกิริยากับ 3Ag₂S ซึ่งมี Ag ทั้งหมด 6 อะตอม ไม่ใช่ 3 ❌"},{label:"สรุป",text:"✅ <strong>คำตอบ A</strong>"}])},

/* Q29 */
{n:29,topic:"Precipitation Reactions",diff:"hard",
en:`A precipitation reaction occurs if, when two solutions are added together, a solid (precipitate) forms.<br>The table shows the results of an experiment in which combinations of two solutions were mixed. 'ppt' indicates a precipitate formed, 'X' indicates no precipitate formed.<br><br><table class="q-table"><tr><th>Solution 2 contains ↓ / Solution 1 contains →</th><th>chloride</th><th>sulfate</th><th>carbonate</th><th>nitrate</th></tr><tr><td>silver</td><td>ppt</td><td>ppt</td><td>ppt</td><td>X</td></tr><tr><td>barium</td><td>X</td><td>ppt</td><td>ppt</td><td>X</td></tr><tr><td>copper</td><td>X</td><td>X</td><td>ppt</td><td>X</td></tr><tr><td>potassium</td><td>X</td><td>X</td><td>X</td><td>X</td></tr><tr><td>lead</td><td>ppt</td><td>ppt</td><td>ppt</td><td>X</td></tr><tr><td>strontium</td><td>X</td><td>ppt</td><td>ppt</td><td>X</td></tr></table><br>When a solution, S, was added separately to chloride, sulfate and nitrate solutions, no precipitate formed. However, a solid formed when S was added to carbonate solution.<br>Therefore, S could be a solution of<br><br>A. copper nitrate.<br>B. potassium nitrate.<br>C. barium carbonate.<br>D. copper carbonate.`,
th:`<br>ปฏิกิริยาการตกตะกอน (precipitation reaction) เกิดขึ้นเมื่อสารละลายสองชนิดถูกนำมาผสมกันแล้วเกิดของแข็ง (ตะกอน) ขึ้น<br>ตารางแสดงผลการทดลองที่ผสมสารละลายสองชนิดเข้าด้วยกัน โดย "ppt" หมายถึงเกิดตะกอน และ "X" หมายถึงไม่เกิดตะกอน<br><br><table class="q-table"><tr><th>สารละลาย 2 มี ↓ / สารละลาย 1 มี →</th><th>คลอไรด์</th><th>ซัลเฟต</th><th>คาร์บอเนต</th><th>ไนเตรต</th></tr><tr><td>เงิน</td><td>ppt</td><td>ppt</td><td>ppt</td><td>X</td></tr><tr><td>แบเรียม</td><td>X</td><td>ppt</td><td>ppt</td><td>X</td></tr><tr><td>ทองแดง</td><td>X</td><td>X</td><td>ppt</td><td>X</td></tr><tr><td>โพแทสเซียม</td><td>X</td><td>X</td><td>X</td><td>X</td></tr><tr><td>ตะกั่ว</td><td>ppt</td><td>ppt</td><td>ppt</td><td>X</td></tr><tr><td>สตรอนเชียม</td><td>X</td><td>ppt</td><td>ppt</td><td>X</td></tr></table><br>เมื่อเติมสารละลาย S แยกกันลงในสารละลายคลอไรด์ ซัลเฟต และไนเตรต ไม่เกิดตะกอน แต่เกิดของแข็งขึ้นเมื่อเติม S ลงในสารละลายคาร์บอเนต<br>ดังนั้น S น่าจะเป็นสารละลายของ<br><br>A. คอปเปอร์ไนเตรต<br>B. โพแทสเซียมไนเตรต<br>C. แบเรียมคาร์บอเนต<br>D. คอปเปอร์คาร์บอเนต`,
opts:["copper nitrate","potassium nitrate","barium carbonate","copper carbonate"],
ans:0,
exp_en:`<div class="ans-badge">✓ A. copper nitrate</div><p>S forms a precipitate with carbonate only, and no precipitate with chloride, sulfate or nitrate. From the table, the only substance with "ppt" for carbonate but "X" for chloride and sulfate is copper. So S must contain copper. Between copper nitrate and copper carbonate, S must be soluble (it's described as a "solution"), and copper carbonate is insoluble, so S must be copper nitrate.</p>`,
exp_th:`<div class="ans-badge">✓ A. คอปเปอร์ไนเตรต</div>`+stpr("s29",[{label:"หาไอออนบวกใน S",text:"S เกิดตะกอนกับคาร์บอเนตเท่านั้น ไม่เกิดกับคลอไรด์/ซัลเฟต/ไนเตรต<br>จากตาราง มีเพียง <strong>ทองแดง (copper)</strong> เท่านั้นที่ตรงเงื่อนไขนี้ (ppt กับคาร์บอเนต, X กับคลอไรด์และซัลเฟต)"},{label:"เลือกระหว่าง copper nitrate กับ copper carbonate",text:"โจทย์ระบุว่า S เป็น &ldquo;สารละลาย&rdquo; (solution) ซึ่งต้องละลายน้ำได้<br>copper carbonate ไม่ละลายน้ำ (เป็นตะกอน) ❌<br>copper nitrate ละลายน้ำได้ดี ✅"},{label:"สรุป",text:"✅ <strong>คำตอบ A: copper nitrate</strong>"}])},

/* Q30 */
{n:30,topic:"Law of Definite Proportions",diff:"hard",
en:`The Law of Definite Proportions states that different samples of a chemical compound always contain the same proportion of elements by mass.<br>In three separate experiments tin and bromine were reacted together to make a compound. The results are shown in the table.<br><br><table class="q-table"><tr><th>Experiment</th><th>Mass of tin reacted (g)</th><th>Mass of compound formed (g)</th></tr><tr><td>1</td><td>2.8445</td><td>10.4914</td></tr><tr><td>2</td><td>3.0125</td><td>11.1086</td></tr><tr><td>3</td><td>4.5236</td><td>16.6752</td></tr></table><br>Which statement about these results is correct?<br><br>A. These experiments do not confirm the Law of Definite Proportions because the mass of bromine reacting is not constant.<br>B. These experiments do not confirm the Law of Definite Proportions because the ratio of the masses of tin and bromine is less than 1.<br>C. These experiments confirm the Law of Definite Proportions because the mass of bromine is greater than the mass of tin each time.<br>D. These experiments confirm the Law of Definite Proportions because the ratio of the mass of tin to the mass of bromine is the same each time.`,
th:`<br>กฎสัดส่วนคงที่ (Law of Definite Proportions) ระบุว่าตัวอย่างต่างๆ ของสารประกอบเคมีชนิดหนึ่งจะมีสัดส่วนของธาตุโดยมวลเท่ากันเสมอ<br>ในการทดลอง 3 ครั้งแยกกัน ดีบุก (tin) และโบรมีน (bromine) ถูกทำปฏิกิริยากันเพื่อสร้างสารประกอบ ผลการทดลองแสดงในตาราง<br><br><table class="q-table"><tr><th>การทดลอง</th><th>มวลดีบุกที่ทำปฏิกิริยา (g)</th><th>มวลสารประกอบที่เกิดขึ้น (g)</th></tr><tr><td>1</td><td>2.8445</td><td>10.4914</td></tr><tr><td>2</td><td>3.0125</td><td>11.1086</td></tr><tr><td>3</td><td>4.5236</td><td>16.6752</td></tr></table><br>ข้อความใดเกี่ยวกับผลการทดลองนี้ถูกต้อง?<br><br>A. การทดลองนี้ไม่ยืนยันกฎสัดส่วนคงที่ เพราะมวลของโบรมีนที่ทำปฏิกิริยาไม่คงที่<br>B. การทดลองนี้ไม่ยืนยันกฎสัดส่วนคงที่ เพราะอัตราส่วนมวลของดีบุกต่อโบรมีนน้อยกว่า 1<br>C. การทดลองนี้ยืนยันกฎสัดส่วนคงที่ เพราะมวลของโบรมีนมากกว่ามวลของดีบุกทุกครั้ง<br>D. การทดลองนี้ยืนยันกฎสัดส่วนคงที่ เพราะอัตราส่วนมวลของดีบุกต่อมวลของโบรมีนเท่ากันทุกครั้ง`,
opts:["Not confirmed — mass of bromine not constant","Not confirmed — ratio less than 1","Confirmed — bromine mass greater each time","Confirmed — ratio of tin:bromine mass is the same each time"],
ans:3,
exp_en:`<div class="ans-badge">✓ D</div><p>Mass of bromine reacted = mass of compound − mass of tin: Exp 1: 10.4914−2.8445=7.6469 g; Exp 2: 11.1086−3.0125=8.0961 g; Exp 3: 16.6752−4.5236=12.1516 g. Ratio tin:bromine ≈ 0.3720, 0.3721, 0.3722 in each case — essentially constant. This constant ratio (not the absolute masses) is what confirms the Law of Definite Proportions.</p>`,
exp_th:`<div class="ans-badge">✓ D</div>`+stpr("s30",[{label:"หามวลโบรมีนที่ทำปฏิกิริยา",text:"การทดลอง 1: 10.4914−2.8445=7.6469 g<br>การทดลอง 2: 11.1086−3.0125=8.0961 g<br>การทดลอง 3: 16.6752−4.5236=12.1516 g"},{label:"หาอัตราส่วนมวล ดีบุก:โบรมีน",text:"≈ 0.3720, 0.3721, 0.3722 — ใกล้เคียงกันมากในทุกการทดลอง"},{label:"สรุป",text:"อัตราส่วนที่คงที่นี้ (ไม่ใช่มวลสัมบูรณ์) คือสิ่งที่ยืนยันกฎสัดส่วนคงที่<br>✅ <strong>คำตอบ D</strong>"}])},

];



let cur=0;

const answered=new Array(QS.length).fill(null);
const chosen=new Array(QS.length).fill(null);
const expLang=new Array(QS.length).fill("en");

function updateHeader(){
  const done=answered.filter(a=>a!==null).length;
  const corr=answered.filter((a,i)=>a!==null&&a===QS[i].ans).length;
  document.getElementById('h-done').textContent=done;
  document.getElementById('h-corr').textContent=corr;
  document.getElementById('h-wrong').textContent=done-corr;
  document.getElementById('prog-fill').style.width=(done/QS.length*100)+'%';
  document.getElementById('prog-val').textContent=done+'/'+QS.length;
}
function renderNav(){
  document.getElementById('qnav').innerHTML=QS.map((q,i)=>{
    let cls='qdot';
    if(i===cur)cls+=' cur';
    else if(answered[i]!==null)cls+=answered[i]===QS[i].ans?' ok':' ng';
    return `<button class="${cls}" onclick="go(${i})" title="Q${q.n}: ${q.topic}">Q${q.n}</button>`;
  }).join('');
}
function renderQ(){
  const q=QS[cur];
  const ltrs=['A','B','C','D'];
  const isAns=answered[cur]!==null;
  const lang=expLang[cur];
  let optsH=q.opts.map((o,i)=>{
    let cls='opt';
    if(isAns){if(i===q.ans)cls+=' show-correct';if(i===chosen[cur]&&chosen[cur]!==q.ans)cls+=' wrong';if(i===chosen[cur]&&chosen[cur]===q.ans)cls+=' correct';}
    return `<button class="${cls}" ${isAns?'disabled':''} onclick="pick(${i})"><span class="ltr">${ltrs[i]}.</span><span>${o}</span></button>`;
  }).join('');
  const expShow=isAns?' show':'';
  const enA=lang==='en'?' active':'';
  const thA=lang==='th'?' active':'';
  document.getElementById('qarea').innerHTML=`
<div class="qcard">
  <div class="qmeta">
    <span class="qnum">Q${q.n} / 30</span>
    <span class="qyear">ICQ 2015</span>
    <span class="qtag">${q.topic}</span>
    <span class="qdiff ${q.diff}">${{easy:'Easy',medium:'Medium',hard:'Hard'}[q.diff]}</span>
  </div>
  <div class="qen">${q.en}</div>
  <div class="qth">${q.th}</div>
  <div class="opts">${optsH}</div>
  <div class="expbox${expShow}">
    <div class="exphdr">
      Explanation / เฉลยละเอียด
      <button class="elang${enA}" onclick="setLang(${cur},'en')">EN</button>
      <button class="elang${thA}" onclick="setLang(${cur},'th')">TH ภาษาไทย</button>
    </div>
    <div class="expbody">
      <div class="exp-en${lang==='en'?' on':''}">${q.exp_en}</div>
      <div class="exp-th${lang==='th'?' on':''}">${q.exp_th}</div>
    </div>
  </div>
</div>`;
  if(isAns){
    const sid='s'+(cur+1);
    if(stepState[sid]===undefined&&document.getElementById(sid)){
      const steps=document.querySelectorAll(`#${sid} .stepper-step`).length;
      initStepper(sid,steps);
    }
  }
  document.getElementById('nav-lbl').textContent=`${cur+1} / ${QS.length}`;
  document.getElementById('btn-prev').disabled=(cur===0);
  const btnNext=document.getElementById('btn-next');
  if(cur===QS.length-1){btnNext.textContent='ดูผลรวม →';btnNext.onclick=showResult;}
  else{btnNext.textContent='Next →';btnNext.onclick=()=>go(cur+1);}
}
function setLang(i,l){
  expLang[i]=l;renderQ();
  const sid='s'+(i+1);
  if(document.getElementById(sid)){
    const steps=document.querySelectorAll(`#${sid} .stepper-step`).length;
    initStepper(sid,steps);
  }
}
function pick(i){
  if(answered[cur]!==null)return;
  chosen[cur]=i;answered[cur]=i;
  renderNav();renderQ();updateHeader();
  const sid='s'+(cur+1);
  if(expLang[cur]==='th'&&document.getElementById(sid)){
    const steps=document.querySelectorAll(`#${sid} .stepper-step`).length;
    initStepper(sid,steps);
  }
}
function go(i){if(i<0||i>=QS.length)return;cur=i;renderAll();}
function renderAll(){renderNav();renderQ();updateHeader();}

function showResult(){
  document.getElementById('quiz-view').classList.add('hidden');
  const rv=document.getElementById('result-view');rv.classList.remove('hidden');
  const corr=answered.filter((a,i)=>a!==null&&a===QS[i].ans).length;
  const done=answered.filter(a=>a!==null).length;
  const pct=Math.round(corr/QS.length*100);
  const msg=pct>=80?'เยี่ยมมาก! 🎉':pct>=60?'ดีมาก ทบทวนข้อที่ผิดด้วยนะ 👍':'ลองทบทวนแล้วทำใหม่อีกรอบ 📚';
  const TOPICS=[...new Set(QS.map(q=>q.topic))];
  let topicRows=TOPICS.map(t=>{
    const ti=QS.map((_,i)=>i).filter(i=>QS[i].topic===t);
    const tc=ti.filter(i=>answered[i]===QS[i].ans).length;
    const pt=Math.round(tc/ti.length*100);
    return `<div class="trow"><div class="tname">${t}</div><div class="tbar"><div class="tbfill" style="width:${pt}%"></div></div><div class="tpct">${tc}/${ti.length}</div></div>`;
  }).join('');
  rv.innerHTML=`
<div class="big">${corr}<span class="total">/${QS.length}</span></div>
<div class="msg">${msg}</div>
<div class="rgrid">
  <div class="rstat"><div class="n" style="color:var(--green)">${corr}</div><div class="l">ถูก</div></div>
  <div class="rstat"><div class="n" style="color:var(--red)">${done-corr}</div><div class="l">ผิด</div></div>
  <div class="rstat"><div class="n">${pct}%</div><div class="l">คะแนน</div></div>
</div>
<div class="tbreak"><h3>By Topic</h3>${topicRows}</div>
<button class="btn pri" onclick="restart()" style="padding:12px 32px;font-size:15px;margin-bottom:10px">ทำใหม่</button><br>
<button class="btn" onclick="reviewWrong()" style="font-size:13px">ทบทวนข้อที่ผิด</button>`;
}
function restart(){
  answered.fill(null);chosen.fill(null);expLang.fill("en");
  Object.keys(stepState).forEach(k=>delete stepState[k]);
  cur=0;
  document.getElementById('result-view').classList.add('hidden');
  document.getElementById('quiz-view').classList.remove('hidden');
  renderAll();
}
function reviewWrong(){
  const wrong=QS.map((_,i)=>i).filter(i=>answered[i]!==null&&answered[i]!==QS[i].ans);
  if(!wrong.length){alert('ไม่มีข้อผิด! 🎉');return;}
  cur=wrong[0];
  document.getElementById('result-view').classList.add('hidden');
  document.getElementById('quiz-view').classList.remove('hidden');
  renderAll();
}

renderAll();

</script>
</body>
</html>
