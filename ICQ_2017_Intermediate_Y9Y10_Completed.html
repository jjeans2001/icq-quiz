<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ICQ 2017 — Intermediate Division (Year 9 & 10)</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f3ee;--card:#ffffff;--card2:#eeeae2;--border:#ddd8cc;
  --text:#1a1916;--muted:#6e6a5e;
  --green:#1e7a47;--green-bg:#e3f5ec;
  --red:#c0392b;--red-bg:#fdecea;
  --blue:#1a4f8a;--blue-bg:#e6eff9;
  --amber:#9a5500;--amber-bg:#fdf1dc;
  --gold:#9a7700;--gold-bg:#fdf8e1;
  --teal:#0a6e54;--teal-bg:#e0f5ed;
  --icq-teal:#00a89d;--icq-purple:#7b4fa6;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}

/* TOP BAR */
.topbar{position:sticky;top:0;z-index:200;background:#1a1916;display:flex;align-items:center;justify-content:space-between;padding:10px 24px;gap:12px}
.logo{display:flex;align-items:center;gap:12px;min-width:0}
.logo-icq{display:flex;gap:4px;align-items:flex-end}
.logo-icq .i-letter{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;color:var(--icq-teal)}
.logo-icq .c-letter{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;color:var(--icq-purple)}
.logo-icq .q-letter{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;color:var(--icq-teal)}
.logo-text{color:#fff;font-size:13px;font-weight:500;line-height:1.3;opacity:.88}
.logo-sub{font-size:10px;opacity:.55;color:#fff}
.top-stats{display:flex;gap:20px;flex-shrink:0}
.tstat{text-align:center}
.tstat .n{font-size:17px;font-weight:700;font-family:'DM Mono',monospace}
.tstat .l{font-size:9px;opacity:.5;text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.tstat .n.g{color:#4ed68a}.tstat .n.r{color:#f07070}.tstat .n.w{color:#fff}

/* WRAP */
.wrap{max-width:840px;margin:0 auto;padding:24px 18px 80px}

/* PROGRESS */
.prog-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:16px}
.prog-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.prog-lbl{font-size:12px;color:var(--muted)}.prog-val{font-size:12px;font-weight:700;font-family:'DM Mono',monospace;margin-left:auto;color:var(--text)}
.prog-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--icq-teal),#5dd8d0);border-radius:3px;transition:width .5s ease}

/* Q NAV */
.qnav-wrap{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px}
.qdot{width:34px;height:34px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);font-size:11px;font-family:'DM Mono',monospace;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.qdot:hover{background:var(--card2)}.qdot.cur{background:var(--text);color:#fff;border-color:var(--text)}
.qdot.ok{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.qdot.ng{background:var(--red-bg);border-color:var(--red);color:var(--red)}

/* QUESTION CARD */
.qcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:26px;box-shadow:0 2px 8px rgba(0,0,0,.04);animation:fadein .2s ease}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.qmeta{display:flex;align-items:center;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.qnum{font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace}
.qtag{font-size:11px;padding:3px 9px;border-radius:10px;background:var(--blue-bg);color:var(--blue);font-weight:600}
.qyear{font-size:11px;padding:3px 9px;border-radius:10px;background:var(--gold-bg);color:var(--gold);font-weight:700}
.qdiff{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:600}
.qdiff.easy{background:var(--green-bg);color:var(--green)}
.qdiff.medium{background:var(--amber-bg);color:var(--amber)}
.qdiff.hard{background:var(--red-bg);color:var(--red)}

/* CONTEXT BLOCK (shared between questions) */
.context-block{background:#f8f6f2;border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:16px;font-size:13.5px;line-height:1.8}
.context-block .ctx-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px}

.qen{font-size:15px;line-height:1.7;color:var(--text);margin-bottom:5px}
.qth{font-size:14px;line-height:1.85;color:var(--muted);margin-bottom:18px;padding-left:12px;border-left:2px solid var(--border)}

/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:6px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:11px 15px;border:1.5px solid var(--border);border-radius:9px;cursor:pointer;font-size:14px;color:var(--text);background:var(--card);text-align:left;width:100%;transition:all .14s;line-height:1.55;font-family:'Sarabun',sans-serif}
.opt:hover:not(:disabled){background:var(--card2);border-color:#bbb4a8}
.opt .ltr{font-weight:700;font-family:'DM Mono',monospace;font-size:13px;min-width:22px;color:var(--muted);margin-top:1px;flex-shrink:0}
.opt.correct{background:var(--green-bg);border-color:var(--green)}.opt.correct .ltr{color:var(--green)}
.opt.wrong{background:var(--red-bg);border-color:var(--red)}.opt.wrong .ltr{color:var(--red)}
.opt.show-correct{background:var(--green-bg);border-color:var(--green)}.opt.show-correct .ltr{color:var(--green)}
.opt:disabled{cursor:default}

/* TABLE IN QUESTIONS */
.q-table{border-collapse:collapse;margin:10px 0;font-size:13.5px;width:100%}
.q-table th{background:var(--card2);font-weight:600;padding:7px 12px;border:1px solid var(--border);text-align:center}
.q-table td{padding:6px 12px;border:1px solid var(--border);text-align:center}
.q-table tr:nth-child(even) td{background:#fafaf8}

/* EXPLANATION BOX */
.expbox{margin-top:14px;border:1px solid var(--border);border-radius:9px;overflow:hidden;display:none}
.expbox.show{display:block}
.exphdr{padding:9px 16px;background:var(--card2);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.elang{padding:3px 10px;border-radius:8px;font-size:11px;cursor:pointer;font-weight:600;border:none;background:none;color:var(--muted);font-family:'Sarabun',sans-serif;transition:all .12s}
.elang.active{background:var(--text);color:#fff}
.expbody{padding:16px;font-size:13.5px;line-height:1.85;color:var(--text)}
.exp-en,.exp-th{display:none}.exp-en.on,.exp-th.on{display:block}
.ans-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:16px;background:var(--green-bg);border:1px solid var(--green);color:var(--green);font-weight:700;font-size:13px;margin-bottom:10px}
.ans-badge-wrong{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:16px;background:var(--red-bg);border:1px solid var(--red);color:var(--red);font-weight:700;font-size:13px;margin-bottom:8px}

/* STEPPER */
.stepper{margin:14px 0 0;border:1px solid var(--border);border-radius:9px;overflow:hidden}
.stepper-header{background:var(--card2);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.stepper-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.stepper-dots{display:flex;gap:5px}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:background .2s}
.sdot.active{background:var(--blue)}.sdot.done{background:var(--green)}
.stepper-body{padding:16px}
.stepper-step{display:none}.stepper-step.on{display:block;animation:fadein .2s}
.step-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--blue);margin-bottom:8px}
.step-text{font-size:14px;line-height:1.8;margin-bottom:8px}
.stepper-nav{display:flex;gap:8px;justify-content:flex-end;padding:8px 16px;background:var(--card2);border-top:1px solid var(--border)}
.sbtn{padding:6px 16px;border:1px solid var(--border);border-radius:6px;background:var(--card);font-size:13px;cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:500;color:var(--text);transition:all .12s}
.sbtn:hover{background:var(--card2)}.sbtn.pri{background:var(--blue);color:#fff;border-color:var(--blue)}.sbtn.pri:hover{background:#133d72}
.sbtn:disabled{opacity:.35;cursor:default}

.svg-wrap{background:var(--card2);border-radius:8px;padding:12px;margin:10px 0;overflow-x:auto;text-align:center}
.svg-wrap svg{display:inline-block;max-width:100%}

/* NAV */
.navrow{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-top:14px}
.btn{padding:10px 22px;border:1.5px solid var(--border);border-radius:9px;background:var(--card);font-size:14px;font-family:'Sarabun',sans-serif;color:var(--text);cursor:pointer;transition:all .14s;font-weight:500}
.btn:hover{background:var(--card2)}.btn:disabled{opacity:.35;cursor:default}
.btn.pri{background:var(--text);color:#fff;border-color:var(--text)}.btn.pri:hover{background:#333}

/* RESULT */
.result{text-align:center;padding:50px 20px}
.result .big{font-size:68px;font-weight:700;font-family:'DM Mono',monospace;line-height:1}
.result .total{font-size:20px;color:var(--muted);font-family:'DM Mono',monospace}
.result .msg{font-size:16px;margin:14px 0 28px;color:var(--muted)}
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:360px;margin:0 auto 24px}
.rstat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.rstat .n{font-size:26px;font-weight:700;font-family:'DM Mono',monospace}.rstat .l{font-size:11px;color:var(--muted);margin-top:2px}
.tbreak{max-width:460px;margin:0 auto 24px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:left}
.tbreak h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:12px}
.trow{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:13px}
.tname{min-width:140px;font-size:12px}.tbar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.tbfill{height:100%;border-radius:3px;background:var(--green)}.tpct{min-width:36px;text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}
.hidden{display:none!important}
sub,sup{font-size:.72em}
code{font-family:'DM Mono',monospace;background:var(--card2);padding:1px 5px;border-radius:4px;font-size:12.5px}
strong{font-weight:600}
.highlight{background:#fffbe6;border:1px solid #f0d060;border-radius:5px;padding:8px 12px;margin:8px 0;font-size:13.5px}
.formula{font-family:'DM Mono',monospace;font-size:13.5px;background:var(--card2);padding:2px 7px;border-radius:5px}
</style>
</head>
<body>
  <!-- ── password gate: วางบรรทัดนี้เป็นบรรทัดแรกสุด ต่อจาก <body> ในทุกไฟล์ ── -->
<div id="gate-overlay" style="position:fixed;inset:0;z-index:9999;background:#0d1117;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:sans-serif;color:#e6edf3;padding:20px;text-align:center;">
  <p style="margin-bottom:14px;font-size:16px;">🔒 กรุณาใส่รหัสเพื่อเข้าดูเว็บไซต์</p>
  <input id="gate-input" type="password" placeholder="รหัสผ่าน" autocomplete="off" style="padding:10px 14px;border-radius:8px;border:1px solid #30363d;background:#161b22;color:#e6edf3;font-size:14px;margin-bottom:14px;width:220px;text-align:center;">
  <br>
  <button id="gate-btn" style="padding:10px 28px;border-radius:8px;border:none;background:#58a6ff;color:#0d1117;font-weight:600;cursor:pointer;font-size:14px;">เข้าเว็บไซต์</button>
  <p id="gate-error" style="color:#f85149;font-size:13px;margin-top:12px;display:none;">รหัสไม่ถูกต้อง ลองใหม่อีกครั้ง</p>
</div>
<script>
(function(){
  var PASS = "Airplane";
  var overlay = document.getElementById('gate-overlay');
  if (sessionStorage.getItem('icq_gate_ok') === '1') {
    overlay.style.display = 'none';
  } else {
    document.getElementById('gate-btn').addEventListener('click', tryUnlock);
    document.getElementById('gate-input').addEventListener('keydown', function(e){
      if (e.key === 'Enter') tryUnlock();
    });
  }
  function tryUnlock(){
    var val = document.getElementById('gate-input').value;
    if (val === PASS) {
      sessionStorage.setItem('icq_gate_ok', '1');
      overlay.style.display = 'none';
    } else {
      document.getElementById('gate-error').style.display = 'block';
      document.getElementById('gate-input').value = '';
    }
  }
})();
</script>

<script>

/* ── SVG / stepper helpers ── */
function svgAtom(x,y,lbl,fill='#e8f0fa',textCol='#0c447c',r=14){
  return `<circle cx="${x}" cy="${y}" r="${r}" fill="${fill}" stroke="#185fa5" stroke-width="0.8"/>
<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="${textCol}">${lbl}</text>`;
}
const stepState={};
function makeStepper(id,steps){
  const dots=steps.map((_,i)=>`<div class="sdot" id="${id}-dot-${i}"></div>`).join('');
  const panels=steps.map((s,i)=>{
    const svgPart=s.svg?`<div class="svg-wrap">${s.svg}</div>`:'';
    return `<div class="stepper-step" id="${id}-step-${i}">
      <div class="step-label">${s.label}</div>
      <div class="step-text">${s.text}</div>${svgPart}</div>`;
  }).join('');
  return `<div class="stepper" id="${id}">
    <div class="stepper-header"><span class="stepper-title">อธิบายทีละขั้น</span><div class="stepper-dots">${dots}</div></div>
    <div class="stepper-body">${panels}</div>
    <div class="stepper-nav">
      <button class="sbtn" id="${id}-prev" onclick="stepNav('${id}',-1)" disabled>← ก่อนหน้า</button>
      <span id="${id}-counter" style="font-size:12px;color:var(--muted);align-self:center">1/${steps.length}</span>
      <button class="sbtn pri" id="${id}-next" onclick="stepNav('${id}',1)">ถัดไป →</button>
    </div></div>`;
}
function stpr(id,steps){return makeStepper(id,steps);}
function initStepper(id,total){stepState[id]={cur:0,total};showStep(id,0);}
function stepNav(id,dir){
  const s=stepState[id];if(!s)return;
  s.cur=Math.max(0,Math.min(s.total-1,s.cur+dir));showStep(id,s.cur);
}
function showStep(id,idx){
  const s=stepState[id];if(!s)return;
  for(let i=0;i<s.total;i++){
    const el=document.getElementById(`${id}-step-${i}`);
    const dot=document.getElementById(`${id}-dot-${i}`);
    if(el)el.classList.toggle('on',i===idx);
    if(dot){dot.className='sdot';if(i<idx)dot.classList.add('done');if(i===idx)dot.classList.add('active');}
  }
  const ctr=document.getElementById(`${id}-counter`);
  const prev=document.getElementById(`${id}-prev`);
  const next=document.getElementById(`${id}-next`);
  if(ctr)ctr.textContent=`${idx+1}/${s.total}`;
  if(prev)prev.disabled=(idx===0);
  if(next){if(idx===s.total-1){next.textContent='✓ จบแล้ว';next.disabled=true;}else{next.textContent='ถัดไป →';next.disabled=false;}}
}

{n:1,topic:"Boiling Point / Pressure",diff:"easy",

exp_th:`<div class="ans-badge">✓ C. ความดันอากาศน้อยกว่าที่ระดับน้ำทะเล</div>`+stpr("s1",[

/* Q3 */
{n:3,topic:"Equilibrium / Stoichiometry",diff:"hard",
en:`Industrially, ammonia can be made by the Haber process:<br><br>N₂(g) + 3H₂(g) ⇌ 2NH₃(g)<br><br>The ⇌ symbol indicates that there is always some nitrogen and hydrogen present.<br><br>Imagine that 100 molecules of N₂ gas and 300 molecules of H₂ gas were sealed in a container. After some time the mixture in the container was analysed and found to contain 40 molecules of N₂ gas.<br><br>How many molecules of H₂ and NH₃ were also in the container?<br><br>A. 60 H₂ and 80 NH₃&nbsp;&nbsp;B. 120 H₂ and 80 NH₃<br>C. 120 H₂ and 120 NH₃&nbsp;&nbsp;D. 60 H₂ and 120 NH₃`,
th:`<br>ในกระบวนการ Haber: N₂(g) + 3H₂(g) ⇌ 2NH₃(g)<br><br>เริ่มต้นด้วย N₂ 100 โมเลกุล และ H₂ 300 โมเลกุล หลังจากผ่านเวลาไปพบว่ามี N₂ เหลือ 40 โมเลกุล<br><br>มี H₂ และ NH₃ กี่โมเลกุลในภาชนะ?<br><br>A. H₂=60, NH₃=80&nbsp;&nbsp;B. H₂=120, NH₃=80<br>C. H₂=120, NH₃=120&nbsp;&nbsp;D. H₂=60, NH₃=120`,
opts:["60 H₂ and 80 NH₃","120 H₂ and 80 NH₃","120 H₂ and 120 NH₃","60 H₂ and 120 NH₃"],
ans:2,
exp_en:`<div class="ans-badge">✓ C. 120 H₂ and 120 NH₃</div><p>N₂ reacted = 100 − 40 = 60 molecules<br>Ratio N₂:H₂:NH₃ = 1:3:2<br>H₂ reacted = 60×3 = 180 → H₂ remaining = 300−180 = <b>120</b><br>NH₃ produced = 60×2 = <b>120</b></p>`,
exp_th:`<div class="ans-badge">✓ C. H₂=120, NH₃=120</div>`+stpr("s3",[
{label:"N₂ ที่ทำปฏิกิริยา",text:"เริ่มต้น 100 → เหลือ 40 → ทำปฏิกิริยา = 60 โมเลกุล"},
{label:"ใช้สัดส่วนจากสมการ N₂:H₂:NH₃ = 1:3:2",text:"H₂ ที่ใช้ = 60×3 = 180 → เหลือ 300−180 = <strong>120</strong><br>NH₃ ที่ได้ = 60×2 = <strong>120</strong><br>✅ <strong>คำตอบ C</strong>"},
])},

/* Q4 */
{n:4,topic:"Atomic Structure / Ions",diff:"easy",
en:`An ion that has 9 protons, 11 neutrons and 10 electrons would have a net charge of<br><br>A. +1&nbsp;&nbsp;B. +2&nbsp;&nbsp;C. −1&nbsp;&nbsp;D. −2`,
th:`<br>ไอออนที่มี proton 9 ตัว, neutron 11 ตัว และ electron 10 ตัว จะมีประจุสุทธิเท่าไร?<br><br>A. +1&nbsp;&nbsp;B. +2&nbsp;&nbsp;C. −1&nbsp;&nbsp;D. −2`,
opts:["+1","+2","−1","−2"],
ans:2,
exp_en:`<div class="ans-badge">✓ C. −1</div><p>Net charge = protons − electrons (neutrons are uncharged, so they don't count).<br>Net charge = 9 − 10 = <b>−1</b>.</p>`,
exp_th:`<div class="ans-badge">✓ C. −1</div>`+stpr("s4",[
{label:"สูตรประจุสุทธิ",text:"ประจุสุทธิ = จำนวน proton − จำนวน electron<br>(neutron ไม่มีประจุ ไม่นับ)"},
{label:"คำนวณ",text:"= 9 − 10 = <strong>−1</strong><br>✅ <strong>คำตอบ C</strong>"},
])},

/* Q6 */
{n:6,topic:"Stoichiometry (TNT)",diff:"hard",
en:`Trinitrotoluene (TNT) was first prepared in 1863 by Julius Wilbrand. It decomposes in a variety of reactions, two of which are:<br><br>2C₇H₅N₃O₆ → 2C + 12CO + 5H₂ + 3N₂<br>2C₇H₅N₃O₆ → 7C + 7CO + 5H₂O + 3N₂<br><br>Assume that these are the only two reactions occurring when 100 molecules of trinitrotoluene explode, producing 50 molecules of H₂ gas.<br><br>How many molecules of CO gas are also produced?<br><br>A. 475&nbsp;&nbsp;B. 400&nbsp;&nbsp;C. 210&nbsp;&nbsp;D. 120`,
th:`<br>TNT สลายตัวได้หลายแบบ โดยสองปฏิกิริยาที่เกี่ยวข้องคือ:<br>ปฏิกิริยา 1: 2C₇H₅N₃O₆ → 2C + 12CO + 5H₂ + 3N₂<br>ปฏิกิริยา 2: 2C₇H₅N₃O₆ → 7C + 7CO + 5H₂O + 3N₂<br><br>ถ้า TNT 100 โมเลกุลระเบิด ได้ H₂ 50 โมเลกุล มี CO กี่โมเลกุลที่เกิดขึ้น?<br><br>A. 475&nbsp;&nbsp;B. 400&nbsp;&nbsp;C. 210&nbsp;&nbsp;D. 120`,
opts:["475","400","210","120"],
ans:1,
exp_en:`<div class="ans-badge">✓ B. 400</div><p>Let x = TNT via Reaction 1, y = TNT via Reaction 2. x+y=100.<br>H₂ only from Reaction 1: (5/2)x = 50 → x=20, y=80<br>CO from R1: (12/2)×20 = 120<br>CO from R2: (7/2)×80 = 280<br>Total CO = 120+280 = <b>400</b></p>`,
exp_th:`<div class="ans-badge">✓ B. 400</div>`+stpr("s6",[
{label:"ตั้งสมการ",text:"x = TNT ที่ใช้ปฏิกิริยา 1, y = ปฏิกิริยา 2<br>x + y = 100 ... (1)"},
{label:"หา x จาก H₂",text:"H₂ มาจากปฏิกิริยา 1 เท่านั้น: (5/2)x = 50 → x=20, y=80"},
{label:"คำนวณ CO",text:"CO จากปฏิกิริยา 1: (12/2)×20 = 120<br>CO จากปฏิกิริยา 2: (7/2)×80 = 280<br>รวม = 120+280 = <strong>400</strong><br>✅ <strong>คำตอบ B</strong>"},

/* Q7 */
{n:7,topic:"Conservation of Mass",diff:"medium",
en:`The Law of Conservation of Mass states that the quantity of matter in a chemical reaction remains constant.<br><br>In an experiment 54.0 g of metal X was completely reacted with 54.0 g of steam (H₂O). Some metal oxide, with formula X₂O₃, and 6.0 g of H₂ gas were produced.<br><br>Approximately how many times heavier than an oxygen atom is an atom of metal X?<br><br>A. 3.5&nbsp;&nbsp;B. 1.7&nbsp;&nbsp;C. 0.9&nbsp;&nbsp;D. 0.6`,
th:`<br>กฎการอนุรักษ์มวล: สสารรวมในปฏิกิริยาเคมีคงที่<br><br>โลหะ X 54.0 g ทำปฏิกิริยากับไอน้ำ (H₂O) 54.0 g โดยสมบูรณ์ ได้โลหะออกไซด์ X₂O₃ และก๊าซ H₂ 6.0 g<br><br>อะตอมของโลหะ X หนักกว่าอะตอมออกซิเจนประมาณกี่เท่า?<br><br>A. 3.5&nbsp;&nbsp;B. 1.7&nbsp;&nbsp;C. 0.9&nbsp;&nbsp;D. 0.6`,
opts:["3.5","1.7","0.9","0.6"],
ans:1,
exp_en:`<div class="ans-badge">✓ B. 1.7</div><p>Mass of X₂O₃ = (54.0+54.0)−6.0 = 102 g<br>O from H₂O: fraction O in H₂O = 16/18 → mass O = 16/18 × 54 = 48 g<br>Mass of X in X₂O₃ = 102−48 = 54 g (for 2 atoms X per 3 atoms O)<br>Mass ratio X:O = (54/2):(48/3) = 27:16 = <b>1.6875 ≈ 1.7</b></p>`,
exp_th:`<div class="ans-badge">✓ B. 1.7</div>`+stpr("s7",[
{label:"หามวล X₂O₃",text:"มวลรวมก่อน = 54.0+54.0 = 108 g → หลัง = X₂O₃ + H₂<br>มวล X₂O₃ = 108−6.0 = 102 g"},
{label:"หามวล O จากน้ำ",text:"H₂O: %O = 16/18 → มวล O = 16/18 × 54 = 48 g"},
{label:"หาอัตราส่วนมวลอะตอม",text:"X₂O₃ → มวล X = 102−48=54 g (2 อะตอม X) | 48 g (3 อะตอม O)<br>มวลต่ออะตอม: X = 54/2 = 27 | O = 48/3 = 16<br>อัตราส่วน = 27/16 ≈ <strong>1.7</strong><br>✅ <strong>คำตอบ B</strong>"},
])},

/* Q8 */
{n:8,topic:"Phase Changes / Gases",diff:"medium",
en:`The table shows information about some of the gases found in dry air.<br><br><table class="q-table"><tr><th>Gas</th><th>Percentage by volume in dry air</th><th>Boiling point (°C)</th></tr><tr><td>Nitrogen</td><td>78.084</td><td>−196</td></tr><tr><td>Oxygen</td><td>20.947</td><td>−183</td></tr><tr><td>Argon</td><td>0.934</td><td>−186</td></tr><tr><td>Carbon dioxide</td><td>0.035</td><td>−78* (sublimes)</td></tr><tr><td>Neon</td><td>0.0018</td><td>−246</td></tr></table><br>A sample of dry air was cooled to −190 °C. The percentage of the original air remaining as a gas is closest to<br><br>A. 100%&nbsp;&nbsp;B. 80%&nbsp;&nbsp;C. 20%&nbsp;&nbsp;D. 0%`,
th:`<br>ตารางแสดงข้อมูลก๊าซในอากาศแห้ง ตัวอย่างอากาศแห้งถูกทำให้เย็นลงถึง −190°C<br><br><table class="q-table"><tr><th>ก๊าซ</th><th>%โดยปริมาตร</th><th>จุดเดือด (°C)</th></tr><tr><td>Nitrogen</td><td>78.084</td><td>−196</td></tr><tr><td>Oxygen</td><td>20.947</td><td>−183</td></tr><tr><td>Argon</td><td>0.934</td><td>−186</td></tr><tr><td>Carbon dioxide</td><td>0.035</td><td>−78* (sublimes)</td></tr><tr><td>Neon</td><td>0.0018</td><td>−246</td></tr></table><br>เปอร์เซ็นต์ของอากาศดั้งเดิมที่ยังเป็นก๊าซที่ −190°C ใกล้เคียงกับ<br><br>A. 100%&nbsp;&nbsp;B. 80%&nbsp;&nbsp;C. 20%&nbsp;&nbsp;D. 0%`,
opts:["100%","80%","20%","0%"],
ans:1,
exp_en:`<div class="ans-badge">✓ B. 80%</div><p>At −190°C, gases with boiling point below −190°C remain as gas:<br>• Nitrogen: bp=−196°C < −190°C → still gas ✅ (78.084%)<br>• Oxygen: bp=−183°C > −190°C → liquid ❌<br>• Argon: bp=−186°C > −190°C → liquid ❌<br>• CO₂: sublimes at −78°C → solid ❌<br>• Neon: bp=−246°C < −190°C → still gas ✅ (0.0018%)<br>Total gas ≈ 78.084 + 0.0018 ≈ <b>78.1% ≈ 80%</b></p>`,
exp_th:`<div class="ans-badge">✓ B. 80%</div>`+stpr("s8",[
{label:"หลักการ",text:"ก๊าซที่มีจุดเดือดต่ำกว่า −190°C → ยังเป็นก๊าซ<br>ก๊าซที่มีจุดเดือดสูงกว่า −190°C → กลายเป็นของเหลว"},
{label:"ตรวจแต่ละก๊าซ",text:"N₂: −196 < −190 → ยังเป็นก๊าซ ✅ (78.1%)<br>O₂: −183 > −190 → ของเหลว ❌<br>Ar: −186 > −190 → ของเหลว ❌<br>CO₂: ของแข็ง ❌<br>Ne: −246 < −190 → ยังเป็นก๊าซ ✅ (0.002%)"},
{label:"สรุป",text:"รวม ≈ 78.1% ≈ <strong>80%</strong><br>✅ <strong>คำตอบ B</strong>"},
])},

exp_th:`<div class="ans-badge">✓ A</div>`+stpr("s9",[
{label:"วิเคราะห์การทดลอง",text:"แกน x = มวล Zn ที่ใช้ (5, 10, 15, 20, 25 g)<br>แกน y = ปริมาตรก๊าซรวม (สุดท้าย) ของแต่ละการทดลอง"},
{label:"สรุป",text:"HCl มากเกินพอเสมอ → Zn ทำปฏิกิริยาหมดทุกครั้ง → ปริมาตรก๊าซรวมแปรผันตรงกับมวล Zn<br>กราฟจึงเป็นเส้นตรงผ่านจุดกำเนิด → <strong>กราฟ A</strong><br>✅ <strong>คำตอบ A</strong>"},
])},

/* Q10 */
{n:10,topic:"Rate of Reaction",diff:"medium",
en:`In another experiment, Dylan added excess hydrochloric acid to 5 g of zinc metal. The total volume of gas produced was measured each minute until all the zinc had reacted.<br><br>Which graph (A, B, C, or D) would best represent the results of this experiment?`,
th:`<br>ในการทดลองอีกครั้งหนึ่ง Dylan เติมกรดไฮโดรคลอริกที่มากเกินพอลงในสังกะสี (zinc) 5 g แล้ววัดปริมาตรรวมของก๊าซที่เกิดขึ้นทุกๆ 1 นาที จนกระทั่งสังกะสีทำปฏิกิริยาหมด<br><br>กราฟใด (A, B, C หรือ D) แสดงผลการทดลองนี้ได้ดีที่สุด?`,
opts:["Graph A","Graph B","Graph C","Graph D"],
ans:2,
exp_en:`<div class="ans-badge">✓ C</div><p>Hydrochloric acid is in excess, so zinc is the limiting reactant. At first both reactants are plentiful, so gas is produced quickly and the volume rises rapidly. As the zinc is used up, the rate of reaction slows, and once all the zinc has reacted, no more gas is produced, so the volume stays constant. This gives a curve that rises quickly and then levels off — Graph C.</p>`,
exp_th:`<div class="ans-badge">✓ C</div>`+stpr("s10",[
{label:"วิเคราะห์การทดลอง",text:"HCl มากเกินพอ → Zn เป็น limiting reagent<br>ช่วงแรกสารตั้งต้นมีมาก → ปริมาตรก๊าซเพิ่มขึ้นอย่างรวดเร็ว"},
{label:"เมื่อ Zn ใกล้หมด",text:"อัตราการเกิดปฏิกิริยาช้าลง เมื่อ Zn ทำปฏิกิริยาหมด ปริมาตรก๊าซจะคงที่ (plateau)<br>กราฟจึงเพิ่มขึ้นเร็วก่อนแล้วค่อยๆ คงที่<br>✅ <strong>คำตอบ C</strong>"},
])},

/* Q11 */
{n:11,topic:"Atomic Mass / Calculations",diff:"medium",
en:`Atoms of different elements have different masses. It was found that:<br>• the mass of 1 atom of He = the mass of 4 atoms of H<br>• the mass of 1 atom of Li = the mass of 1 atom of He + 3 atoms of H<br>• the mass of 1 atom of N = the mass of 2 atoms of Li<br><br>If the mass of 1 atom of N = 14 units and the mass of 1 atom of O = 16 units, which is correct?<br><br>A. 1 atom of O = 1 atom of Li + 1 atom of He<br>B. 1 atom of O = 1 atom of N + 1 atom of He<br>C. 1 atom of O = 1 atom of He + 2 atoms of Li<br>D. 1 atom of O = 1 atom of N + 2 atoms of H`,
th:`<br>จากข้อมูล:<br>• He = 4H | Li = He + 3H | N = 2Li<br><br>ถ้า N = 14 หน่วย และ O = 16 หน่วย ข้อใดถูกต้อง?<br><br>A. O = Li + He&nbsp;&nbsp;B. O = N + He&nbsp;&nbsp;C. O = He + 2Li&nbsp;&nbsp;D. O = N + 2H`,
opts:["1 atom of O = 1 atom of Li + 1 atom of He","1 atom of O = 1 atom of N + 1 atom of He","1 atom of O = 1 atom of He + 2 atoms of Li","1 atom of O = 1 atom of N + 2 atoms of H"],
ans:3,
exp_en:`<div class="ans-badge">✓ D. O = N + 2H</div><p>From N=14: N=2Li → Li=7; Li=He+3H; He=4H → Li=7H → He=4H<br>H=7/7=1 unit, He=4, Li=7, N=14, O=16<br>D: N+2H = 14+2(1) = 16 = O ✅</p>`,
exp_th:`<div class="ans-badge">✓ D. O = N + 2H</div>`+stpr("s11",[
{label:"หามวลอะตอมแต่ละธาตุ",text:"N=14 → 2Li=14 → Li=7<br>Li=He+3H → He=4H → 7=4H+3H=7H → H=1<br>He=4×1=4"},
{label:"ตรวจข้อ D",text:"N+2H = 14+2(1) = <strong>16 = O ✅</strong><br>✅ <strong>คำตอบ D</strong>"},
])},

/* Q12 */
{n:12,topic:"Gas Volumes",diff:"hard",
en:`When gases X and Y are mixed, exactly 1 litre of gas X reacts with 2 litres of gas Y to form 1 litre of gas Z.<br>Gas N doesn't react with any other gas. It simply adds to the total volume. ie 1 L of gas N mixes with 1 L of gas P to make a 2 L mixture containing equal amounts of gases N and P.<br><br>2 L of gas X was mixed with 2 L of gas Y and 2 L of gas N. What would be the final volume?<br><br>A. 3 L&nbsp;&nbsp;B. 4 L&nbsp;&nbsp;C. 5 L&nbsp;&nbsp;D. 6 L`,
th:`<br>เมื่อผสมก๊าซ X และ Y: X 1 ลิตร ทำปฏิกิริยากับ Y 2 ลิตร ได้ Z 1 ลิตร<br>ก๊าซ N ไม่ทำปฏิกิริยา แต่เพิ่มปริมาตรรวม<br><br>ผสม X 2 L + Y 2 L + N 2 L ปริมาตรสุดท้ายคือเท่าไร?<br><br>A. 3 L&nbsp;&nbsp;B. 4 L&nbsp;&nbsp;C. 5 L&nbsp;&nbsp;D. 6 L`,
opts:["3 L","4 L","5 L","6 L"],
ans:1,
exp_en:`<div class="ans-badge">✓ B. 4 L</div><p>Reaction: X + 2Y → Z (1:2:1 ratio by volume)<br>Available: X=2L, Y=2L<br>Y is limiting: 2L Y needs 1L X → uses 1L X to make 1L Z<br>Remaining: X=1L (excess), Z=1L, N=2L<br>Total = 1+1+2 = <b>4 L</b></p>`,
exp_th:`<div class="ans-badge">✓ B. 4 L</div>`+stpr("s12",[
{label:"ปฏิกิริยา X+2Y→Z",text:"X 2L + Y 2L → Y เป็น limiting (ต้องการ X=Y/2=1L)<br>→ ใช้ X 1L + Y 2L → ได้ Z 1L<br>X เหลือ = 2−1 = 1L"},
{label:"รวมปริมาตร",text:"X เหลือ=1L + Z=1L + N=2L = <strong>4 L</strong><br>✅ <strong>คำตอบ B</strong>"},
])},

/* Q13 */
{n:13,topic:"Chemical Indicators",diff:"medium",
en:`Chemical indicators are substances that change colour in the presence of other chemicals.<br><br>The table shows the colour changes for two indicators, HIn1 and HIn2, when they are added to solutions of P, Q, and a mixture of P and Q.<br><br><table class="q-table"><tr><th>Indicator</th><th>Chemical solution</th><th>Colour change</th></tr><tr><td>HIn1</td><td>P</td><td>yellow to blue</td></tr><tr><td>HIn1</td><td>P and Q</td><td>yellow to blue</td></tr><tr><td>HIn2</td><td>Q</td><td>red to yellow</td></tr><tr><td>HIn2</td><td>P and Q</td><td>red to orange</td></tr></table><br>The indicators were then used to test four other solutions: A, B, C, and D.<br>The resulting colours are shown in the table.<br><table class="q-table"><tr><th>Solution tested</th><th>Colour of HIn1</th><th>Colour of HIn2</th></tr><tr><td>A</td><td>yellow</td><td>yellow</td></tr><tr><td>B</td><td>yellow</td><td>red</td></tr><tr><td>C</td><td>blue</td><td>orange</td></tr><tr><td>D</td><td>blue</td><td>red</td></tr></table><br>Which solution (A, B, C, or D) contains substance Q but not substance P?<br><br>A. A&nbsp;&nbsp;B. B&nbsp;&nbsp;C. C&nbsp;&nbsp;D. D`,
th:`<br>ตารางแสดงการเปลี่ยนสีของอินดิเคเตอร์สองชนิด คือ HIn1 และ HIn2 เมื่อเติมลงในสารละลาย P, Q และสารละลายผสมของ P กับ Q<br><br><table class="q-table"><tr><th>อินดิเคเตอร์</th><th>สารละลาย</th><th>การเปลี่ยนสี</th></tr><tr><td>HIn1</td><td>P</td><td>เหลือง→น้ำเงิน</td></tr><tr><td>HIn1</td><td>P+Q</td><td>เหลือง→น้ำเงิน</td></tr><tr><td>HIn2</td><td>Q</td><td>แดง→เหลือง</td></tr><tr><td>HIn2</td><td>P+Q</td><td>แดง→ส้ม</td></tr></table><br>ผลการทดสอบสาร A, B, C, D:<br><table class="q-table"><tr><th>สาร</th><th>HIn1</th><th>HIn2</th></tr><tr><td>A</td><td>เหลือง</td><td>เหลือง</td></tr><tr><td>B</td><td>เหลือง</td><td>แดง</td></tr><tr><td>C</td><td>น้ำเงิน</td><td>ส้ม</td></tr><tr><td>D</td><td>น้ำเงิน</td><td>แดง</td></tr></table><br>สารใดมี Q แต่ไม่มี P?<br><br>A. A&nbsp;&nbsp;B. B&nbsp;&nbsp;C. C&nbsp;&nbsp;D. D`,
opts:["A","B","C","D"],
ans:0,
exp_en:`<div class="ans-badge">✓ A</div><p>For Q only (no P): HIn1 stays yellow (P turns it blue) ✅; HIn2 turns yellow (Q alone causes red→yellow) ✅<br>Solution A: HIn1=yellow (no P ✅), HIn2=yellow (Q present ✅) → contains Q, not P.</p>`,
exp_th:`<div class="ans-badge">✓ A</div>`+stpr("s13",[
{label:"เงื่อนไข: มี Q ไม่มี P",text:"HIn1: ถ้าไม่มี P → HIn1 ยังเป็นเหลือง<br>HIn2: ถ้ามี Q อย่างเดียว → HIn2 เปลี่ยนเป็นเหลือง"},
{label:"ตรวจสาร A",text:"HIn1=เหลือง → ไม่มี P ✅<br>HIn2=เหลือง → มี Q อย่างเดียว ✅<br>✅ <strong>คำตอบ A</strong>"},
])},

])},

/* Q15 */
{n:15,topic:"Chemical Decomposition",diff:"medium",
en:`Mercury(II) fulminate, Hg(CNO)₂, is an explosive that was first made by Edward Charles Howard in 1800. It decomposes producing three products; two that are elements; and two that are gases.<br><br>What are the three products when mercury(II) fulminate decomposes?<br><br>A. Hg, CO and N₂&nbsp;&nbsp;B. Hg, CO₂ and N₂<br>C. Hg, C and NO₂&nbsp;&nbsp;D. Hg, CO and NO`,
th:`<br>Mercury(II) fulminate (Hg(CNO)₂) เป็นวัตถุระเบิดที่สลายตัวได้ 3 ผลิตภัณฑ์: 2 ชนิดเป็นธาตุ และ 2 ชนิดเป็นก๊าซ<br><br>ผลิตภัณฑ์ทั้งสามคืออะไร?<br><br>A. Hg, CO และ N₂&nbsp;&nbsp;B. Hg, CO₂ และ N₂<br>C. Hg, C และ NO₂&nbsp;&nbsp;D. Hg, CO และ NO`,
opts:["Hg, CO and N₂","Hg, CO₂ and N₂","Hg, C and NO₂","Hg, CO and NO"],
ans:0,
exp_en:`<div class="ans-badge">✓ A. Hg, CO and N₂</div><p>Hg(CNO)₂ contains: Hg, C, N, O<br>3 products, 2 are elements, 2 are gases:<br>• Hg = element, solid ✓ (1 element)<br>• N₂ = element, gas ✓ (2nd element + 1st gas)<br>• CO = compound, gas ✓ (2nd gas)<br>Check: 2 elements (Hg, N₂), 2 gases (CO, N₂) ✅</p>`,
exp_th:`<div class="ans-badge">✓ A. Hg, CO และ N₂</div>`+stpr("s15",[
{label:"เงื่อนไข",text:"ผลิตภัณฑ์ 3 ชนิด | 2 ชนิดเป็นธาตุ | 2 ชนิดเป็นก๊าซ"},
{label:"ตรวจข้อ A",text:"Hg = ธาตุ, ของแข็ง ✅<br>N₂ = ธาตุ, ก๊าซ ✅<br>CO = สารประกอบ, ก๊าซ ✅<br>→ 2 ธาตุ (Hg, N₂) ✅ | 2 ก๊าซ (N₂, CO) ✅<br>✅ <strong>คำตอบ A</strong>"},
])},

/* Q16 */
{n:16,topic:"Balancing Equations",diff:"hard",
en:`Many explosives have the general formula CwHxNyOz where w, x, y, and z are subscripts. These explosives decompose according to the equation:<br><br>CwHxNyOz → w CO₂ + x/2 H₂O + y/2 N₂<br><br>Which equation allows the subscript z (the number of oxygen atoms) to be calculated?<br><br>A. z = 2w + x/2&nbsp;&nbsp;B. z = w + 2x&nbsp;&nbsp;C. z = w + x + y&nbsp;&nbsp;D. z = w + x/2 + y/2`,
th:`<br>วัตถุระเบิดหลายชนิดมีสูตร CwHxNyOz สลายตัวตามสมการ:<br><br>CwHxNyOz → w CO₂ + x/2 H₂O + y/2 N₂<br><br>สมการใดใช้คำนวณ z (จำนวน O) ได้?<br><br>A. z = 2w+x/2&nbsp;&nbsp;B. z = w+2x&nbsp;&nbsp;C. z = w+x+y&nbsp;&nbsp;D. z = w+x/2+y/2`,
opts:["z = 2w+x/2","z = w+2x","z = w+x+y","z = w+x/2+y/2"],
ans:0,
exp_en:`<div class="ans-badge">✓ A. z = 2w + x/2</div><p>Balance O atoms: Left side has z O atoms. Right side: w CO₂ has 2w O atoms; x/2 H₂O has x/2 O atoms; N₂ has no O.<br>z = 2w + x/2 ✅</p>`,
exp_th:`<div class="ans-badge">✓ A. z = 2w + x/2</div>`+stpr("s16",[
{label:"ดุล O",text:"ซ้าย: z อะตอม O<br>ขวา: CO₂(wCO₂) → 2w อะตอม O | H₂O(x/2) → x/2 อะตอม O | N₂ ไม่มี O"},
{label:"สมการ",text:"z = 2w + x/2<br>✅ <strong>คำตอบ A</strong>"},
])},

/* Q17 */
{n:17,topic:"Average Atomic Mass",diff:"easy",
en:`If a shopping trolley contains two 1 kg bags of sugar and eight 500 g bags of sugar, the average mass of a bag of sugar in the trolley is 600 g.<br><br>Similarly, the average atomic mass of an element depends on the atomic masses of its isotopes and the relative amount of each isotope. Copper exists as two isotopes, Cu-63 and Cu-65, with atomic masses of 62.9 and 64.9 amu respectively. The percentage abundance of Cu-63 is 69.2%, and of Cu-65 is 30.8%.<br><br>Which calculation will correctly give the average atomic mass of copper?<br><br>A. (69.2)×(62.9)+(30.8)×(64.9)<br>B. (30.8)×(62.9)+(7.6)×(64.9)<br>C. (0.692)×(62.9)+(0.308)×(64.9)<br>D. (0.308)×(62.9)+(0.692)×(64.9)`,
th:`<br>มวลอะตอมเฉลี่ยขึ้นกับมวลของไอโซโทปและความชุก ทองแดงมี 2 ไอโซโทป: Cu-63 (62.9 amu, 69.2%) และ Cu-65 (64.9 amu, 30.8%)<br><br>การคำนวณใดให้ค่าเฉลี่ยที่ถูกต้อง?<br><br>A. 69.2×62.9+30.8×64.9<br>B. 30.8×62.9+7.6×64.9<br>C. 0.692×62.9+0.308×64.9<br>D. 0.308×62.9+0.692×64.9`,
opts:["(69.2)×(62.9)+(30.8)×(64.9)","(30.8)×(62.9)+(7.6)×(64.9)","(0.692)×(62.9)+(0.308)×(64.9)","(0.308)×(62.9)+(0.692)×(64.9)"],
ans:2,
exp_en:`<div class="ans-badge">✓ C. (0.692)×(62.9)+(0.308)×(64.9)</div><p>Average atomic mass = Σ(fraction × mass)<br>Convert % to fraction: 69.2% = 0.692; 30.8% = 0.308<br>= (0.692)(62.9) + (0.308)(64.9) ✅</p>`,
exp_th:`<div class="ans-badge">✓ C</div>`+stpr("s17",[
{label:"สูตร",text:"มวลอะตอมเฉลี่ย = Σ(สัดส่วนความชุก × มวล)"},
{label:"แปลง % เป็นสัดส่วน",text:"69.2% = 0.692 | 30.8% = 0.308<br>= 0.692×62.9 + 0.308×64.9<br>✅ <strong>คำตอบ C</strong>"},
])},

/* Q18 */
{n:18,topic:"Champagne / Protein",diff:"easy",
en:`The bubbles in champagne and beer contain carbon dioxide gas. However, the bubbles in champagne tend to grow more quickly and rise more rapidly than bubbles in beer. Scientists have found that protein molecules can adsorb onto bubble walls, stiffening them. These adsorbed molecules create drag that slows down the rate at which the bubbles rise. They also found that the greater the concentration of carbon dioxide in the liquid, the faster the bubbles grow.<br><br>In comparison to champagne, beer has<br><br>A. less protein and a lower carbon dioxide concentration.<br>B. less protein and a higher carbon dioxide concentration.<br>C. more protein and a higher carbon dioxide concentration.<br>D. more protein and a lower carbon dioxide concentration.`,
th:`<br>ฟองในแชมเปญและเบียร์มี CO₂ แต่ฟองในแชมเปญโตเร็วและลอยขึ้นเร็วกว่า โปรตีนที่เกาะผิวฟองจะทำให้ฟองลอยช้าลง และ CO₂ มากขึ้นทำให้ฟองโตเร็วขึ้น<br><br>เมื่อเทียบกับแชมเปญ เบียร์มี<br><br>A. โปรตีนน้อยกว่าและ CO₂ น้อยกว่า<br>B. โปรตีนน้อยกว่าและ CO₂ มากกว่า<br>C. โปรตีนมากกว่าและ CO₂ มากกว่า<br>D. โปรตีนมากกว่าและ CO₂ น้อยกว่า`,
opts:["A","B","C","D"],
ans:3,
exp_en:`<div class="ans-badge">✓ D. More protein and lower CO₂</div><p>Beer bubbles rise more slowly than champagne → beer has MORE protein (slows rising).<br>Beer bubbles grow more slowly → beer has LESS CO₂ (less CO₂ = slower growth).</p>`,
exp_th:`<div class="ans-badge">✓ D. โปรตีนมากกว่า, CO₂ น้อยกว่า</div>`+stpr("s18",[
{label:"เบียร์ฟองลอยช้ากว่า",text:"→ เบียร์มีโปรตีนมากกว่า (โปรตีนทำให้ฟองลอยช้า)"},
{label:"เบียร์ฟองโตช้ากว่า",text:"→ เบียร์มี CO₂ น้อยกว่า (CO₂ น้อย=โตช้า)<br>✅ <strong>คำตอบ D</strong>"},
])},

exp_en:`<div class="ans-badge">✓ D. Heat water 1°C > heat ice 1°C</div><p>From the diagram: 0.1 kJ to heat ice (−5→0°C = 5°C rise for 10g → 0.02 kJ/°C); 4.2 kJ to heat water 100°C → 0.042 kJ/°C per gram.<br>Heating water 1°C takes more energy than heating ice 1°C. ✅</p>`,
exp_th:`<div class="ans-badge">✓ D. ให้ความร้อนน้ำมากกว่าน้ำแข็ง 1°C</div>`+stpr("s19",[
{label:"อ่านค่าจากแผนภาพ",text:"น้ำแข็ง −5°C→0°C: ใช้ 0.1 kJ (ΔT=5°C) → 0.02 kJ/°C<br>น้ำ 0°C→100°C: ใช้ 4.2 kJ (ΔT=100°C) → 0.042 kJ/°C"},
{label:"เปรียบเทียบ",text:"ให้ความร้อนน้ำ 1°C (0.042 kJ) > น้ำแข็ง 1°C (0.02 kJ)<br>✅ <strong>คำตอบ D</strong>"},
])},

/* Q20 */
{n:20,topic:"Chemical Formulae",diff:"easy",
en:`Monosodium phosphate is used in toothpaste and evaporated milk. In its formula:<br>(i) for every sodium (Na), there is one phosphorus (P);<br>(ii) for every phosphorus, there are two hydrogens (H);<br>(iii) for every hydrogen, there are two oxygens (O).<br><br>The formula for monosodium phosphate is<br><br>A. NaH₂PO₄&nbsp;&nbsp;B. Na₂HP₂O₄&nbsp;&nbsp;C. NaH₂PO₄&nbsp;&nbsp;D. NaHPO₂`,
th:`<br>Monosodium phosphate ใช้ในยาสีฟัน สูตรของมัน:<br>(i) Na:P = 1:1<br>(ii) P:H = 1:2<br>(iii) H:O = 1:2<br><br>สูตรเคมีคือ<br><br>A. NaH₂PO₄&nbsp;&nbsp;B. Na₂HP₂O₄&nbsp;&nbsp;C. NaH₂PO₄&nbsp;&nbsp;D. NaHPO₂`,
opts:["NaH₂PO₄","Na₂HP₂O₄","NaH₂PO₄","NaHPO₂"],
ans:0,
exp_en:`<div class="ans-badge">✓ A. NaH₂PO₄</div><p>Let Na=1, P=1 (from i). H=2×P=2 (from ii). O=2×H=4 (from iii).<br>Formula: Na₁H₂P₁O₄ = <b>NaH₂PO₄</b></p>`,
exp_th:`<div class="ans-badge">✓ A. NaH₂PO₄</div>`+stpr("s20",[
{label:"กำหนดอัตราส่วน",text:"Na=1 → P=1 | P=1 → H=2 | H=2 → O=4"},
{label:"สูตร",text:"Na₁H₂P₁O₄ = <strong>NaH₂PO₄</strong><br>✅ <strong>คำตอบ A</strong>"},
])},

/* Q21 */
{n:21,topic:"Solubility Product",diff:"hard",
en:`Salt lakes in central Australia, filled with water after occasional rain, evaporate during dry periods leaving mineral salts to crystallise. Different minerals tend to crystallise one at a time, forming zones of a single salt around the contours of the drying lake bed.<br><br>Solubility product, Ksp, a measure of the solubility of a salt, is the product of the concentrations of the ions present in a saturated solution of a salt. A large Ksp indicates that a salt is very soluble.<br><br>The Ksp of some salts commonly found in lake water are:<br>sodium chloride (NaCl) = 3.8 × 10¹<br>magnesium chloride (MgCl₂) = 7.7 × 10²<br>calcium sulfate (CaSO₄) = 2.0 × 10⁻⁵<br><br>As you walked into a lake bed, in what order would you find the salts deposited?<br><br>A. NaCl, MgCl₂, CaSO₄&nbsp;&nbsp;B. MgCl₂, NaCl, CaSO₄<br>C. CaSO₄, MgCl₂, NaCl&nbsp;&nbsp;D. CaSO₄, NaCl, MgCl₂`,
th:`<br>ทะเลสาบเกลือในออสเตรเลียกลาง น้ำระเหยทำให้เกลือตกผลึก ค่า Ksp ยิ่งสูงยิ่งละลายได้มาก<br><br>Ksp: NaCl=3.8×10¹ | MgCl₂=7.7×10² | CaSO₄=2.0×10⁻⁵<br><br>เมื่อเดินเข้าไปในทะเลสาบ จะพบเกลือตกผลึกตามลำดับใด?<br><br>A. NaCl, MgCl₂, CaSO₄&nbsp;&nbsp;B. MgCl₂, NaCl, CaSO₄<br>C. CaSO₄, MgCl₂, NaCl&nbsp;&nbsp;D. CaSO₄, NaCl, MgCl₂`,
opts:["NaCl, MgCl₂, CaSO₄","MgCl₂, NaCl, CaSO₄","CaSO₄, MgCl₂, NaCl","CaSO₄, NaCl, MgCl₂"],
ans:3,
exp_en:`<div class="ans-badge">✓ D. CaSO₄, NaCl, MgCl₂</div><p>As water evaporates, the least soluble salt (smallest Ksp) crystallises first (at the outer edge). The most soluble (largest Ksp) crystallises last (centre).<br>CaSO₄ (Ksp=2×10⁻⁵) → smallest, crystallises first (outer)<br>NaCl (3.8×10¹) → middle<br>MgCl₂ (7.7×10²) → most soluble, crystallises last (centre)</p>`,
exp_th:`<div class="ans-badge">✓ D. CaSO₄, NaCl, MgCl₂</div>`+stpr("s21",[
{label:"หลักการ",text:"น้ำระเหย → ความเข้มข้นเพิ่มขึ้น → เกลือที่ละลายได้น้อยสุด (Ksp ต่ำสุด) ตกผลึกก่อน"},
{label:"เรียงลำดับ Ksp",text:"CaSO₄: 2×10⁻⁵ (น้อยสุด) → ตกผลึกก่อน (ขอบนอก)<br>NaCl: 3.8×10¹ → กลาง<br>MgCl₂: 7.7×10² (มากสุด) → ตกผลึกหลังสุด (กลาง)<br>✅ <strong>คำตอบ D</strong>"},
])},

/* Q22 */
{n:22,topic:"Moles",diff:"easy",
en:`Dozen, score, gross and mole are all terms used to describe a certain number of items. Dozen = 12; score = 20; gross = 144; and mole = 6 × 10²³.<br><br>In one mole of ammonia, NH₃ molecules there are<br><br>A. 6 nitrogen atoms and 18 hydrogen atoms.<br>B. 6×10²³ nitrogen atoms and 1.8×10²⁴ hydrogen atoms.<br>C. 1/4 mole of nitrogen atoms and 3/4 mole of hydrogen atoms.<br>D. 1 mole of nitrogen atoms and 1 mole of hydrogen atoms.`,
th:`<br>Dozen=12, Score=20, Gross=144, Mole=6×10²³<br><br>ใน NH₃ 1 mol มีอะไรบ้าง?<br><br>A. N 6 อะตอม และ H 18 อะตอม<br>B. N 6×10²³ อะตอม และ H 1.8×10²⁴ อะตอม<br>C. N 1/4 mol และ H 3/4 mol<br>D. N 1 mol และ H 1 mol`,
opts:["A","B","C","D"],
ans:1,
exp_en:`<div class="ans-badge">✓ B. 6×10²³ N and 1.8×10²⁴ H</div><p>1 mol NH₃ = 6×10²³ molecules, each with 1N and 3H<br>N atoms = 1×6×10²³ = <b>6×10²³</b><br>H atoms = 3×6×10²³ = <b>18×10²³ = 1.8×10²⁴</b></p>`,
exp_th:`<div class="ans-badge">✓ B. N=6×10²³, H=1.8×10²⁴</div>`+stpr("s22",[
{label:"1 mol NH₃ = 6×10²³ โมเลกุล",text:"N = 1×6×10²³ = <strong>6×10²³</strong><br>H = 3×6×10²³ = <strong>18×10²³ = 1.8×10²⁴</strong><br>✅ <strong>คำตอบ B</strong>"},
])},

/* Q24 */
{n:24,topic:"Endothermic / Exothermic",diff:"easy",
en:`An <b>exothermic</b> reaction is one in which heat energy is released, causing the surroundings to become warmer.<br>An <b>endothermic</b> reaction is one in which heat energy is absorbed, causing the surroundings to become cooler.<br><br>Commercially available 'cold packs' and 'heat packs' cause a change in temperature. <br>One type of pack contains two sections, one containing ammonium nitrate crystals, the other contains water. When the barrier between the sections is broken, the crystals begin to dissolve, causing the temperature of the solution to decrease.<br><br>Based on the information provided, ammonium nitrate would be used in a<br><br>A. cold pack because it undergoes an exothermic dissolution process.<br>B. cold pack because it undergoes an endothermic dissolution process.<br>C. heat pack because it undergoes an exothermic dissolution process.<br>D. heat pack because it undergoes an endothermic dissolution process.`,
th:`<br>Exothermic: ปล่อยความร้อน → สภาพแวดล้อมร้อนขึ้น<br>Endothermic: ดูดซับความร้อน → สภาพแวดล้อมเย็นลง<br><br>แพ็คที่มี ammonium nitrate + น้ำ เมื่อผสมกัน อุณหภูมิลดลง<br><br>Ammonium nitrate ใช้ใน<br><br>A. cold pack เพราะกระบวนการละลายเป็น exothermic<br>B. cold pack เพราะกระบวนการละลายเป็น endothermic<br>C. heat pack เพราะกระบวนการละลายเป็น exothermic<br>D. heat pack เพราะกระบวนการละลายเป็น endothermic`,
opts:["A","B","C","D"],
ans:1,
exp_en:`<div class="ans-badge">✓ B. Cold pack, endothermic dissolution</div><p>Temperature decreases when ammonium nitrate dissolves → the dissolution absorbs heat from surroundings → <b>endothermic</b>. This makes surroundings cooler → used in a <b>cold pack</b>.</p>`,
exp_th:`<div class="ans-badge">✓ B. Cold pack, endothermic</div>`+stpr("s24",[
{label:"อ่านจากโจทย์",text:"เมื่อ NH₄NO₃ ละลาย → อุณหภูมิลดลง → ดูดซับความร้อน → <strong>Endothermic</strong>"},
{label:"สรุป",text:"ทำให้สภาพแวดล้อมเย็นลง → ใช้ใน <strong>Cold pack</strong><br>✅ <strong>คำตอบ B</strong>"},
])},

/* Q27 */
{n:27,topic:"Chemical Formula Counting",diff:"medium",
en:`When ammonium dichromate is added gradually to molten ammonium thiocyanate, Reinecke's salt is formed. <br><br>Its formula is NH₄[Cr(SCN)₄(NH₃)₂]. How many elements and how many atoms does this formula represent?<br><br><table class="q-table"><tr><th></th><th>Elements</th><th>Atoms</th></tr><tr><td>A.</td><td>5</td><td>26</td></tr><tr><td>B.</td><td>5</td><td>12</td></tr><tr><td>C.</td><td>8</td><td>26</td></tr><tr><td>D.</td><td>8</td><td>12</td></tr></table>`,
th:`<br>สูตรของ Reinecke's salt คือ NH₄[Cr(SCN)₄(NH₃)₂] สูตรนี้มีกี่ธาตุและกี่อะตอม?<br><br><table class="q-table"><tr><th></th><th>ธาตุ</th><th>อะตอม</th></tr><tr><td>A.</td><td>5</td><td>26</td></tr><tr><td>B.</td><td>5</td><td>12</td></tr><tr><td>C.</td><td>8</td><td>26</td></tr><tr><td>D.</td><td>8</td><td>12</td></tr></table>`,
opts:["A","B","C","D"],
ans:0,
exp_en:`<div class="ans-badge">✓ A. 5 elements, 26 atoms</div><p>Elements: N, H, Cr, S, C = <b>5 elements</b><br>Atoms: NH₄ = 1N+4H | [Cr(SCN)₄(NH₃)₂]: 1Cr + 4(S+C+N) + 2(N+3H) = 1Cr+4S+4C+4N+2N+6H<br>Total N = 1+4+2 = 7; H = 4+6 = 10; Cr=1; S=4; C=4<br>Total atoms = 7+10+1+4+4 = <b>26</b></p>`,
exp_th:`<div class="ans-badge">✓ A. 5 ธาตุ, 26 อะตอม</div>`+stpr("s27",[
{label:"ธาตุในสูตร",text:"N, H, Cr, S, C → <strong>5 ธาตุ</strong>"},
{label:"นับอะตอม",text:"NH₄: N=1, H=4<br>[Cr(SCN)₄]: Cr=1, S=4, C=4, N=4<br>(NH₃)₂: N=2, H=6<br>รวม: N=7, H=10, Cr=1, S=4, C=4<br>ทั้งหมด = 7+10+1+4+4 = <strong>26 อะตอม</strong><br>✅ <strong>คำตอบ A</strong>"},
])},

/* Q28 */
{n:28,topic:"Heating Solids",diff:"easy",
en:`Ashwyn heated a solid in a test tube and found that its mass decreased. He repeated the experiment several times, with the same result.<br><br>The best explanation for the decrease in mass is that the solid<br><br>A. expanded on heating, and became less dense.<br>B. reacted with oxygen, forming an oxide.<br>C. melted during heating.<br>D. produced a gas during heating.`,
th:`<br>Ashwyn ให้ความร้อนกับของแข็งในหลอดทดลองและพบว่ามวลลดลง ทำซ้ำหลายครั้งได้ผลเหมือนเดิม<br><br>คำอธิบายที่ดีที่สุดคือ<br><br>A. ขยายตัวเมื่อได้รับความร้อนและมีความหนาแน่นลดลง<br>B. ทำปฏิกิริยากับออกซิเจน เกิดออกไซด์<br>C. ละลายระหว่างการให้ความร้อน<br>D. ผลิตก๊าซระหว่างการให้ความร้อน`,
opts:["A","B","C","D"],
ans:3,
exp_en:`<div class="ans-badge">✓ D. Produced a gas during heating</div><p>If a gas is produced and escapes from the test tube, the mass of the solid remaining decreases. A: expansion ≠ mass loss. B: reacting with O₂ would increase mass. C: melting doesn't change mass.</p>`,
exp_th:`<div class="ans-badge">✓ D. ผลิตก๊าซระหว่างการให้ความร้อน</div>`+stpr("s28",[
{label:"วิเคราะห์",text:"A: ขยายตัว → ความหนาแน่นลด แต่มวลไม่เปลี่ยน ❌<br>B: ทำปฏิกิริยากับ O₂ → มวลเพิ่ม ❌<br>C: ละลาย → มวลไม่เปลี่ยน ❌<br><strong>D: ผลิตก๊าซ → ก๊าซหนีออกไป → มวลลด ✅</strong>"},
{label:"สรุป",text:"✅ <strong>คำตอบ D</strong>"},
])},

/* Q29 */
{n:29,topic:"Concentration",diff:"easy",
en:`During the 1950s, a Sydney woman killed three family members and a friend by putting rat poison into the food and drinks she gave them. The toxic substance, thallium sulfate, Tl₂SO₄, which has a density of 6.77 g/mL, is colourless, odourless and tasteless. Its use as a rat poison has been banned in many countries since the 1970s. A single dose of more than 500 mg is fatal.<br><br>At what minimum concentration, in g/L, of Tl₂SO₄ does a 200 mL cup of tea provide a fatal dose of the poison?<br><br>A. 0.25 g/L&nbsp;&nbsp;B. 0.4 g/L&nbsp;&nbsp;C. 2.5 g/L&nbsp;&nbsp;D. 4.0 g/L`,
th:`<br>Tl₂SO₄ เป็นยาเบื่อหนู มีพิษถึงตายเมื่อรับ >500 mg<br><br>ความเข้มข้นต่ำสุดของ Tl₂SO₄ (g/L) ที่ทำให้น้ำชา 200 mL มีพิษถึงตายคือเท่าไร?<br><br>A. 0.25 g/L&nbsp;&nbsp;B. 0.4 g/L&nbsp;&nbsp;C. 2.5 g/L&nbsp;&nbsp;D. 4.0 g/L`,
opts:["0.25 g/L","0.4 g/L","2.5 g/L","4.0 g/L"],
ans:2,
exp_en:`<div class="ans-badge">✓ C. 2.5 g/L</div><p>Fatal dose = 500 mg = 0.5 g in 200 mL = 0.2 L<br>Concentration = mass/volume = 0.5/0.2 = <b>2.5 g/L</b></p>`,
exp_th:`<div class="ans-badge">✓ C. 2.5 g/L</div>`+stpr("s29",[
{label:"คำนวณ",text:"ปริมาณถึงตาย = 500 mg = 0.5 g ใน 200 mL = 0.2 L<br>ความเข้มข้น = 0.5/0.2 = <strong>2.5 g/L</strong><br>✅ <strong>คำตอบ C</strong>"},
])},

/* Q30 */
{n:30,topic:"Hess's Law",diff:"hard",
en:`Some reactions are reversible reactions which means that the products can react to produce the original reactants again. <br><br>For example A + B ⇌ C + D means that A reacts with B to produce C and D, and C reacts with D to produce A and B.<br><br>If the reaction A + B → C + D is Reaction Q;<br>then C + D → A + B can be thought of as minus (−) Reaction Q, and <br>2A + 2B → 2C + 2D can be thought of as 2 times (×) Reaction Q.<br><br>Reactions 1, 2, and 3 are:<br><b>Reaction 1:</b> 2N₂(g) + O₂(g) → 2N₂O(g)<br><b>Reaction 2:</b> N₂O₄(g) ⇌ 2NO₂(g)<br><b>Reaction 3:</b> N₂(g) + 2O₂(g) ⇌ 2NO₂(g)<br><br>What combination of these reactions will produce the equation for the following reaction?<br><div style="text-align:center;padding:10px;background:#f8f8f8;border-radius:8px;margin:8px 0"><b>2N₂O(g) + 3O₂(g) ⇌ 2N₂O₄(g)</b></div>A. (−Reaction 1) + (2×−Reaction 2) + (2×Reaction 3)<br>B. (Reaction 1) + (2×−Reaction 2) + (Reaction 3)<br>C. (−Reaction 1) + (2×Reaction 2) + (2×Reaction 3)<br>D. (Reaction 1) + (2×Reaction 2) + (2×Reaction 3)`,
th:`<br>R1: 2N₂+O₂→2N₂O | R2: N₂O₄⇌2NO₂ | R3: N₂+2O₂⇌2NO₂<br><br>รวมปฏิกิริยาอย่างไรเพื่อให้ได้:<br><div style="text-align:center;padding:10px;background:#f8f8f8;border-radius:8px;margin:8px 0"><b>2N₂O+3O₂⇌2N₂O₄</b></div>A. (−Reaction 1) + (2×−Reaction 2) + (2×Reaction 3)<br>B. (Reaction 1) + (2×−Reaction 2) + (Reaction 3)<br>C. (−Reaction 1) + (2×Reaction 2) + (2×Reaction 3)<br>D. (Reaction 1) + (2×Reaction 2) + (2×Reaction 3)`,
opts:["A","B","C","D"],
ans:0,
exp_en:`<div class="ans-badge">✓ A. (−R1)+(2×−R2)+(2×R3)</div><p>−R1: 2N₂O→2N₂+O₂ (N₂O on left ✅)<br>2×R3: 2N₂+4O₂→4NO₂ (use N₂)<br>2×−R2: 4NO₂→2N₂O₄ (N₂O₄ on right ✅)<br>Sum: 2N₂O + (4−1)O₂ → 2N₂O₄ = 2N₂O+3O₂→2N₂O₄ ✅</p>`,
exp_th:`<div class="ans-badge">✓ A.</div>`+stpr("s30",[
{label:"−R1: กลับ R1",text:"2N₂O → 2N₂+O₂ ✅ (N₂O อยู่ฝั่งซ้าย)"},
{label:"2×R3: ผลิต NO₂",text:"2N₂+4O₂→4NO₂"},
{label:"2×−R2: กลับ R2 สองเท่า",text:"4NO₂→2N₂O₄ ✅<br>รวม: 2N₂O+(4−1)O₂→2N₂O₄ = <strong>2N₂O+3O₂→2N₂O₄ ✅</strong><br>✅ <strong>คำตอบ A</strong>"},
])},

];


let cur=0;

const answered=new Array(QS.length).fill(null);
const chosen=new Array(QS.length).fill(null);
const expLang=new Array(QS.length).fill("en");

function updateHeader(){
  const done=answered.filter(a=>a!==null).length;
  const corr=answered.filter((a,i)=>a!==null&&a===QS[i].ans).length;
  document.getElementById('h-done').textContent=done;
  document.getElementById('h-corr').textContent=corr;
  document.getElementById('h-wrong').textContent=done-corr;
  document.getElementById('prog-fill').style.width=(done/QS.length*100)+'%';
  document.getElementById('prog-val').textContent=done+'/'+QS.length;
}
function renderNav(){
  document.getElementById('qnav').innerHTML=QS.map((q,i)=>{
    let cls='qdot';
    if(i===cur)cls+=' cur';
    else if(answered[i]!==null)cls+=answered[i]===QS[i].ans?' ok':' ng';
    return `<button class="${cls}" onclick="go(${i})" title="Q${q.n}: ${q.topic}">Q${q.n}</button>`;
  }).join('');
}
function renderQ(){
  const q=QS[cur];
  const ltrs=['A','B','C','D'];
  const isAns=answered[cur]!==null;
  const lang=expLang[cur];
  let optsH=q.opts.map((o,i)=>{
    let cls='opt';
    if(isAns){if(i===q.ans)cls+=' show-correct';if(i===chosen[cur]&&chosen[cur]!==q.ans)cls+=' wrong';if(i===chosen[cur]&&chosen[cur]===q.ans)cls+=' correct';}
    return `<button class="${cls}" ${isAns?'disabled':''} onclick="pick(${i})"><span class="ltr">${ltrs[i]}.</span><span>${o}</span></button>`;
  }).join('');
  const expShow=isAns?' show':'';
  const enA=lang==='en'?' active':'';
  const thA=lang==='th'?' active':'';
  document.getElementById('qarea').innerHTML=`
<div class="qcard">
  <div class="qmeta">
    <span class="qnum">Q${q.n} / 30</span>
    <span class="qyear">ICQ 2017</span>
    <span class="qtag">${q.topic}</span>
    <span class="qdiff ${q.diff}">${{easy:'Easy',medium:'Medium',hard:'Hard'}[q.diff]}</span>
  </div>
  <div class="qen">${q.en}</div>
  <div class="qth">${q.th}</div>
  <div class="opts">${optsH}</div>
  <div class="expbox${expShow}">
    <div class="exphdr">
      Explanation / เฉลยละเอียด
      <button class="elang${enA}" onclick="setLang(${cur},'en')">EN</button>
      <button class="elang${thA}" onclick="setLang(${cur},'th')">TH ภาษาไทย</button>
    </div>
    <div class="expbody">
      <div class="exp-en${lang==='en'?' on':''}">${q.exp_en}</div>
      <div class="exp-th${lang==='th'?' on':''}">${q.exp_th}</div>
    </div>
  </div>
</div>`;
  if(isAns){
    const sid='s'+(cur+1);
    if(stepState[sid]===undefined&&document.getElementById(sid)){
      const steps=document.querySelectorAll(`#${sid} .stepper-step`).length;
      initStepper(sid,steps);
    }
  }
  document.getElementById('nav-lbl').textContent=`${cur+1} / ${QS.length}`;
  document.getElementById('btn-prev').disabled=(cur===0);
  const btnNext=document.getElementById('btn-next');
  if(cur===QS.length-1){btnNext.textContent='ดูผลรวม →';btnNext.onclick=showResult;}
  else{btnNext.textContent='Next →';btnNext.onclick=()=>go(cur+1);}
}
function setLang(i,l){
  expLang[i]=l;renderQ();
  const sid='s'+(i+1);
  if(document.getElementById(sid)){
    const steps=document.querySelectorAll(`#${sid} .stepper-step`).length;
    initStepper(sid,steps);
  }
}
function pick(i){
  if(answered[cur]!==null)return;
  chosen[cur]=i;answered[cur]=i;
  renderNav();renderQ();updateHeader();
  const sid='s'+(cur+1);
  if(expLang[cur]==='th'&&document.getElementById(sid)){
    const steps=document.querySelectorAll(`#${sid} .stepper-step`).length;
    initStepper(sid,steps);
  }
}
function go(i){if(i<0||i>=QS.length)return;cur=i;renderAll();}
function renderAll(){renderNav();renderQ();updateHeader();}

function showResult(){
  document.getElementById('quiz-view').classList.add('hidden');
  const rv=document.getElementById('result-view');rv.classList.remove('hidden');
  const corr=answered.filter((a,i)=>a!==null&&a===QS[i].ans).length;
  const done=answered.filter(a=>a!==null).length;
  const pct=Math.round(corr/QS.length*100);
  const msg=pct>=80?'เยี่ยมมาก! 🎉':pct>=60?'ดีมาก ทบทวนข้อที่ผิดด้วยนะ 👍':'ลองทบทวนแล้วทำใหม่อีกรอบ 📚';
  const TOPICS=[...new Set(QS.map(q=>q.topic))];
  let topicRows=TOPICS.map(t=>{
    const ti=QS.map((_,i)=>i).filter(i=>QS[i].topic===t);
    const tc=ti.filter(i=>answered[i]===QS[i].ans).length;
    const pt=Math.round(tc/ti.length*100);
    return `<div class="trow"><div class="tname">${t}</div><div class="tbar"><div class="tbfill" style="width:${pt}%"></div></div><div class="tpct">${tc}/${ti.length}</div></div>`;
  }).join('');
  rv.innerHTML=`
<div class="big">${corr}<span class="total">/${QS.length}</span></div>
<div class="msg">${msg}</div>
<div class="rgrid">
  <div class="rstat"><div class="n" style="color:var(--green)">${corr}</div><div class="l">ถูก</div></div>
  <div class="rstat"><div class="n" style="color:var(--red)">${done-corr}</div><div class="l">ผิด</div></div>
  <div class="rstat"><div class="n">${pct}%</div><div class="l">คะแนน</div></div>
</div>
<div class="tbreak"><h3>By Topic</h3>${topicRows}</div>
<button class="btn pri" onclick="restart()" style="padding:12px 32px;font-size:15px;margin-bottom:10px">ทำใหม่</button><br>
<button class="btn" onclick="reviewWrong()" style="font-size:13px">ทบทวนข้อที่ผิด</button>`;
}
function restart(){
  answered.fill(null);chosen.fill(null);expLang.fill("en");
  Object.keys(stepState).forEach(k=>delete stepState[k]);
  cur=0;
  document.getElementById('result-view').classList.add('hidden');
  document.getElementById('quiz-view').classList.remove('hidden');
  renderAll();
}
function reviewWrong(){
  const wrong=QS.map((_,i)=>i).filter(i=>answered[i]!==null&&answered[i]!==QS[i].ans);
  if(!wrong.length){alert('ไม่มีข้อผิด! 🎉');return;}
  cur=wrong[0];
  document.getElementById('result-view').classList.add('hidden');
  document.getElementById('quiz-view').classList.remove('hidden');
  renderAll();
}

renderAll();

</script>
</body>
</html>
